<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Happy Birthday Jenifar ðŸ’™</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        @keyframes hburst {
            0% {
                opacity: 1;
                transform: scale(1) translate(0, 0)
            }

            100% {
                opacity: 0;
                transform: scale(1.8) translate(var(--dx, 20px), var(--dy, -60px))
            }
        }

        /* CINEMATIC OVERLAY */
        #stepOverlay {
            position: fixed;
            inset: 0;
            background: #020c22;
            z-index: 500;
            pointer-events: none;
            opacity: 0;
        }

        /* RESUME BANNER */
        #resumeBanner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 64, 175, .94);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(96, 165, 250, .3);
            border-radius: 50px;
            padding: 11px 20px;
            z-index: 9999;
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: .8rem;
            color: #fff;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
            opacity: 0;
            pointer-events: none;
        }

        #resumeBanner button {
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            font-weight: 700;
            cursor: pointer;
            font-size: .78rem;
        }

        .rb-yes {
            background: #3b82f6;
            color: #fff;
        }

        .rb-no {
            background: none;
            color: rgba(255, 255, 255, .45);
        }

        /* COUNTDOWN */
        #countdownOverlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(30, 58, 138, .96), rgba(2, 12, 34, .99));
            z-index: 9998;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #cdNum {
            font-size: clamp(6rem, 20vw, 9rem);
            font-weight: 800;
            color: #60a5fa;
            line-height: 1;
            filter: drop-shadow(0 0 40px rgba(96, 165, 250, .7));
        }

        #cdMsg {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(1.6rem, 6vw, 2.4rem);
            color: rgba(255, 255, 255, .7);
            text-align: center;
            padding: 0 20px;
        }

        /* BUTTON MICRO-INTERACTIONS */
        .mic-btn,
        .call-btn {
            transform-origin: center;
            will-change: transform;
        }

        .mic-btn:hover {
            transform: scale(1.05);
        }

        .mic-btn:active {
            transform: scale(0.93);
        }

        .call-btn:hover {
            transform: scale(1.05) translateY(-2px);
        }

        .call-btn:active {
            transform: scale(0.95);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020c22;
            overflow: hidden;
            color: #fff;
            user-select: none;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            filter: blur(100px);
            opacity: .7;
            pointer-events: none;
        }

        .b {
            position: absolute;
            border-radius: 50%;
        }

        .b1 {
            width: 600px;
            height: 600px;
            top: -150px;
            left: -150px;
            background: radial-gradient(circle, #1e40af, transparent 70%);
            animation: m1 20s infinite alternate;
        }

        .b2 {
            width: 550px;
            height: 550px;
            bottom: -130px;
            right: -130px;
            background: radial-gradient(circle, #0284c7, transparent 70%);
            animation: m2 24s infinite alternate;
        }

        .b3 {
            width: 450px;
            height: 450px;
            top: 35%;
            left: 20%;
            background: radial-gradient(circle, #4f46e5, transparent 70%);
            animation: m3 16s infinite alternate;
        }

        @keyframes m1 {
            to {
                transform: translate(200px, 250px)scale(1.2)
            }
        }

        @keyframes m2 {
            to {
                transform: translate(-200px, -200px)scale(.8)
            }
        }

        @keyframes m3 {
            from {
                transform: translate(-40%, -40%)
            }

            to {
                transform: translate(100px, -220px)scale(1.25)
            }
        }

        .pt {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            animation: ptr 7s linear infinite;
        }

        @keyframes ptr {
            0% {
                transform: translateY(106vh)rotate(0);
                opacity: 0
            }

            12% {
                opacity: .5
            }

            88% {
                opacity: .4
            }

            100% {
                transform: translateY(-12vh)rotate(380deg);
                opacity: 0
            }
        }

        /* LOGIN */
        #login {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            perspective: 1200px;
        }

        .lc {
            width: 100%;
            max-width: 360px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            /* Removed backdrop-filter blur which lagged low-end phones */
            border-radius: 44px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            padding: 24px 22px 20px;
            max-height: 98vh;
            overflow-y: auto;
            scrollbar-width: none;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            will-change: transform, opacity;
        }

        .lc-float {
            animation: lcBreathing 6s ease-in-out infinite;
        }

        @keyframes lcBreathing {

            0%,
            100% {
                transform: translateY(0px);
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            }

            50% {
                transform: translateY(-8px);
                box-shadow: 0 20px 45px rgba(0, 0, 0, 0.8);
            }
        }

        .lc-item {
            opacity: 0;
            transform: translateY(15px);
        }

        #login.out {
            animation: lout .5s ease forwards;
            pointer-events: none;
        }

        @keyframes lout {
            to {
                opacity: 0;
                transform: scale(1.08)
            }
        }

        .hrt {
            font-size: 3.8rem;
            display: block;
            margin-bottom: 14px;
            animation: hp 1.6s ease-in-out infinite;
        }

        @keyframes hp {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 10px #3b82f6)
            }

            50% {
                transform: scale(1.14);
                filter: drop-shadow(0 0 24px #60a5fa)
            }
        }

        .lt {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2rem, 8vw, 2.8rem);
            margin-bottom: 6px;
            background: linear-gradient(100deg, #60a5fa 30%, #fff 50%, #60a5fa 70%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: txtShimmer 3s linear infinite;
        }

        @keyframes txtShimmer {
            to {
                background-position: -200% center;
            }
        }

        .l-sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px #fff, 0 0 20px #60a5fa;
            opacity: 0;
        }

        .ls {
            font-size: .82rem;
            color: rgba(255, 255, 255, .38);
            margin-bottom: 18px;
        }

        .clue {
            background: rgba(59, 130, 246, .07);
            border: 1px solid rgba(59, 130, 246, .18);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 20px;
        }

        .ct {
            font-size: .82rem;
            color: rgba(255, 255, 255, .6);
            line-height: 1.6;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 13px;
            margin-bottom: 14px;
        }

        .dot {
            width: 17px;
            height: 17px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .07);
            border: 2px solid rgba(59, 130, 246, .22);
            transition: all .22s;
        }

        .dot.on {
            background: #3b82f6;
            border-color: #60a5fa;
            box-shadow: 0 0 14px #3b82f6;
            transform: scale(1.22);
        }

        #lerr {
            font-size: .82rem;
            font-weight: 700;
            min-height: 22px;
            margin-bottom: 10px;
            color: #f87171;
        }

        @keyframes shk {

            0%,
            100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-8px)
            }

            75% {
                transform: translateX(8px)
            }
        }

        .pgrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 11px;
            margin-bottom: 10px;
        }

        .pb {
            background: rgba(59, 130, 246, .07);
            border: 1px solid rgba(59, 130, 246, .18);
            border-radius: 18px;
            padding: 12px 0;
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            /* Ultra-fast press: no lingering transition */
            transition: transform 0.06s ease, background 0.06s ease;
            will-change: transform;
            touch-action: manipulation;
            user-select: none;
        }

        .pb:active {
            transform: scale(.82);
            background: rgba(59, 130, 246, .38);
        }

        .pb.del {
            color: rgba(255, 255, 255, .38);
            font-size: 1rem;
        }

        .pb.z {
            grid-column: 2;
        }

        /* CARD */
        #card {
            width: 94%;
            max-width: 440px;
            height: 90dvh;
            max-height: 830px;
            border-radius: 42px;
            background: rgba(2, 10, 35, .6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 35px 80px rgba(0, 0, 0, .6), 0 0 0 1px rgba(96, 165, 250, .12) inset;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(32px);
            transition: all .85s cubic-bezier(.34, 1.56, .64, 1);
        }

        #card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .prog {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            z-index: 20;
            background: rgba(255, 255, 255, .05);
        }

        #pbi {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1d4ed8, #38bdf8, #818cf8);
            transition: width .7s ease;
        }

        .sbadge {
            position: absolute;
            top: 14px;
            right: 16px;
            z-index: 20;
            background: rgba(59, 130, 246, .14);
            border: 1px solid rgba(59, 130, 246, .28);
            border-radius: 50px;
            padding: 5px 14px;
            font-size: .7rem;
            font-weight: 700;
            color: #60a5fa;
        }

        .sw {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .stp {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform: translateX(105%);
            transition: transform .55s cubic-bezier(.4, 1, .2, 1), opacity .35s ease;
            overflow-y: auto;
            scrollbar-width: none;
            z-index: 1;
        }

        .stp::-webkit-scrollbar {
            display: none;
        }

        .stp {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform: translateX(105%);
            transition: transform .55s cubic-bezier(.4, 1, .2, 1), opacity .35s ease;
            overflow-y: auto;
            scrollbar-width: none;
            z-index: 1;
            padding-top: 15px;
            padding-bottom: 30px;
        }

        .stp.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
            z-index: 2;
            /* Active step always on top */
        }

        .stp.exit {
            opacity: 0;
            transform: translateX(-105%);
            z-index: 1;
        }

        /* Back-navigation: previous step enters from left */
        .stp.from-left {
            opacity: 0 !important;
            transform: translateX(-105%) !important;
            pointer-events: none !important;
            transition: none !important;
            /* Snap instantly, no animation */
        }

        /* Snap to off-screen right instantly (no animation), then animate in */
        .stp.snap-right {
            opacity: 0 !important;
            transform: translateX(105%) !important;
            pointer-events: none !important;
            transition: none !important;
            /* Snap instantly */
        }

        /* STEP CONTENT */
        .inner {
            width: 100%;
            margin: 20px 0 auto 0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 0 22px 20px;
            text-align: center;
            gap: 10px;
        }

        .s-icon {
            font-size: clamp(3rem, 11vw, 4.5rem);
            animation: flt 3.2s ease-in-out infinite;
            filter: drop-shadow(0 0 16px rgba(96, 165, 250, .35));
        }

        @keyframes flt {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-16px)
            }
        }

        .s-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.2rem, 9vw, 3rem);
            color: #60a5fa;
            text-shadow: 0 0 30px rgba(96, 165, 250, .3);
        }

        .s-head {
            font-size: 1.05rem;
            font-weight: 700;
            color: rgba(255, 255, 255, .88);
            line-height: 1.45;
        }

        .s-txt {
            font-size: .88rem;
            color: rgba(255, 255, 255, .6);
            line-height: 1.75;
            white-space: pre-line;
            max-width: 340px;
        }

        .mf {
            width: 94%;
            /* Dynamic height: fills space without pushing content off-screen */
            height: clamp(120px, 22vh, 180px);
            border-radius: 22px;
            overflow: hidden;
            flex-shrink: 0;
            transform: rotate(-1.5deg);
            box-shadow: 0 14px 40px rgba(0, 0, 0, .35);
            border: 2px solid rgba(255, 255, 255, .1);
        }

        .mf img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            display: block;
        }

        /* Per-image object-position overrides */
        .mf img[data-pos] {
            object-position: var(--op, center 20%);
        }

        .trick-bar {
            flex-shrink: 0;
            padding: 10px 18px;
            background: rgba(30, 64, 175, .12);
            border-top: 1px solid rgba(59, 130, 246, .18);
            font-size: .75rem;
            font-weight: 700;
            color: #7dd3fc;
            letter-spacing: .6px;
            text-align: center;
        }

        /* LIVE AGE COUNTER */
        .age-live {
            display: flex;
            gap: 5px;
            justify-content: center;
            align-items: stretch;
            flex-wrap: nowrap;
            width: 100%;
            margin: 8px 0;
            box-sizing: border-box;
        }

        .ac-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(59, 130, 246, .1);
            border: 1px solid rgba(59, 130, 246, .22);
            border-radius: 12px;
            padding: 8px 4px;
            /* Each box takes equal share of full width */
            flex: 1 1 0;
            min-width: 0;
        }

        .ac-n {
            font-size: clamp(.9rem, 3.8vw, 1.35rem);
            font-weight: 800;
            color: #60a5fa;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
            line-height: 1;
        }

        .ac-u {
            font-size: clamp(.5rem, 1.8vw, .6rem);
            color: rgba(255, 255, 255, .37);
            text-transform: uppercase;
            letter-spacing: .3px;
            margin-top: 3px;
            white-space: nowrap;
        }

        /* MUSIC */
        .vinyl {
            font-size: 6rem;
            display: block;
            cursor: pointer;
            animation: spin 4s linear infinite;
            filter: drop-shadow(0 0 22px rgba(96, 165, 250, .55));
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .plbl {
            font-size: .85rem;
            color: rgba(255, 255, 255, .45);
            margin-top: 6px;
        }

        /* TAP COUNT */
        .tap-feed {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 50;
        }

        .tc-num {
            font-size: 5rem;
            font-weight: 800;
            color: rgba(96, 165, 250, .5);
            opacity: 0;
            transform: scale(.5);
            transition: all .18s;
        }

        .tc-num.show {
            opacity: 1;
            transform: scale(1);
        }

        /* PUZZLE */
        .pz-wrap {
            position: relative;
            border-radius: 22px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(59, 130, 246, .25);
            flex-shrink: 0;
        }

        .pz-piece {
            position: absolute;
            background-repeat: no-repeat;
            transition: all .58s cubic-bezier(.34, 1.56, .64, 1);
        }

        .pz-stat {
            font-size: .82rem;
            color: #60a5fa;
            font-weight: 700;
            margin-top: 12px;
            min-height: 22px;
        }

        .pz-btn {
            display: none;
            margin-top: 14px;
            background: rgba(59, 130, 246, .18);
            border: 1.5px solid rgba(59, 130, 246, .4);
            border-radius: 50px;
            padding: 13px 30px;
            font-weight: 700;
            font-size: .88rem;
            color: #fff;
            cursor: pointer;
        }

        /* METER */
        .sw-wrap {
            width: 92%;
            margin: 6px 0;
        }

        .love-sl {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .08);
            outline: none;
        }

        .love-sl::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: #3b82f6;
            border-radius: 50%;
            border: 4px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 14px rgba(59, 130, 246, .6);
        }

        .m-lbl {
            font-size: .92rem;
            font-weight: 700;
            color: #60a5fa;
            min-height: 24px;
        }

        /* TYPE STEP */
        .yr-input {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            background: rgba(59, 130, 246, .08);
            border: 2px solid rgba(59, 130, 246, .3);
            border-radius: 20px;
            padding: 16px;
            width: 78%;
            max-width: 220px;
            color: #60a5fa;
            outline: none;
            letter-spacing: 6px;
        }

        .yr-input:focus {
            border-color: #60a5fa;
            background: rgba(59, 130, 246, .12);
        }

        /* DRAG STEP */
        .drag-zone {
            width: 90%;
            height: 150px;
            position: relative;
            background: rgba(59, 130, 246, .05);
            border: 1px dashed rgba(59, 130, 246, .2);
            border-radius: 22px;
            flex-shrink: 0;
        }

        .drag-heart {
            position: absolute;
            font-size: 3.5rem;
            cursor: grab;
            z-index: 10;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            transition: font-size .3s;
            touch-action: none;
        }

        .drag-target {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            height: 70px;
            border: 2px dashed rgba(59, 130, 246, .5);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            gap: 2px;
        }

        .drag-lbl {
            font-size: .65rem;
            color: rgba(255, 255, 255, .4);
        }

        /* CONFETTI BTN */
        .conf-btn {
            background: rgba(59, 130, 246, .14);
            border: 1.5px solid rgba(59, 130, 246, .35);
            border-radius: 50px;
            padding: 16px 36px;
            font-weight: 700;
            font-size: .92rem;
            color: #fff;
            cursor: pointer;
            letter-spacing: .5px;
        }

        .conf-btn:active {
            background: rgba(59, 130, 246, .3);
        }

        /* FINISH */
        .call-btn {
            background: linear-gradient(135deg, #1d4ed8, #6366f1);
            color: #fff;
            padding: 17px 40px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            margin-top: 14px;
            box-shadow: 0 12px 32px rgba(59, 130, 246, .55);
            animation: cpulse 2.2s infinite;
            letter-spacing: .5px;
        }

        @keyframes cpulse {

            0%,
            100% {
                box-shadow: 0 12px 32px rgba(99, 102, 241, .55), 0 0 0 0 rgba(99, 102, 241, .3)
            }

            50% {
                box-shadow: 0 12px 32px rgba(99, 102, 241, .55), 0 0 0 18px rgba(99, 102, 241, 0)
            }
        }

        /* â”€â”€ FINISH SCREEN â”€â”€ */
        .fin-wrap {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 50px 18px 14px;
            gap: 0;
            position: relative;
            overflow: hidden;
        }

    <script>
        (function () {
            var IMAGES = ['IMG20230312122458.jpg', '1.jpg', '2.jpg', 'IMG20230129154348.jpg',
                '4.jpg', '444.jpg', '3.jpg', '666.png',
                'Picsart_26-01-16_22-59-05-218.jpg', 'puzzil.jpg'];
            var AUDIO_SRC = 'song1.mp3';
            var MIN_MS = 3500;
            var TOTAL = IMAGES.length + 1;
            var bar = document.getElementById('ldBar');
            var pct = document.getElementById('ldPct');
            var msgEl = document.getElementById('ldMsg');
            var loaded = 0;
            var startTime = Date.now();
            var done = false;

            function onAsset() {
                loaded = Math.min(loaded + 1, TOTAL);
                var p = Math.round((loaded / TOTAL) * 100);
                if (bar) bar.style.width = p + '%';
                if (pct) pct.textContent = p + '%';
                if (loaded >= TOTAL && !done) tryFinish();
            }

            IMAGES.forEach(function (src) {
                var img = new Image();
                img.onload = img.onerror = onAsset;
                img.src = src;
            });

            var bgmPre = document.createElement('audio');
            bgmPre.preload = 'auto';
            bgmPre.src = AUDIO_SRC;
            var aDone = function () { bgmPre.removeEventListener('canplaythrough', aDone); bgmPre.removeEventListener('error', aDone); onAsset(); };
            bgmPre.addEventListener('canplaythrough', aDone);
            bgmPre.addEventListener('error', aDone);
            bgmPre.load();
            setTimeout(aDone, 7000);

            function tryFinish() {
                done = true;
                var elapsed = Date.now() - startTime;
                var wait = Math.max(0, MIN_MS - elapsed);
                setTimeout(function () {
                    if (typeof window._loaderComplete === 'function') window._loaderComplete();
                }, wait);
            }

            var msgs = [
                "Un kooda oru special surprise wait panradhu 💙",
                "Indha journey sirf unakkaga matrum dhaan 🌟",
                "En manasule onna think pannitu irukken 💭",
                "Nee ready ah irukiya? 🎁",
                "Heart full of love... coming your way 💙"
            ];
            var mi = 0, ci = 0, erasing = false, tmr;
            function typeNext() {
                if (!msgEl) return;
                var txt = msgs[mi];
                if (!erasing) {
                    if (ci <= txt.length) { msgEl.textContent = txt.slice(0, ci++); tmr = setTimeout(typeNext, ci === 1 ? 350 : 36); }
                    else { tmr = setTimeout(function () { erasing = true; typeNext(); }, 1900); }
                } else {
                    if (ci >= 0) { msgEl.textContent = txt.slice(0, ci--); tmr = setTimeout(typeNext, 20); }
                    else { erasing = false; ci = 0; mi = (mi + 1) % msgs.length; tmr = setTimeout(typeNext, 240); }
                }
            }
            typeNext();

            var EMJS = ['💙', '✨', '💜', '💫', '⭐', '🌟', '💗', '💖', '🎀'];
            var cont = document.getElementById('ldParticles');
            if (cont) {
                for (var i = 0; i < 20; i++) {
                    (function (i) {
                        setTimeout(function () {
                            var p = document.createElement('div');
                            p.textContent = EMJS[Math.floor(Math.random() * EMJS.length)];
                            var sz = (0.75 + Math.random() * 1).toFixed(2);
                            var dur = (6 + Math.random() * 8).toFixed(1);
                            var del = (Math.random() * 3).toFixed(1);
                            var left = (Math.random() * 100).toFixed(1);
                            p.style.cssText = 'position:absolute;left:' + left + '%;bottom:-2rem;font-size:' + sz + 'rem;opacity:0;animation:ldFloat ' + dur + 's ' + del + 's linear infinite;pointer-events:none;';
                            cont.appendChild(p);
                        }, i * 180);
                    })(i);
                }
            }

            window._loaderComplete = function () {
                clearTimeout(tmr);
                if (bar) { bar.style.width = '100%'; }
                if (pct) { pct.textContent = '100%'; }
            };
        })();
    </script>

            const now = new Date(), diff = now - BIRTH;
            const ts = Math.floor(diff / 1000), s = ts % 60, tm = Math.floor(ts / 60), m = tm % 60, th = Math.floor(tm / 60), h = th % 24;
            let yr = now.getFullYear() - BIRTH.getFullYear();
            const bdy = new Date(now.getFullYear(), BIRTH.getMonth(), BIRTH.getDate());
            if (now < bdy) yr--;
            const lastBd = new Date(now.getFullYear() + (now < bdy ? -1 : 0), BIRTH.getMonth(), BIRTH.getDate());
            const d = Math.floor((now - lastBd) / 86400000);
            return { yr, d, h, m, s };

        /* â”€â”€ GO PREV (hidden back â€“ tap top-left corner) â”€â”€ */
        function goPrev() {

        /* â”€â”€ GESTURES â”€â”€ */
        function setupGestures() {
            const area = swEl;
            let lastTap = 0, lpFired = false, lpTimer = null;
            let sx = 0, sy = 0;
            let pinchDist = null;
            let tapCnt = new Array(24).fill(0), tapTmr = new Array(24).fill(null);
            let emg = 0, emgT = null;

            /* CLICK â†’ TAP */
            area.addEventListener('click', e => {
                if (e.target.closest('#debugMenu') || e.target.closest('.no-adv,.pz-wrap,.drag-heart,.conf-btn,.love-sl,.vinyl,a,.mic-btn,.mic-circle,.mic-wrap')) return;
                if (lpFired) { lpFired = false; return; }
                if (ST[cur].nav === 'iloveyou') return; /* mic-only step */
                if (ST[cur].nav === 'tap') goNext();
            });

            /* TOUCHSTART */
            area.addEventListener('touchstart', e => {
                if (e.target.closest('#debugMenu')) return; /* let debug menu handle its own touches */
                const nav = ST[cur].nav, t = e.touches[0];
                const now = Date.now();
                sx = t.clientX; sy = t.clientY;

                /* LONGPRESS */
                if (nav === 'longpress' || nav === 'longpress2') {
                    lpFired = false;
                    const ms = nav === 'longpress2' ? 2800 : 1800;
                    lpTimer = setTimeout(() => {
                        lpFired = true;
                        goNext();
                    }, ms);
                    /* Animate SVG ring + pressing state */
                    const arc = document.getElementById(`lpArc${cur}`);
                    const stpEl = document.getElementById(`stp${cur}`);
                    if (arc) {
                        arc.style.transition = `stroke-dashoffset ${ms}ms linear`;
                        requestAnimationFrame(() => { arc.style.strokeDashoffset = '0'; });
                    }
                    if (stpEl) stpEl.classList.add('pressing');
                }

                /* Gesture blocking guard - moved AFTER longpress setup */
                if (e.target.closest('.no-adv,.drag-heart,.love-sl,a,.mic-btn,.mic-circle,.mic-wrap')) return;

                if (now - lastTap < 340 && nav === 'doubletap') { lastTap = 0; goNext(); return; }
                lastTap = now;

                if (nav === 'iloveyou') return;

                /* TAP COUNT */
                if (nav === 'tap3' || nav === 'tap5' || nav === 'tap7') {
                    const need = nav === 'tap3' ? 3 : nav === 'tap5' ? 5 : 7;
                    tapCnt[cur]++;
                    const tc = document.getElementById('tc' + cur);
                    if (tc) {
                        tc.textContent = tapCnt[cur];
                        tc.classList.add('show');
                        /* GSAP bounce on tap counter */
                        gsap.fromTo(tc, { scale: 1.8 }, { scale: 1, duration: 0.28, ease: 'back.out(2)' });
                        setTimeout(() => tc.classList.remove('show'), 250);
                    }
                    clearTimeout(tapTmr[cur]);
                    if (tapCnt[cur] >= need) { tapCnt[cur] = 0; setTimeout(goNext, 200); }
                    else tapTmr[cur] = setTimeout(() => tapCnt[cur] = 0, 2200);
                }

                /* TAP RIPPLE on every touch */
                const ripple = document.createElement('div');
                ripple.className = 'tap-ripple';
                ripple.style.left = t.clientX + 'px';
                ripple.style.top = t.clientY + 'px';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 580);

                /* TWO-FINGER TAP – blocked if this is the puzzle step (must solve puzzle first) */
                if (e.touches.length === 2 && nav === 'twofingertap' && !ST[cur].puzzle) goNext();

                /* PINCH/SPREAD START */
                if (e.touches.length === 2 && (nav === 'pinch' || nav === 'spread')) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
                    pinchDist = Math.hypot(dx, dy);
                }

                /* EMERGENCY 7-TAP â€“ disabled for mic step */
                if (nav !== 'type' && nav !== 'iloveyou') {
                    emg++; clearTimeout(emgT);
                    if (emg >= 7) { emg = 0; goNext(); }
                    emgT = setTimeout(() => emg = 0, 2500);
                }
            }, { passive: true });

            area.addEventListener('touchend', () => {
                clearTimeout(lpTimer); pinchDist = null;
                /* Reset longpress ring */
                const arc = document.getElementById(`lpArc${cur}`);
                const stpEl = document.getElementById(`stp${cur}`);
                if (arc && !lpFired) {
                    arc.style.transition = 'stroke-dashoffset 0.25s ease';
                    arc.style.strokeDashoffset = '207';
                }
                if (stpEl) stpEl.classList.remove('pressing');
            }, { passive: true });
            area.addEventListener('touchmove', () => { clearTimeout(lpTimer); }, { passive: true });

            /* PINCH/SPREAD MOVE */
            area.addEventListener('touchmove', e => {
                if (e.touches.length !== 2 || pinchDist === null) return;
                const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
                const nd = Math.hypot(dx, dy), nav = ST[cur].nav;
                if (nav === 'pinch' && nd < pinchDist - 55) { pinchDist = null; goNext(); }
                if (nav === 'spread' && nd > pinchDist + 55) { pinchDist = null; goNext(); }
            }, { passive: true });

            /* SWIPES */
            area.addEventListener('touchend', e => {
                const dx = sx - e.changedTouches[0].clientX, dy = sy - e.changedTouches[0].clientY;
                const nav = ST[cur].nav;
                if (nav === 'swipeup' && dy > 80 && Math.abs(dx) < 70) goNext();
                if (nav === 'swipeleft' && dx > 80 && Math.abs(dy) < 70) goNext();
                if (nav === 'swipedown' && dy < -80 && Math.abs(dx) < 70) goNext();
                if (nav === 'swiperight' && dx < -80 && Math.abs(dy) < 70) goNext();
            }, { passive: true });

            /* SHAKE */
            let lx, ly, lz, lastShake = 0;
            function listenShake() {
                window.addEventListener('devicemotion', e => {
                    const a = e.accelerationIncludingGravity; if (!a) return;
                    if (lx === undefined) { lx = a.x; ly = a.y; lz = a.z; return; }
                    const d = Math.abs(a.x - lx) + Math.abs(a.y - ly) + Math.abs(a.z - lz);
                    lx = a.x; ly = a.y; lz = a.z;
                    if (d > 26 && Date.now() - lastShake > 1100) { lastShake = Date.now(); if (ST[cur].nav === 'shake') goNext(); }
                });
            }
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                document.addEventListener('touchstart', async function r() { document.removeEventListener('touchstart', r); try { if (await DeviceMotionEvent.requestPermission() === 'granted') listenShake(); } catch (e) { } }, { once: true });
            } else listenShake();

            /* ROTATE */
            window.addEventListener('orientationchange', () => { if (ST[cur].nav === 'rotate') setTimeout(goNext, 500); });

            /* TILT */
            let tiltLk = false;
            function listenTilt() {
                window.addEventListener('deviceorientation', e => {
                    if (ST[cur].nav !== 'tilt' || tiltLk || e.gamma === null) return;
                    if (e.gamma < -38) { tiltLk = true; setTimeout(() => tiltLk = false, 1500); goNext(); }
                });
            }
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                document.addEventListener('touchstart', async function r() { document.removeEventListener('touchstart', r); try { if (await DeviceOrientationEvent.requestPermission() === 'granted') listenTilt(); } catch (e) { } }, { once: true });
            } else listenTilt();

        }


        /* â”€â”€ LOVE WAVE ENGINE â”€â”€ */
        let wavePhase = 0;                   /* idle heartbeat phase    */
        let lastAmp = 0;                   /* smoothed amplitude       */
        let heartPool = [];                  /* floating heart timers    */
        let lastHeartSpawn = 0;              /* throttle heart spawning  */

        function drawWave() {
            const canvas = document.getElementById('micCanvas');
            if (!canvas || !micActive) return;
            waveRAF = requestAnimationFrame(drawWave);
            registerRAF(waveRAF);

            if (waveAn) {
                waveAn.getByteTimeDomainData(waveData);
            }

            /* SMART WAVE BACKUP: If the hardware muted the audio stream (wave is completely flat), 
               we generate beautiful synthetic visual noise and reaction bursts. */
            let sumRaw = 0;
            for (let i = 0; i < waveData.length; i++) sumRaw += Math.abs(waveData[i] - 128);
            if (sumRaw < 10 && micActive) {
                window.fakeAmpBurst = (window.fakeAmpBurst || 0) * 0.90;
                for (let i = 0; i < waveData.length; i++) {
                    let w = window.fakeAmpBurst > 0.05
                        ? (Math.random() * 60 - 30) * window.fakeAmpBurst
                        : (Math.random() * 8 - 4); // idle subtle wobble
                    waveData[i] = 128 + w;
                }
            }

            const ctx = canvas.getContext('2d');
            const W = canvas.width;
            const H = canvas.height;
            const now = performance.now();

            ctx.clearRect(0, 0, W, H);

            /* â”€â”€ Compute amplitude (0â€“1) â”€â”€ */
            let sumDev = 0;
            for (let i = 0; i < waveData.length; i++) sumDev += Math.abs(waveData[i] - 128);
            /* EXTREME GAIN: was /12, now /3 to make tiny sounds look MASSIVE */
            const rawAmp = Math.min(sumDev / waveData.length / 3, 1);
            lastAmp = lastAmp * 0.5 + rawAmp * 0.5;   /* instant response */
            const amp = lastAmp;

            /* â”€â”€ Gradient color: pink â†” blue by amplitude â”€â”€ */
            const pinkR = 236, pinkG = 72, pinkB = 153;
            const blueR = 96, blueG = 165, blueB = 250;
            const t = micSucceeded ? 1 : amp;
            const r = Math.round(blueR + (pinkR - blueR) * Math.min(t * 2.5, 1));
            const g = Math.round(blueG + (pinkG - blueG) * Math.min(t * 2.5, 1));
            const b = Math.round(blueB + (pinkB - blueB) * Math.min(t * 2.5, 1));
            const col = micSucceeded ? '#4ade80' : `rgb(${r},${g},${b})`;

            /* â”€â”€ Draw dual mirrored filled waves â”€â”€ */
            function drawFilledWave(flip) {
                ctx.beginPath();
                const sliceW = W / (waveData.length - 1);
                let x = 0;
                ctx.moveTo(0, H / 2);
                for (let i = 0; i < waveData.length; i++) {
                    const v = (waveData[i] / 128.0) - 1;   /* -1 to +1 */
                    const vy = (v * (H / 2 - 6) * (amp < 0.01 ? 0.08 : 1)) * (flip ? -1 : 1);
                    const py = H / 2 + vy;
                    i === 0 ? ctx.moveTo(x, py) : ctx.lineTo(x, py);
                    x += sliceW;
                }
                ctx.lineTo(W, H / 2);
                ctx.lineTo(0, H / 2);
                ctx.closePath();

                const grad = ctx.createLinearGradient(0, 0, W, 0);
                grad.addColorStop(0, `rgba(${r},${g},${b},0.06)`);
                grad.addColorStop(0.5, `rgba(${r},${g},${b},${flip ? 0.18 : 0.28})`);
                grad.addColorStop(1, `rgba(${r},${g},${b},0.06)`);
                ctx.fillStyle = micSucceeded ? 'rgba(74,222,128,0.18)' : grad;
                ctx.fill();
            }

            drawFilledWave(false);   /* top wave  */
            drawFilledWave(true);    /* mirror    */

            /* â”€â”€ Stroke line on top wave (crisp) â”€â”€ */
            ctx.beginPath();
            const sw2 = W / (waveData.length - 1);
            let x2 = 0;
            for (let i = 0; i < waveData.length; i++) {
                const v = (waveData[i] / 128.0) - 1;
                const vy = v * (H / 2 - 6) * (amp < 0.01 ? 0.08 : 1);
                const py = H / 2 + vy;
                i === 0 ? ctx.moveTo(x2, py) : ctx.lineTo(x2, py);
                x2 += sw2;
            }
            const lineGrad = ctx.createLinearGradient(0, 0, W, 0);
            lineGrad.addColorStop(0, 'transparent');
            lineGrad.addColorStop(0.15, col);
            lineGrad.addColorStop(0.85, col);
            lineGrad.addColorStop(1, 'transparent');
            ctx.strokeStyle = micSucceeded ? '#4ade80' : lineGrad;
            ctx.lineWidth = micSucceeded ? 2.8 : 2.2;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.stroke();

            /* â”€â”€ Center idle heartbeat glow when silent â”€â”€ */
            if (amp < 0.025) {
                wavePhase += 0.03;
                const pulse = 0.45 + Math.sin(wavePhase) * 0.22;
                ctx.save();
                ctx.font = `${14 + Math.sin(wavePhase) * 3}px serif`;
                ctx.globalAlpha = pulse;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('ðŸ’™', W / 2, H / 2);
                ctx.restore();
            }

            /* â”€â”€ Spawn floating hearts when speaking loud â”€â”€ */
            if (amp > 0.18 && now - lastHeartSpawn > 160) {
                lastHeartSpawn = now;
                spawnWaveHeart(amp);
            }

            /* â”€â”€ Center amplitude circle â”€â”€ */
            if (amp > 0.08) {
                const radius = 4 + amp * 32;
                ctx.save();
                ctx.beginPath();
                ctx.arc(W / 2, H / 2, radius, 0, Math.PI * 2);
                ctx.fillStyle = micSucceeded
                    ? `rgba(74,222,128,${amp * 0.25})`
                    : `rgba(${r},${g},${b},${amp * 0.2})`;
                ctx.fill();
                ctx.restore();
            }
        }

        /* Spawn a floating heart emoji over the canvas */
        function spawnWaveHeart(amp) {
            const container = document.getElementById('waveHearts');
            if (!container) return;
            const emojis = ['ðŸ’™', 'ðŸ’œ', 'ðŸ’—', 'ðŸ’–', 'âœ¨', 'ðŸŒ¸', 'ðŸ’•', 'ðŸ’'];
            const el = document.createElement('span');
            el.className = 'wh';
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = (10 + Math.random() * 80) + '%';

        }

        /* â”€â”€ EASING HELPER â”€â”€ */
        function easeOutBack(x) {
            const c1 = 1.70158, c3 = c1 + 1;
            return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
        }

        /* â”€â”€ HEART PATH HELPER (canvas) â”€â”€ */
        function canvasHeart(ctx, cx, cy, size) {
            ctx.beginPath();
            ctx.moveTo(cx, cy + size * 0.35);
            ctx.bezierCurveTo(cx + size * 1.1, cy - size * 0.35,
                cx + size * 1.1, cy - size * 1.1, cx, cy - size * 0.55);
            ctx.bezierCurveTo(cx - size * 1.1, cy - size * 1.1,
                cx - size * 1.1, cy - size * 0.35, cx, cy + size * 0.35);
            ctx.closePath();
        }

        /* â”€â”€ HEART BLAST SEQUENCE â”€â”€ */
        /* Phase 1: heart grows 0 â†’ full  (GROW_MS)
           Phase 2: heart explodes + particles shoot out (BLAST_MS)
           Then: doHeartRain() + goNext()                                     */
        function doHeartBlast() {
            const canvas = document.getElementById('micCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const cx = W / 2, cy = H / 2;

            const GROW_MS = 1300;   /* ms to grow heart              */
            const BLAST_MS = 700;    /* ms for explosion              */
            const EMOJIS = ['ðŸ’™', 'ðŸ’œ', 'ðŸ’—', 'ðŸ’–', 'âœ¨', 'â­', 'ðŸŒ¸', 'ðŸ’•', 'ðŸ’', 'ðŸŽ€', 'ðŸ¥¹'];

            let startT = null;
            let blastStartT = null;
            let particles = [];
            let phase = 'grow';
            let blstRaf = null;

            /* Build explosion particle list */
            function buildParticles(ts) {
                blastStartT = ts;
                for (let i = 0; i < 22; i++) {
                    const angle = (i / 22) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
                    const speed = 55 + Math.random() * 90;  /* px per second */
                    particles.push({
                        angle, speed,
                        emoji: EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
                        sz: 0.85 + Math.random() * 1.1
                    });
                }
            }

            function frame(ts) {
                if (!startT) startT = ts;
                const elapsed = ts - startT;
                ctx.clearRect(0, 0, W, H);

                if (phase === 'grow') {
                    /* â”€â”€ GROW PHASE â”€â”€ */
                    const prog = Math.min(elapsed / GROW_MS, 1);
                    const scale = Math.max(0.001, easeOutBack(prog));
                    const size = scale * Math.min(W, H) * 0.40;

                    /* Radial gradient fill */
                    const grd = ctx.createRadialGradient(cx, cy - size * 0.18, size * 0.05,
                        cx, cy, size * 1.1);
                    grd.addColorStop(0, 'rgba(255,180,220,1)');
                    grd.addColorStop(0.4, 'rgba(236,72,153,0.95)');
                    grd.addColorStop(0.8, 'rgba(168,85,247,0.85)');
                    grd.addColorStop(1, 'rgba(80,10,60,0.7)');

                    ctx.save();
                    ctx.shadowColor = 'rgba(236,72,153,0.85)';
                    ctx.shadowBlur = 10 + scale * 30;
                    canvasHeart(ctx, cx, cy, size);
                    ctx.fillStyle = grd;
                    ctx.fill();
                    ctx.restore();

                    /* Pulsing ring that appears mid-growth */
                    if (prog > 0.35) {
                        const rProg = (prog - 0.35) / 0.65;
                        ctx.beginPath();
                        ctx.arc(cx, cy - size * 0.05, size * (1.15 + rProg * 0.25), 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(236,72,153,${0.4 * (1 - rProg)})`;
                        ctx.lineWidth = 2.5;
                        ctx.stroke();

                        /* Second ring slightly behind */
                        ctx.beginPath();
                        ctx.arc(cx, cy - size * 0.05, size * (1.30 + rProg * 0.2), 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(168,85,247,${0.25 * (1 - rProg)})`;
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }

                    /* Small text hint while growing */
                    if (prog < 0.6) {
                        ctx.save();
                        ctx.globalAlpha = prog;
                        ctx.font = `${Math.floor(12 + prog * 6)}px serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('ðŸ’™', cx, cy - size * 0.08);
                        ctx.restore();
                    }

                    if (prog >= 1) {
                        phase = 'blast';
                        buildParticles(ts);
                    }

                } else if (phase === 'blast') {
                    /* â”€â”€ BLAST PHASE â”€â”€ */
                    const bElapsed = ts - blastStartT;
                    const bProg = Math.min(bElapsed / BLAST_MS, 1);

                    /* Fading heart at center that expands outward */
                    const heartAlpha = Math.max(0, 1 - bProg * 2.2);
                    if (heartAlpha > 0) {
                        const size = Math.min(W, H) * 0.40 * (1 + bProg * 0.7);
                        const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 1.1);
                        grd.addColorStop(0, `rgba(255,220,240,${heartAlpha})`);
                        grd.addColorStop(0.5, `rgba(236,72,153,${heartAlpha * 0.7})`);
                        grd.addColorStop(1, `rgba(168,85,247,0)`);
                        ctx.save();
                        canvasHeart(ctx, cx, cy, size);
                        ctx.fillStyle = grd;
                        ctx.fill();
                        ctx.restore();
                    }

                    /* Flash white burst at frame 0 */
                    if (bProg < 0.12) {
                        const flashA = (0.12 - bProg) / 0.12;
                        ctx.save();
                        ctx.globalAlpha = flashA * 0.55;
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(0, 0, W, H);
                        ctx.restore();
                    }

                    /* Fly particles outward */
                    const dt = bElapsed / 1000;   /* seconds elapsed since blast */
                    particles.forEach(p => {
                        const dist = p.speed * dt;
                        const px = cx + Math.cos(p.angle) * dist;
                        const py = cy + Math.sin(p.angle) * dist;
                        const pA = Math.max(0, 1 - bProg * 1.6);
                        ctx.save();
                        ctx.globalAlpha = pA;
                        ctx.font = `${p.sz}rem serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(p.emoji, px, py);
                        ctx.restore();
                    });

                    if (bProg >= 1) {
                        ctx.clearRect(0, 0, W, H);   /* final clean */
                        return;                        /* stop RAF     */
                    }
                }

                blstRaf = requestAnimationFrame(frame);
            }

            blstRaf = requestAnimationFrame(frame);
        }


        /* â”€â”€ SPEECH RECOGNITION â”€â”€ */
        let speechRec = null, micActive = false, micSucceeded = false;
        let waveAn = null, waveData = null, waveRAF = null;
        let micSkips = 0, micSkipTmr = null;

        function micCircleClick() {

        function startSpeech() {
            if (micSucceeded || micActive) return;
            const btn = document.getElementById('micBtn');
            const status = document.getElementById('micStatus');
            const circle = document.getElementById('micCircle');
            const heard = document.getElementById('micHeard');

            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                if (status) status.textContent = CONFIG.mic.notSupported;
                return;
            }

            micActive = true;
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!speechRec) {
                speechRec = new Speech();
                speechRec.lang = 'en-US';
                speechRec.continuous = true;
                speechRec.interimResults = true;

                speechRec.onstart = () => {
                    if (status) {
                        status.textContent = CONFIG.mic.listening;
                        status.classList.add('active');
                    }
                    if (btn) {
                        btn.textContent = "ðŸ”´ Listening...";
                        btn.classList.add('recording');
                    }
                    if (circle) circle.classList.add('listening');
                };

                speechRec.onresult = (e) => {
                    let transcript = '';
                    let isFinal = false;
                    for (let i = e.resultIndex; i < e.results.length; ++i) {
                        transcript += e.results[i][0].transcript;
                        if (e.results[i].isFinal) isFinal = true;
                    }
                    if (transcript) {
                        const msg = transcript.toLowerCase().trim();
                        if (heard) heard.textContent = `Heard: "${msg}"`;

                        /* â”€â”€ WAVE BURST FOR MUTED HARDWARE â”€â”€ */
                        window.fakeAmpBurst = 1.0;

                        /* â”€â”€ FLYING WORDS EFFECT â”€â”€ */
                        if (window.lastFlyIndex !== e.resultIndex) {
                            window.lastFlyIndex = e.resultIndex;
                            window.lastWordCount = 0;
                        }

                        let words = msg.split(/\s+/).filter(w => w.length > 0);
                        let wCount = words.length;

                        /* Spawn ALL newly detected words since the last interim chunk */
                        if (wCount > (window.lastWordCount || 0)) {
                            let newWords = words.slice(window.lastWordCount || 0);
                            window.lastWordCount = wCount;

                            newWords.forEach((fwText, idx) => {
                                setTimeout(() => {
                                    const fw = document.createElement('div');
                                    fw.className = 'fly-word';
                                    fw.textContent = fwText;

                                    const colors = ['#3b82f6', '#ec4899', '#facc15', '#a855f7', '#4ade80', '#60a5fa'];
                                    fw.style.color = colors[Math.floor(Math.random() * colors.length)];
                                    fw.style.left = (10 + Math.random() * 60) + 'vw';
                                    fw.style.top = (75 + Math.random() * 10) + 'vh';
                                    document.body.appendChild(fw);

                                    gsap.fromTo(fw,
                                        { scale: 0.2, opacity: 0, y: 0, rotation: -20 + Math.random() * 40 },
                                        {
                                            scale: 1.2, opacity: 0.9, y: -(150 + Math.random() * 100), rotation: -40 + Math.random() * 80, duration: 1.8, ease: "power2.out",
                                            onComplete: () => {
                                                gsap.to(fw, { opacity: 0, y: "-=80", duration: 1.2, ease: "power1.in", onComplete: () => fw.remove() });
                                            }
                                        }
                                    );
                                }, idx * 250); // Stagger animations if multiple words caught at once
                            });
                        }

                        /* PROACTIVE TRIGGER: check magics on every interim result too */
                        const magics = CONFIG.mic.magics;

                        /* Strip punctuation to ensure words like 'hi!' or 'hi.' match exactly */
                        const cleanMsg = msg.replace(/[.,!?]/g, '').toLowerCase().trim();

                        if (magics.some(m => cleanMsg.includes(m.toLowerCase()))) {
                            speechRec.stop();
                            micSuccess();
                        }
                    }
                };

                speechRec.onerror = (e) => {
                    console.error("Speech error", e.error);
                    micActive = false;
                    if (e.error === 'not-allowed') {
                        if (status) status.textContent = CONFIG.mic.denied;
                    } else {
                        if (status) status.textContent = CONFIG.mic.error;
                    }
                    if (btn) {
                        btn.textContent = "ðŸŽ¤ Start Listening";
                        btn.classList.remove('recording');
                    }
                    if (circle) circle.classList.remove('listening');
                };

                speechRec.onend = () => {
                    micActive = false;

                    /* Continuous Mode: If they haven't succeeded and are STILL on the mic step, immediately reboot mic WITHOUT changing UI to 'stopped' */
                    if (!micSucceeded && ST[cur].nav === 'iloveyou') {
                        try {
                            speechRec.start();
                        } catch (e) {
                            setTimeout(() => { if (!micSucceeded && !micActive) startSpeech(); }, 500);
                        }
                    } else if (micSucceeded || ST[cur].nav !== 'iloveyou') {
                        if (btn) {
                            btn.textContent = "ðŸŽ¤ Start Listening";
                            btn.classList.remove('recording');
                        }
                        if (circle) circle.classList.remove('listening');
                    }
                };
            }

            try { speechRec.start(); } catch (e) { }
        }

        let actx = null;
        let fakeWaveTmr = null;
        async function initAudioContext() {
            if (actx || fakeWaveTmr) return;

            /* ONLY apply fake wave to iOS (Safari/Chrome on iOS)
               Android Chrome actually *benefits* from getUserMedia to keep interimResults fully active and streaming!
               iOS Safari strictly blocks SpeechRec if getUserMedia is running simultaneously. */
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (isIOS) {
                /* FAKE WAVE FOR iOS */
                waveData = new Uint8Array(256);
                fakeWaveTmr = setInterval(() => {
                    if (!micActive) return;
                    for (let i = 0; i < waveData.length; i++) {
                        waveData[i] = 128 + (Math.random() > 0.5 ? Math.random() * 40 : -Math.random() * 40);
                    }
                }, 80);
                drawWave();
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                actx = new (window.AudioContext || window.webkitAudioContext)();
                if (actx.state === 'suspended') await actx.resume();

                waveAn = actx.createAnalyser();
                waveAn.fftSize = 256;
                const source = actx.createMediaStreamSource(stream);
                source.connect(waveAn);
                waveData = new Uint8Array(waveAn.frequencyBinCount);
                drawWave();
            } catch (e) {
                console.error("Audio Context Error. Faking wave fallback.", e);
                // Fallback to detailed fake wave if Desktop/Android fails
                waveData = new Uint8Array(256);
                fakeWaveTmr = setInterval(() => {
                    if (!micActive) return;
                    for (let i = 0; i < waveData.length; i++) {
                        waveData[i] = 128 + (Math.random() > 0.5 ? Math.random() * 40 : -Math.random() * 40);
                    }
                }, 80);
                drawWave();
            }
        }

        /* â”€â”€ REAL PUZZLE GAME â€“ 4Ã—3 = 12 pieces drag-and-drop â”€â”€ */
        const PIC = CONFIG.puzzleImage;   /* ðŸ“¸ Pulled from CONFIG */
        const PZ_COLS = 4, PZ_ROWS = 3; /* 12 pieces */

        function buildPuzzle() {
            const board = document.getElementById('pzBoard');
            const tray = document.getElementById('pzTray');
            const stat = document.getElementById('pzStat');
            if (!board || board.dataset.built) return;
            board.dataset.built = '1';

            /* â”€â”€ Responsive piece size â”€â”€ */
            const cardW = document.getElementById('card').offsetWidth || 360;
            const PW = Math.floor((cardW - 28) / PZ_COLS) - 2;   /* piece width  */
            const PH = Math.floor(PW * 0.75);                      /* 4:3 ratio    */
            const TOTAL = PZ_COLS * PZ_ROWS;
            let placed = 0;
            let dragTile = null, dragPid = -1, dragClone = null;

            /* Apply grid dimensions */
            board.style.gridTemplateColumns = `repeat(${PZ_COLS}, ${PW}px)`;
            board.style.gridTemplateRows = `repeat(${PZ_ROWS}, ${PH}px)`;
            tray.style.gridTemplateColumns = `repeat(${PZ_COLS}, ${PW}px)`;
            tray.style.maxHeight = (PH * 2 + 4 * 3) + 'px';  /* show 2 rows */

            /* â”€â”€ Build board slots â”€â”€ */
            for (let i = 0; i < TOTAL; i++) {
                const slot = document.createElement('div');
                slot.className = 'pz-slot';
                slot.dataset.slotId = i;
                /* Ghost hint: faint image in background so user knows correct position */
                slot.style.backgroundImage = `url('${PIC}')`;
                slot.style.backgroundSize = `${PZ_COLS * PW}px ${PZ_ROWS * PH}px`;
                slot.style.backgroundPosition = `-${(i % PZ_COLS) * PW}px -${Math.floor(i / PZ_COLS) * PH}px`;
                slot.style.opacity = '1';
                /* Ghost filter â€“ very dark until filled */
                slot.style.filter = 'brightness(0.12) saturate(0.3)';
                board.appendChild(slot);
            }

            /* â”€â”€ Build shuffled tray pieces â”€â”€ */
            const ids = [...Array(TOTAL).keys()].sort(() => Math.random() - 0.5);
            ids.forEach(pid => {
                const r = Math.floor(pid / PZ_COLS), c = pid % PZ_COLS;
                const tile = document.createElement('div');
                tile.className = 'pz-tile';
                tile.dataset.pid = pid;
                tile.style.width = PW + 'px';
                tile.style.height = PH + 'px';
                tile.style.backgroundImage = `url('${PIC}')`;
                tile.style.backgroundSize = `${PZ_COLS * PW}px ${PZ_ROWS * PH}px`;
                tile.style.backgroundPosition = `-${c * PW}px -${r * PH}px`;
                tray.appendChild(tile);
            });

            /* â”€â”€ Drag Manager â”€â”€ */
            function startDrag(tile, cx, cy) {
                dragTile = tile;
                dragPid = parseInt(tile.dataset.pid);
                dragClone = document.createElement('div');
                dragClone.className = 'pz-drag-clone';
                dragClone.style.width = PW + 'px';
                dragClone.style.height = PH + 'px';
                dragClone.style.backgroundImage = tile.style.backgroundImage;
                dragClone.style.backgroundSize = tile.style.backgroundSize;
                dragClone.style.backgroundPosition = tile.style.backgroundPosition;
                dragClone.style.left = (cx - PW / 2) + 'px';
                dragClone.style.top = (cy - PH / 2) + 'px';
                document.body.appendChild(dragClone);
                tile.style.opacity = '.3';
            }

            function moveDrag(cx, cy) {
                if (!dragClone) return;
                dragClone.style.left = (cx - PW / 2) + 'px';
                dragClone.style.top = (cy - PH / 2) + 'px';
                board.querySelectorAll('.pz-slot').forEach(s => s.classList.remove('pz-highlight'));
                const el = document.elementFromPoint(cx, cy);
                const slot = el && el.closest('.pz-slot');
                if (slot && !slot.dataset.filled) slot.classList.add('pz-highlight');
            }

            function endDrag(cx, cy) {
                if (!dragClone || !dragTile) return;
                dragClone.remove(); dragClone = null;
                board.querySelectorAll('.pz-slot').forEach(s => s.classList.remove('pz-highlight'));
                const pid = dragPid;
                const tile = dragTile;
                dragTile = null; dragPid = -1;
                tile.style.opacity = '';

                const el = document.elementFromPoint(cx, cy);
                const slot = el && el.closest('.pz-slot');
                if (!slot || slot.dataset.filled) return;

                if (parseInt(slot.dataset.slotId) === pid) {
                    /* âœ… CORRECT */
                    slot.dataset.filled = '1';
                    slot.classList.add('pz-filled');
                    slot.style.filter = 'none';  /* reveal full-colour piece */
                    slot.style.border = 'none';
                    tile.classList.add('pz-placed');

                    /* Green flash */
                    slot.classList.add('pz-correct');
                    setTimeout(() => slot.classList.remove('pz-correct'), 520);

                    /* GSAP micro-scale bounce on the slot */
                    gsap.fromTo(slot, { scale: 1.12 }, { scale: 1, duration: 0.4, ease: 'back.out(1.6)' });

                    placed++;
                    stat.innerHTML = `<span>âœ¨ ${placed}/${TOTAL} placed!</span>`;

                    if (placed === TOTAL) {
                        stat.innerHTML = '<span>ðŸŽ‰ Perfect! Our memory is revealed! ðŸ’™</span>';
                        savePz();
                        /* GSAP board celebration glow */
                        gsap.timeline()
                            .to(board, { boxShadow: '0 0 50px rgba(96,165,250,.85)', scale: 1.04, duration: 0.4, ease: 'power2.out' })
                            .to(board, { boxShadow: '0 0 0px rgba(96,165,250,0)', scale: 1, duration: 0.7, ease: 'elastic.out(1,0.5)' });
                        doConfetti();
                        setTimeout(goNext, 2400);
                    }
                } else {
                    /* âŒ WRONG â€“ shake slot */
                    slot.classList.add('pz-wrong');
                    setTimeout(() => slot.classList.remove('pz-wrong'), 400);
                }
            }

            /* Touch handlers */
            const stepEl = board.closest('.stp');
            const onTS = e => {
                const tile = e.target.closest('.pz-tile:not(.pz-placed)');
                if (!tile) return;
                e.stopPropagation();
                const t = e.touches[0];
                startDrag(tile, t.clientX, t.clientY);
            };
            const onTM = e => {
                if (!dragClone) return;
                const t = e.touches[0];
                moveDrag(t.clientX, t.clientY);
            };
            const onTE = e => {
                if (!dragClone) return;
                const t = e.changedTouches[0];
                endDrag(t.clientX, t.clientY);
            };

            /* Mouse handlers */
            const onMS = e => {
                const tile = e.target.closest('.pz-tile:not(.pz-placed)');
                if (!tile) return;
                e.preventDefault();
                startDrag(tile, e.clientX, e.clientY);
            };
            const onMM = e => { if (dragClone) moveDrag(e.clientX, e.clientY); };
            const onMU = e => { if (dragClone) endDrag(e.clientX, e.clientY); };

            stepEl.addEventListener('touchstart', onTS, { passive: true });
            document.addEventListener('touchmove', onTM, { passive: true });
            document.addEventListener('touchend', onTE, { passive: true });
            stepEl.addEventListener('mousedown', onMS);
            document.addEventListener('mousemove', onMM);
            document.addEventListener('mouseup', onMU);

            /* Cleanup when leaving this step */
            const pzIdx = ST.findIndex(s => s.puzzle);
            registerCleanup(pzIdx, () => {
                stepEl.removeEventListener('touchstart', onTS);
                document.removeEventListener('touchmove', onTM);
                document.removeEventListener('touchend', onTE);
                stepEl.removeEventListener('mousedown', onMS);
                document.removeEventListener('mousemove', onMM);
                document.removeEventListener('mouseup', onMU);
                if (dragClone) { dragClone.remove(); dragClone = null; }
            });
        }

                }

                /* Staggered entrance, then start mobile breathing effect */
                gsap.to(lc, {
                    opacity: 1, y: 0, rotateX: 0, duration: 1, ease: 'power3.out',
                    onComplete: () => {
                        /* Only apply float once entrance is completely done, looks better on mobile */
                        lc.style.transform = '';
                        lc.classList.add('lc-float');
                    }
                });
                gsap.to(items, { opacity: 1, y: 0, stagger: 0.1, duration: 0.8, ease: 'power2.out', delay: 0.3 });
            }

            /* â”€â”€ WAIT FOR AUDIO TO BUFFER BEFORE SHOWING â”€â”€ */
            let isLoaded = false;
            function tryLoad() {
                if (isLoaded) return;
                isLoaded = true;
                if (typeof window._loaderComplete === 'function') window._loaderComplete();
                setTimeout(startLoginScreen, 350); /* tiny pause so bar hits 100% visibly */
            }

            if (bgm && bgm.readyState >= 3) {
                // Already fully loaded and ready to play
                tryLoad();
            } else if (bgm) {
                // Wait for network to download enough of it
                bgm.addEventListener('canplaythrough', tryLoad);

                // Fallback in case network is too slow, force load after 8 seconds anyway
                setTimeout(tryLoad, 8000);
            } else {
                tryLoad();
            }

            /* Magic Sparkles around Login for Mobile First */
            setInterval(() => {
                if (loginSection.style.display === 'none' || loginSection.classList.contains('out')) return;
                const sp = document.createElement('div');
                sp.className = 'l-sparkle';
                sp.style.left = Math.random() * 100 + 'vw';
                sp.style.top = Math.random() * 100 + 'vh';
                const size = 2 + Math.random() * 4;
                sp.style.width = size + 'px';
                sp.style.height = size + 'px';
                loginSection.appendChild(sp);

                const upDir = -50 - Math.random() * 100;
                gsap.to(sp, {
                    y: upDir,
                    x: -20 + Math.random() * 40,
                    opacity: Math.random() * 0.8 + 0.2,
                    duration: 2 + Math.random() * 2,
                    ease: "power1.out",
                    onComplete: () => {
                        gsap.to(sp, { opacity: 0, duration: 0.5, onComplete: () => sp.remove() });
                    }
                });
            }, 300);

            /* Parallax tilt mapped specifically to lower power devices */
            let isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (!isMobile) {
                document.addEventListener('mousemove', e => {
                    if (loginSection.style.display === 'none') return;
                    const x = (e.clientX / window.innerWidth - 0.5) * 10;
                    const y = (e.clientY / window.innerHeight - 0.5) * -10;
                    gsap.to(lc, { rotateY: x, rotateX: y, duration: 0.8, ease: 'power2.out' });
                });
            }

            /* Keypad â€“ pure CSS handles press, no GSAP for speed */
            document.querySelectorAll('.pb').forEach(btn => {
                /* Pass the button element so pp() can burst from its position */
                const origOnclick = btn.getAttribute('onclick');
                if (origOnclick && origOnclick.startsWith("pp(")) {
                    const digit = origOnclick.match(/pp\('(\d)'\)/)?.[1];
                    if (digit !== undefined) {
                        btn.setAttribute('onclick', `pp('${digit}',this)`);
                    }
                }
            });
        };
    </script>
</body>

</html>
