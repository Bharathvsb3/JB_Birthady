<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Happy Birthday Jenifar 💙</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        @keyframes hburst {
            0% {
                opacity: 1;
                transform: scale(1) translate(0, 0)
            }

            100% {
                opacity: 0;
                transform: scale(1.8) translate(var(--dx, 20px), var(--dy, -60px))
            }
        }

        /* CINEMATIC OVERLAY */
        #stepOverlay {
            position: fixed;
            inset: 0;
            background: #020c22;
            z-index: 500;
            pointer-events: none;
            opacity: 0;
        }

        /* RESUME BANNER */
        #resumeBanner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 64, 175, .94);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(96, 165, 250, .3);
            border-radius: 50px;
            padding: 11px 20px;
            z-index: 9999;
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: .8rem;
            color: #fff;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
            opacity: 0;
            pointer-events: none;
        }

        #resumeBanner button {
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            font-weight: 700;
            cursor: pointer;
            font-size: .78rem;
        }

        .rb-yes {
            background: #3b82f6;
            color: #fff;
        }

        .rb-no {
            background: none;
            color: rgba(255, 255, 255, .45);
        }

        /* COUNTDOWN */
        #countdownOverlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(30, 58, 138, .96), rgba(2, 12, 34, .99));
            z-index: 9998;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #cdNum {
            font-size: clamp(6rem, 20vw, 9rem);
            font-weight: 800;
            color: #60a5fa;
            line-height: 1;
            filter: drop-shadow(0 0 40px rgba(96, 165, 250, .7));
        }

        #cdMsg {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(1.6rem, 6vw, 2.4rem);
            color: rgba(255, 255, 255, .7);
            text-align: center;
            padding: 0 20px;
        }

        /* BUTTON MICRO-INTERACTIONS */
        .mic-btn,
        .call-btn {
            transform-origin: center;
            will-change: transform;
        }

        .mic-btn:hover {
            transform: scale(1.05);
        }

        .mic-btn:active {
            transform: scale(0.93);
        }

        .call-btn:hover {
            transform: scale(1.05) translateY(-2px);
        }

        .call-btn:active {
            transform: scale(0.95);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020c22;
            overflow: hidden;
            color: #fff;
            user-select: none;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            filter: blur(100px);
            opacity: .7;
            pointer-events: none;
        }

        .b {
            position: absolute;
            border-radius: 50%;
        }

        .b1 {
            width: 600px;
            height: 600px;
            top: -150px;
            left: -150px;
            background: radial-gradient(circle, #1e40af, transparent 70%);
            animation: m1 20s infinite alternate;
        }

        .b2 {
            width: 550px;
            height: 550px;
            bottom: -130px;
            right: -130px;
            background: radial-gradient(circle, #0284c7, transparent 70%);
            animation: m2 24s infinite alternate;
        }

        .b3 {
            width: 450px;
            height: 450px;
            top: 35%;
            left: 20%;
            background: radial-gradient(circle, #4f46e5, transparent 70%);
            animation: m3 16s infinite alternate;
        }

        @keyframes m1 {
            to {
                transform: translate(200px, 250px)scale(1.2)
            }
        }

        @keyframes m2 {
            to {
                transform: translate(-200px, -200px)scale(.8)
            }
        }

        @keyframes m3 {
            from {
                transform: translate(-40%, -40%)
            }

            to {
                transform: translate(100px, -220px)scale(1.25)
            }
        }

        .pt {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            animation: ptr 7s linear infinite;
        }

        @keyframes ptr {
            0% {
                transform: translateY(106vh)rotate(0);
                opacity: 0
            }

            12% {
                opacity: .5
            }

            88% {
                opacity: .4
            }

            100% {
                transform: translateY(-12vh)rotate(380deg);
                opacity: 0
            }
        }

        /* LOGIN */
        #login {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lc {
            width: 100%;
            max-width: 360px;
            background: rgba(2, 8, 30, .88);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 40px;
            border: 1px solid rgba(96, 165, 250, .22);
            box-shadow: 0 35px 80px rgba(0, 0, 0, .65);
            padding: 44px 26px 34px;
            text-align: center;
            animation: popIn .75s cubic-bezier(.34, 1.56, .64, 1);
        }

        @keyframes popIn {
            from {
                transform: scale(.78);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        #login.out {
            animation: lout .5s ease forwards;
            pointer-events: none;
        }

        @keyframes lout {
            to {
                opacity: 0;
                transform: scale(1.08)
            }
        }

        .hrt {
            font-size: 3.8rem;
            display: block;
            margin-bottom: 14px;
            animation: hp 1.6s ease-in-out infinite;
        }

        @keyframes hp {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 10px #3b82f6)
            }

            50% {
                transform: scale(1.14);
                filter: drop-shadow(0 0 24px #60a5fa)
            }
        }

        .lt {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2rem, 8vw, 2.8rem);
            color: #60a5fa;
            margin-bottom: 6px;
        }

        .ls {
            font-size: .82rem;
            color: rgba(255, 255, 255, .38);
            margin-bottom: 18px;
        }

        .clue {
            background: rgba(59, 130, 246, .07);
            border: 1px solid rgba(59, 130, 246, .18);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 20px;
        }

        .ct {
            font-size: .82rem;
            color: rgba(255, 255, 255, .6);
            line-height: 1.6;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 13px;
            margin-bottom: 14px;
        }

        .dot {
            width: 17px;
            height: 17px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .07);
            border: 2px solid rgba(59, 130, 246, .22);
            transition: all .22s;
        }

        .dot.on {
            background: #3b82f6;
            border-color: #60a5fa;
            box-shadow: 0 0 14px #3b82f6;
            transform: scale(1.22);
        }

        #lerr {
            font-size: .82rem;
            font-weight: 700;
            min-height: 22px;
            margin-bottom: 10px;
            color: #f87171;
        }

        @keyframes shk {

            0%,
            100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-8px)
            }

            75% {
                transform: translateX(8px)
            }
        }

        .pgrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 11px;
            margin-bottom: 10px;
        }

        .pb {
            background: rgba(59, 130, 246, .07);
            border: 1px solid rgba(59, 130, 246, .18);
            border-radius: 18px;
            padding: 15px 0;
            font-size: 1.28rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all .15s;
        }

        .pb:active {
            transform: scale(.88);
            background: rgba(59, 130, 246, .3);
        }

        .pb.del {
            color: rgba(255, 255, 255, .38);
            font-size: 1rem;
        }

        .pb.z {
            grid-column: 2;
        }

        /* CARD */
        #card {
            width: 94%;
            max-width: 440px;
            height: 90dvh;
            max-height: 830px;
            border-radius: 42px;
            background: rgba(2, 10, 35, .6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 35px 80px rgba(0, 0, 0, .6), 0 0 0 1px rgba(96, 165, 250, .12) inset;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(32px);
            transition: all .85s cubic-bezier(.34, 1.56, .64, 1);
        }

        #card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .prog {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            z-index: 20;
            background: rgba(255, 255, 255, .05);
        }

        #pbi {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1d4ed8, #38bdf8, #818cf8);
            transition: width .7s ease;
        }

        .sbadge {
            position: absolute;
            top: 14px;
            right: 16px;
            z-index: 20;
            background: rgba(59, 130, 246, .14);
            border: 1px solid rgba(59, 130, 246, .28);
            border-radius: 50px;
            padding: 5px 14px;
            font-size: .7rem;
            font-weight: 700;
            color: #60a5fa;
        }

        .sw {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .stp {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform: translateX(105%);
            transition: transform .55s cubic-bezier(.4, 1, .2, 1), opacity .35s ease;
            overflow-y: auto;
            scrollbar-width: none;
            z-index: 1;
        }

        .stp::-webkit-scrollbar {
            display: none;
        }

        .stp.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
            z-index: 2;
            /* Active step always on top */
        }

        .stp.exit {
            opacity: 0;
            transform: translateX(-105%);
            z-index: 1;
        }

        /* Back-navigation: previous step enters from left */
        .stp.from-left {
            opacity: 0 !important;
            transform: translateX(-105%) !important;
            pointer-events: none !important;
            transition: none !important;
            /* Snap instantly, no animation */
        }

        /* Snap to off-screen right instantly (no animation), then animate in */
        .stp.snap-right {
            opacity: 0 !important;
            transform: translateX(105%) !important;
            pointer-events: none !important;
            transition: none !important;
            /* Snap instantly */
        }

        /* STEP CONTENT */
        .inner {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 22px 16px;
            text-align: center;
            gap: 10px;
        }

        .s-icon {
            font-size: clamp(3rem, 11vw, 4.5rem);
            animation: flt 3.2s ease-in-out infinite;
            filter: drop-shadow(0 0 16px rgba(96, 165, 250, .35));
        }

        @keyframes flt {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-16px)
            }
        }

        .s-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.2rem, 9vw, 3rem);
            color: #60a5fa;
            text-shadow: 0 0 30px rgba(96, 165, 250, .3);
        }

        .s-head {
            font-size: 1.05rem;
            font-weight: 700;
            color: rgba(255, 255, 255, .88);
            line-height: 1.45;
        }

        .s-txt {
            font-size: .88rem;
            color: rgba(255, 255, 255, .6);
            line-height: 1.75;
            white-space: pre-line;
            max-width: 340px;
        }

        .mf {
            width: 90%;
            height: 155px;
            border-radius: 22px;
            overflow: hidden;
            flex-shrink: 0;
            transform: rotate(-1.5deg);
            box-shadow: 0 14px 40px rgba(0, 0, 0, .35);
            border: 2px solid rgba(255, 255, 255, .1);
        }

        .mf img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .trick-bar {
            flex-shrink: 0;
            padding: 13px 18px;
            background: rgba(30, 64, 175, .12);
            border-top: 1px solid rgba(59, 130, 246, .18);
            font-size: .75rem;
            font-weight: 700;
            color: #7dd3fc;
            letter-spacing: .6px;
            text-align: center;
        }

        /* LIVE AGE COUNTER */
        .age-live {
            display: flex;
            gap: 7px;
            justify-content: center;
            flex-wrap: nowrap;
            margin: 10px 0;
        }

        .ac-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(59, 130, 246, .1);
            border: 1px solid rgba(59, 130, 246, .22);
            border-radius: 14px;
            padding: 10px 8px;
            min-width: clamp(46px, 13vw, 62px);
        }

        .ac-n {
            font-size: clamp(1.1rem, 4.5vw, 1.6rem);
            font-weight: 800;
            color: #60a5fa;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
        }

        .ac-u {
            font-size: .6rem;
            color: rgba(255, 255, 255, .37);
            text-transform: uppercase;
            letter-spacing: .4px;
            margin-top: 2px;
        }

        /* MUSIC */
        .vinyl {
            font-size: 6rem;
            display: block;
            cursor: pointer;
            animation: spin 4s linear infinite;
            filter: drop-shadow(0 0 22px rgba(96, 165, 250, .55));
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .plbl {
            font-size: .85rem;
            color: rgba(255, 255, 255, .45);
            margin-top: 6px;
        }

        /* TAP COUNT */
        .tap-feed {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 50;
        }

        .tc-num {
            font-size: 5rem;
            font-weight: 800;
            color: rgba(96, 165, 250, .5);
            opacity: 0;
            transform: scale(.5);
            transition: all .18s;
        }

        .tc-num.show {
            opacity: 1;
            transform: scale(1);
        }

        /* PUZZLE */
        .pz-wrap {
            position: relative;
            border-radius: 22px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(59, 130, 246, .25);
            flex-shrink: 0;
        }

        .pz-piece {
            position: absolute;
            background-repeat: no-repeat;
            transition: all .58s cubic-bezier(.34, 1.56, .64, 1);
        }

        .pz-stat {
            font-size: .82rem;
            color: #60a5fa;
            font-weight: 700;
            margin-top: 12px;
            min-height: 22px;
        }

        .pz-btn {
            display: none;
            margin-top: 14px;
            background: rgba(59, 130, 246, .18);
            border: 1.5px solid rgba(59, 130, 246, .4);
            border-radius: 50px;
            padding: 13px 30px;
            font-weight: 700;
            font-size: .88rem;
            color: #fff;
            cursor: pointer;
        }

        /* METER */
        .sw-wrap {
            width: 92%;
            margin: 6px 0;
        }

        .love-sl {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .08);
            outline: none;
        }

        .love-sl::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: #3b82f6;
            border-radius: 50%;
            border: 4px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 14px rgba(59, 130, 246, .6);
        }

        .m-lbl {
            font-size: .92rem;
            font-weight: 700;
            color: #60a5fa;
            min-height: 24px;
        }

        /* TYPE STEP */
        .yr-input {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            background: rgba(59, 130, 246, .08);
            border: 2px solid rgba(59, 130, 246, .3);
            border-radius: 20px;
            padding: 16px;
            width: 78%;
            max-width: 220px;
            color: #60a5fa;
            outline: none;
            letter-spacing: 6px;
        }

        .yr-input:focus {
            border-color: #60a5fa;
            background: rgba(59, 130, 246, .12);
        }

        /* DRAG STEP */
        .drag-zone {
            width: 90%;
            height: 150px;
            position: relative;
            background: rgba(59, 130, 246, .05);
            border: 1px dashed rgba(59, 130, 246, .2);
            border-radius: 22px;
            flex-shrink: 0;
        }

        .drag-heart {
            position: absolute;
            font-size: 3.5rem;
            cursor: grab;
            z-index: 10;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            transition: font-size .3s;
            touch-action: none;
        }

        .drag-target {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            height: 70px;
            border: 2px dashed rgba(59, 130, 246, .5);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            gap: 2px;
        }

        .drag-lbl {
            font-size: .65rem;
            color: rgba(255, 255, 255, .4);
        }

        /* CONFETTI BTN */
        .conf-btn {
            background: rgba(59, 130, 246, .14);
            border: 1.5px solid rgba(59, 130, 246, .35);
            border-radius: 50px;
            padding: 16px 36px;
            font-weight: 700;
            font-size: .92rem;
            color: #fff;
            cursor: pointer;
            letter-spacing: .5px;
        }

        .conf-btn:active {
            background: rgba(59, 130, 246, .3);
        }

        /* FINISH */
        .call-btn {
            background: linear-gradient(135deg, #1d4ed8, #6366f1);
            color: #fff;
            padding: 17px 40px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            margin-top: 14px;
            box-shadow: 0 12px 32px rgba(59, 130, 246, .55);
            animation: cpulse 2.2s infinite;
            letter-spacing: .5px;
        }

        @keyframes cpulse {

            0%,
            100% {
                box-shadow: 0 12px 32px rgba(99, 102, 241, .55), 0 0 0 0 rgba(99, 102, 241, .3)
            }

            50% {
                box-shadow: 0 12px 32px rgba(99, 102, 241, .55), 0 0 0 18px rgba(99, 102, 241, 0)
            }
        }

        /* ── FINISH SCREEN ── */
        .fin-wrap {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 50px 18px 14px;
            gap: 0;
            position: relative;
            overflow: hidden;
        }

        .fin-stars {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .fstar {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #fff, transparent 70%);
            animation: fstarAnim linear infinite;
            opacity: 0;
        }

        @keyframes fstarAnim {
            0% {
                opacity: 0;
                transform: scale(0)
            }

            20% {
                opacity: 1;
                transform: scale(1)
            }

            80% {
                opacity: .7
            }

            100% {
                opacity: 0;
                transform: scale(1.5) translateY(-30px)
            }
        }

        .fin-crown {
            font-size: clamp(3rem, 13vw, 5rem);
            animation: crownBounce 1.4s ease-in-out infinite;
            filter: drop-shadow(0 0 22px gold);
        }

        @keyframes crownBounce {

            0%,
            100% {
                transform: translateY(0) rotate(-5deg)
            }

            50% {
                transform: translateY(-14px) rotate(5deg)
            }
        }

        .fin-name {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.6rem, 11vw, 4rem);
            background: linear-gradient(135deg, #facc15, #f97316, #ec4899, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 12px rgba(250, 204, 21, .4));
            line-height: 1.1;
            margin: 4px 0;
            animation: nameShimmer 3s linear infinite;
            background-size: 300% 300%;
        }

        @keyframes nameShimmer {
            0% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }

            100% {
                background-position: 0% 50%
            }
        }

        .fin-hb {
            font-size: clamp(.78rem, 3vw, .95rem);
            font-weight: 700;
            color: rgba(255, 255, 255, .55);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .fin-letter {
            width: 92%;
            max-width: 360px;

                try { stepCleanupFns[idx](); } catch (e) { }
                delete stepCleanupFns[idx];
            }
        }

        /* ── BUILD DOM ── */
        function startJourney() {
            sbadge.textContent = `1 / ${TOTAL}`;
            ST.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = 'stp' + (i === 0 ? ' active' : ''); d.id = 'stp' + i;
                let body = '';

                if (s.isFinish) {
                    body = buildFinishHtml();
                } else if (s.puzzle) {
                    body = `<div class="inner pz-game-inner"><div class="s-head">${s.head}</div><div class="pz-prog-row" id="pzStat"><span>🧩 Drag pieces to the board!</span></div><div class="pz-real-board" id="pzBoard"></div><div class="pz-tray-lbl">↑ Pick &amp; drop pieces above ↑</div><div class="pz-tray-grid" id="pzTray"></div></div>`;
                } else if (s.nav === 'iloveyou') {
                    body = `<div class="inner mic-love-inner" style="gap:6px;padding-top:28px">
                        <span class="s-icon">${s.icon}</span>
                        <div class="s-head">${s.head}</div>
                        <div class="s-txt">${s.txt}</div>
                        <div class="mic-wrap">
                            <div class="mic-circle" id="micCircle">🎤</div>
                            <div class="love-wave-wrap" id="loveWaveWrap">
                                <canvas id="micCanvas" width="340" height="90"></canvas>
                                <div class="wave-hearts" id="waveHearts"></div>
                            </div>
                            <div class="mic-status" id="micStatus">Tap below &amp; say "I Love You" 💙</div>
                            <div class="mic-heard" id="micHeard"></div>
                            <button class="mic-btn" id="micBtn" onclick="startSpeech()">🎤 Start Listening</button>
                        </div>
                    </div>`;
                } else if (s.nav === 'meter') {
                    body = `<div class="inner"><span class="s-icon">${s.icon}</span><div class="s-head">${s.head}</div><div class="s-txt">${s.txt}</div><div class="sw-wrap"><input type="range" min="1" max="100" value="1" class="love-sl" oninput="updMeter(this.value)"></div><div class="m-lbl" id="mLbl">Slide it! ❤️</div></div>`;
                } else if (s.nav === 'type') {
                    body = `<div class="inner"><span class="s-icon">${s.icon}</span><div class="s-head">${s.head}</div><div class="s-txt">${s.txt}</div><input type="tel" class="yr-input no-adv" id="yrInput" placeholder="????" maxlength="4" oninput="chkYear(this.value)"></div>`;
                } else if (s.nav === 'drag') {
                    body = `<div class="inner"><span class="s-icon">${s.icon}</span><div class="s-head">${s.head}</div><div class="s-txt">${s.txt}</div><div class="drag-zone" id="dragZone"><div class="drag-heart" id="dragHeart">💙</div><div class="drag-target" id="dragTarget"><span>❤️</span><span class="drag-lbl">Drop!</span></div></div></div>`;
                } else {
                    body = `<div class="inner">
        <span class="s-icon">${s.icon}</span>
        ${s.title ? `<div class="s-title">${s.title}</div>` : ''}
        ${s.head ? `<div class="s-head">${s.head}</div>` : ''}
        ${s.img ? `<div class="mf"><img src="${s.img}" loading="lazy" alt=""></div>` : ''}
        ${s.liveAge ? buildAgeHtml(s.liveAge) : ''}
        <div class="s-txt">${s.txt}</div>
        ${s.music ? `<span class="vinyl" id="vinyl${i}" onclick="playS()">🎵</span><div class="plbl" id="plbl${i}">Tap 🎵 to play!</div>` : ''}
      </div>`;
                }

                if (s.nav === 'tap3' || s.nav === 'tap5' || s.nav === 'tap7')
                    body += `<div class="tap-feed"><div class="tc-num" id="tc${i}">0</div></div>`;

                d.innerHTML = body + (s.trick ? `<div class="trick-bar">👉 ${s.trick}</div>` : '');

                /* Inject animated gesture hint icon into .inner */
                const nhMap = {
                    swipeup: 'nh-up ⬆️', swipeleft: 'nh-left ⬅️', swipedown: 'nh-down ⬇️',
                    swiperight: 'nh-right ➡️', doubletap: 'nh-dt 👆👆',
                    shake: 'nh-shake 📳', tilt: 'nh-tilt 📱', rotate: 'nh-rotate ↺',
                    pinch: 'nh-pinch 🤏', spread: 'nh-spread 🤲',
                    longpress: '', twofingertap: ''
                };
                const nhVal = nhMap[s.nav];
                if (nhVal) {
                    const inner = d.querySelector('.inner');
                    if (inner) {
                        const [cls, ico] = nhVal.split(' ');
                        const nh = document.createElement('span');
                        nh.className = `nav-hint ${cls}`;
                        nh.textContent = ico;
                        inner.appendChild(nh);
                    }
                }

                /* Shake step: add class for continuous icon shake */
                if (s.nav === 'shake') d.classList.add('shake-hint');

                /* Longpress: inject SVG progress ring */
                if (s.nav === 'longpress' || s.nav === 'longpress2') {
                    const inner = d.querySelector('.inner');
                    if (inner) {
                        const ringWrap = document.createElement('div');
                        ringWrap.className = 'lp-ring-wrap';
                        ringWrap.id = `lpRingWrap${i}`;
                        ringWrap.innerHTML = `<svg width="76" height="76"><circle cx="38" cy="38" r="33" class="lp-ring-bg"/><circle cx="38" cy="38" r="33" class="lp-ring-arc" id="lpArc${i}"/></svg>`;
                        inner.appendChild(ringWrap);
                    }
                }

                swEl.appendChild(d);
            });

            setupGestures();
            startTicker();
            startPetals();
            /* Animate step 0 entrance */
            setTimeout(() => animateStepIn(document.getElementById('stp0')), 150);
        }

        /* ── NAVIGATION LOCK – prevents overlap during transitions ── */
        let navBusy = false;
        function lockNav() { navBusy = true; setTimeout(() => navBusy = false, 680); }

        /* ── localStorage step save ── */
        function saveStep(i) { try { localStorage.setItem('bj_step', i); } catch (e) { } }
        function loadStep() { try { return Math.min(parseInt(localStorage.getItem('bj_step') || '0'), TOTAL - 1); } catch (e) { return 0; } }
        function savePz() { try { localStorage.setItem('bj_pz', '1'); } catch (e) { } }

        /* ── STEP ENTER ANIMATIONS (GSAP) ── */
        function animateStepIn(stepEl) {
            const kids = stepEl.querySelectorAll('.inner > *');
            if (!kids.length) return;
            const tl = gsap.timeline();
            tl.from(kids, { y: 28, opacity: 0, stagger: 0.08, duration: 0.48, ease: 'power2.out' });
            registerTL(tl);
            /* Ken Burns on memory photos */
            const img = stepEl.querySelector('.mf img');
            if (img) {
                const kb = gsap.to(img, { scale: 1.08, x: '2%', duration: 8, ease: 'none', yoyo: true, repeat: -1 });
                registerTL(kb);
            }
        }

        /* ── GO NEXT ── */
        function goNext() {
            if (cur >= TOTAL - 1 || navBusy) return;
            lockNav();

            /* cleanup all active animations + step-specific listeners */
            cleanupAnimations();
            runCleanup(cur);

            /* fade out music if on music step (native fade - GSAP can't tween media.volume) */
            if (ST[cur].music) {
                const bgm = document.getElementById('bgm');
                if (bgm && !bgm.paused) {
                    const step = bgm.volume / 18;
                    const fadeOut = setInterval(() => {
                        if (bgm.volume > step) { bgm.volume -= step; }
                        else { bgm.volume = 0; bgm.pause(); clearInterval(fadeOut); }
                    }, 50);
                }
            }
            /* cancel waveRAF */
            if (waveRAF) { cancelAnimationFrame(waveRAF); waveRAF = null; }

            const curEl = document.getElementById('stp' + cur);
            curEl.style.cssText = '';
            curEl.classList.remove('active', 'from-left');
            curEl.classList.add('exit');
            cur++;
            saveStep(cur);

            if (cur === TOTAL - 1) {
                /* Final step: show countdown overlay first */
                const ov = document.getElementById('countdownOverlay');
                const cdNum = document.getElementById('cdNum');
                const cdMsg = document.getElementById('cdMsg');
                ov.style.display = 'flex';
                gsap.fromTo(ov, { opacity: 0 }, { opacity: 1, duration: 0.4 });
                let num = 3;
                cdNum.textContent = num;
                cdMsg.textContent = 'Get ready...';
                const cdInt = setInterval(() => {
                    num--;
                    if (num > 0) {
                        cdNum.textContent = num;
                        cdMsg.textContent = num === 2 ? 'Almost there...' : 'Here we go!';
                        gsap.fromTo(cdNum, { scale: 1.5, opacity: 0.5 }, { scale: 1, opacity: 1, duration: 0.35, ease: 'back.out(2)' });
                    } else {
                        clearInterval(cdInt);
                        cdMsg.textContent = '💙 Happy Birthday Thangam! 👑';
                        cdNum.textContent = '✨';
                        setTimeout(() => {
                            gsap.to(ov, {
                                opacity: 0, duration: 0.5, onComplete: () => {
                                    ov.style.display = 'none';
                                    const nEl = document.getElementById('stp' + cur);
                                    nEl.style.cssText = '';
                                    nEl.classList.remove('exit', 'from-left');
                                    nEl.classList.add('snap-right');
                                    void nEl.offsetWidth;
                                    nEl.classList.remove('snap-right');
                                    nEl.classList.add('active');
                                    pbi.style.width = `${((cur + 1) / TOTAL) * 100}%`;
                                    sbadge.textContent = `${cur + 1} / ${TOTAL}`;
                                    doConfetti(); startTicker();
                                    /* GSAP reveal: crown, name, hearts, letter stagger */
                                    const finEl = nEl;
                                    const revTl = gsap.timeline();
                                    const finCrown = finEl.querySelector('.fin-crown');
                                    const finHb = finEl.querySelector('.fin-hb');
                                    const finName = finEl.querySelector('.fin-name');
                                    const finHrts = finEl.querySelectorAll('.fin-hrt');
                                    const finLetter = finEl.querySelector('.fin-letter');
                                    const finAge = finEl.querySelector('.fin-age-wrap');
                                    const finCta = finEl.querySelector('.fin-cta-row');
                                    if (finCrown) revTl.from(finCrown, { y: -60, scale: 0.3, opacity: 0, duration: 0.7, ease: 'back.out(1.8)' });
                                    if (finHb) revTl.from(finHb, { opacity: 0, y: 18, duration: 0.5 }, '-=0.2');
                                    if (finName) revTl.from(finName, { scale: 0.7, opacity: 0, duration: 0.65, ease: 'elastic.out(1,0.6)' }, '-=0.2');
                                    if (finHrts.length) revTl.from(finHrts, { scale: 0, opacity: 0, duration: 0.32, stagger: 0.08, ease: 'back.out(2)' }, '-=0.2');
                                    if (finLetter) revTl.from(finLetter, { y: 30, opacity: 0, duration: 0.6 }, '-=0.1');
                                    if (finAge) revTl.from(finAge, { y: 16, opacity: 0, duration: 0.4 }, '-=0.1');
                                    if (finCta) revTl.from(finCta, { scale: 0.6, opacity: 0, duration: 0.6, ease: 'elastic.out(1,0.5)' }, '-=0.1');
                                    registerTL(revTl);
                                    /* Call button pulse */
                                    const callBtn = finEl.querySelector('.call-btn');
                                    if (callBtn) {
                                        const pulse = gsap.to(callBtn, { scale: 1.07, duration: 0.8, yoyo: true, repeat: -1, ease: 'power1.inOut' });
                                        registerTL(pulse);
                                    }
                                }
                            });
                        }, 700);
                    }
                }, 1000);
                return; /* exit early — final step handled inside timeout above */
            }

            setTimeout(() => {
                const nEl = document.getElementById('stp' + cur);
                nEl.style.cssText = '';
                nEl.classList.remove('exit', 'from-left');
                nEl.classList.add('snap-right');
                void nEl.offsetWidth;
                nEl.classList.remove('snap-right');
                nEl.classList.add('active');
                pbi.style.width = `${((cur + 1) / TOTAL) * 100}%`;
                sbadge.textContent = `${cur + 1} / ${TOTAL}`;
                if (ST[cur].puzzle && !document.getElementById('pzBoard')?.dataset.built) setTimeout(buildPuzzle, 300);
                if (ST[cur].nav === 'drag') setTimeout(setupDrag, 300);
                if (ST[cur].nav === 'iloveyou') setTimeout(startSpeech, 600);
                /* GSAP stagger entrance */
                animateStepIn(nEl);
            }, 520);
        }

        /* ── GO PREV (hidden back – tap top-left corner) ── */
        function goPrev() {
            if (cur <= 0 || navBusy) return;
            lockNav();
            cleanupAnimations();
            runCleanup(cur);
            if (waveRAF) { cancelAnimationFrame(waveRAF); waveRAF = null; }


            const curEl = document.getElementById('stp' + cur);
            curEl.style.cssText = '';
            curEl.classList.remove('active', 'from-left', 'exit');
            curEl.classList.add('snap-right');
            void curEl.offsetWidth;
            curEl.classList.remove('snap-right');

            cur--;
            saveStep(cur);
            const prevEl = document.getElementById('stp' + cur);
            prevEl.style.cssText = '';
            prevEl.classList.remove('exit', 'active');
            prevEl.classList.add('from-left');
            void prevEl.offsetWidth;
            prevEl.classList.remove('from-left');
            prevEl.classList.add('active');

            setTimeout(() => {
                pbi.style.width = `${((cur + 1) / TOTAL) * 100}%`;
                sbadge.textContent = `${cur + 1} / ${TOTAL}`;
                animateStepIn(prevEl);
            }, 200);
        }


        /* ── GESTURES ── */
        function setupGestures() {
            const area = swEl;
            let lastTap = 0, lpFired = false, lpTimer = null;
            let sx = 0, sy = 0;
            let pinchDist = null;
            let tapCnt = new Array(24).fill(0), tapTmr = new Array(24).fill(null);
            let emg = 0, emgT = null;

            /* CLICK → TAP */
            area.addEventListener('click', e => {
                if (e.target.closest('.no-adv,.pz-wrap,.drag-heart,.conf-btn,.love-sl,.vinyl,a,.mic-btn,.mic-circle,.mic-wrap')) return;
                if (lpFired) { lpFired = false; return; }
                if (ST[cur].nav === 'iloveyou') return; /* mic-only step */
                if (ST[cur].nav === 'tap') goNext();
            });

            /* TOUCHSTART */
            area.addEventListener('touchstart', e => {
                if (e.target.closest('.no-adv,.drag-heart,.love-sl,a,.mic-btn,.mic-circle,.mic-wrap')) return;
                const nav = ST[cur].nav, t = e.touches[0];
                sx = t.clientX; sy = t.clientY;
                const now = Date.now();

                /* DOUBLETAP */
                if (now - lastTap < 340 && nav === 'doubletap') { lastTap = 0; goNext(); return; }
                lastTap = now;

                /* LONGPRESS (Includes 10s Emergency Skip for Mic) */
                if (nav === 'longpress' || nav === 'longpress2' || nav === 'iloveyou') {
                    lpFired = false;
                    const ms = nav === 'iloveyou' ? 10000 : (nav === 'longpress2' ? 2800 : 1800);
                    lpTimer = setTimeout(() => {
                        lpFired = true;
                        if (nav === 'iloveyou') micSucceeded = true;
                        goNext();
                    }, ms);
                    /* Animate SVG ring + pressing state */
                    const arc = document.getElementById(`lpArc${cur}`);
                    const stpEl = document.getElementById(`stp${cur}`);
                    if (arc) {
                        arc.style.transition = `stroke-dashoffset ${ms}ms linear`;
                        requestAnimationFrame(() => { arc.style.strokeDashoffset = '0'; });
                    }
                    if (stpEl) stpEl.classList.add('pressing');
                }

                /* MIC STEP – block other touch gestures AFTER longpress check */
                if (nav === 'iloveyou') return;

                /* TAP COUNT */
                if (nav === 'tap3' || nav === 'tap5' || nav === 'tap7') {
                    const need = nav === 'tap3' ? 3 : nav === 'tap5' ? 5 : 7;
                    tapCnt[cur]++;
                    const tc = document.getElementById('tc' + cur);
                    if (tc) {
                        tc.textContent = tapCnt[cur];
                        tc.classList.add('show');
                        /* GSAP bounce on tap counter */
                        gsap.fromTo(tc, { scale: 1.8 }, { scale: 1, duration: 0.28, ease: 'back.out(2)' });
                        setTimeout(() => tc.classList.remove('show'), 250);
                    }
                    clearTimeout(tapTmr[cur]);
                    if (tapCnt[cur] >= need) { tapCnt[cur] = 0; setTimeout(goNext, 200); }
                    else tapTmr[cur] = setTimeout(() => tapCnt[cur] = 0, 2200);
                }

                /* TAP RIPPLE on every touch */
                const ripple = document.createElement('div');
                ripple.className = 'tap-ripple';
                ripple.style.left = t.clientX + 'px';
                ripple.style.top = t.clientY + 'px';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 580);

                /* TWO-FINGER TAP */
                if (e.touches.length === 2 && nav === 'twofingertap') goNext();

                /* PINCH/SPREAD START */
                if (e.touches.length === 2 && (nav === 'pinch' || nav === 'spread')) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
                    pinchDist = Math.hypot(dx, dy);
                }

                /* EMERGENCY 7-TAP – disabled for mic step */
                if (nav !== 'type' && nav !== 'iloveyou') {
                    emg++; clearTimeout(emgT);
                    if (emg >= 7) { emg = 0; goNext(); }
                    emgT = setTimeout(() => emg = 0, 2500);
                }
            }, { passive: true });

            area.addEventListener('touchend', () => {
                clearTimeout(lpTimer); pinchDist = null;
                /* Reset longpress ring */
                const arc = document.getElementById(`lpArc${cur}`);
                const stpEl = document.getElementById(`stp${cur}`);
                if (arc && !lpFired) {
                    arc.style.transition = 'stroke-dashoffset 0.25s ease';
                    arc.style.strokeDashoffset = '207';
                }
                if (stpEl) stpEl.classList.remove('pressing');
            }, { passive: true });
            area.addEventListener('touchmove', () => { clearTimeout(lpTimer); }, { passive: true });

            /* PINCH/SPREAD MOVE */
            area.addEventListener('touchmove', e => {
                if (e.touches.length !== 2 || pinchDist === null) return;
                const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
                const nd = Math.hypot(dx, dy), nav = ST[cur].nav;
                if (nav === 'pinch' && nd < pinchDist - 55) { pinchDist = null; goNext(); }
                if (nav === 'spread' && nd > pinchDist + 55) { pinchDist = null; goNext(); }
            }, { passive: true });

            /* SWIPES */
            area.addEventListener('touchend', e => {
                const dx = sx - e.changedTouches[0].clientX, dy = sy - e.changedTouches[0].clientY;
                const nav = ST[cur].nav;
                if (nav === 'swipeup' && dy > 80 && Math.abs(dx) < 70) goNext();
                if (nav === 'swipeleft' && dx > 80 && Math.abs(dy) < 70) goNext();
                if (nav === 'swipedown' && dy < -80 && Math.abs(dx) < 70) goNext();
                if (nav === 'swiperight' && dx < -80 && Math.abs(dy) < 70) goNext();
            }, { passive: true });

            /* SHAKE */
            let lx, ly, lz, lastShake = 0;
            function listenShake() {
                window.addEventListener('devicemotion', e => {
                    const a = e.accelerationIncludingGravity; if (!a) return;
                    if (lx === undefined) { lx = a.x; ly = a.y; lz = a.z; return; }
                    const d = Math.abs(a.x - lx) + Math.abs(a.y - ly) + Math.abs(a.z - lz);
                    lx = a.x; ly = a.y; lz = a.z;
                    if (d > 26 && Date.now() - lastShake > 1100) { lastShake = Date.now(); if (ST[cur].nav === 'shake') goNext(); }
                });
            }
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                document.addEventListener('touchstart', async function r() { document.removeEventListener('touchstart', r); try { if (await DeviceMotionEvent.requestPermission() === 'granted') listenShake(); } catch (e) { } }, { once: true });
            } else listenShake();

            /* ROTATE */
            window.addEventListener('orientationchange', () => { if (ST[cur].nav === 'rotate') setTimeout(goNext, 500); });

            /* TILT */
            let tiltLk = false;
            function listenTilt() {
                window.addEventListener('deviceorientation', e => {
                    if (ST[cur].nav !== 'tilt' || tiltLk || e.gamma === null) return;
                    if (e.gamma < -38) { tiltLk = true; setTimeout(() => tiltLk = false, 1500); goNext(); }
                });
            }
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                document.addEventListener('touchstart', async function r() { document.removeEventListener('touchstart', r); try { if (await DeviceOrientationEvent.requestPermission() === 'granted') listenTilt(); } catch (e) { } }, { once: true });
            } else listenTilt();

        }

        /* ── SPEECH RECOGNITION: "I LOVE YOU" ── */
        let speechRec = null, micActive = false, micSucceeded = false;
        let waveAn = null, waveData = null, waveRAF = null;

        /* ── LOVE WAVE ENGINE ── */
        let wavePhase = 0;                   /* idle heartbeat phase    */
        let lastAmp = 0;                   /* smoothed amplitude       */
        let heartPool = [];                  /* floating heart timers    */
        let lastHeartSpawn = 0;              /* throttle heart spawning  */

        function drawWave() {
            const canvas = document.getElementById('micCanvas');
            if (!canvas || !waveAn) return;
            waveRAF = requestAnimationFrame(drawWave);
            registerRAF(waveRAF);

            waveAn.getByteTimeDomainData(waveData);
            const ctx = canvas.getContext('2d');
            const W = canvas.width;
            const H = canvas.height;
            const now = performance.now();

            ctx.clearRect(0, 0, W, H);

            /* ── Compute amplitude (0–1) ── */
            let sumDev = 0;
            for (let i = 0; i < waveData.length; i++) sumDev += Math.abs(waveData[i] - 128);
            /* EXTREME GAIN: was /12, now /3 to make tiny sounds look MASSIVE */
            const rawAmp = Math.min(sumDev / waveData.length / 3, 1);
            lastAmp = lastAmp * 0.5 + rawAmp * 0.5;   /* instant response */
            const amp = lastAmp;

            /* ── Gradient color: pink ↔ blue by amplitude ── */
            const pinkR = 236, pinkG = 72, pinkB = 153;
            const blueR = 96, blueG = 165, blueB = 250;
            const t = micSucceeded ? 1 : amp;
            const r = Math.round(blueR + (pinkR - blueR) * Math.min(t * 2.5, 1));
            const g = Math.round(blueG + (pinkG - blueG) * Math.min(t * 2.5, 1));
            const b = Math.round(blueB + (pinkB - blueB) * Math.min(t * 2.5, 1));
            const col = micSucceeded ? '#4ade80' : `rgb(${r},${g},${b})`;

            /* ── Draw dual mirrored filled waves ── */
            function drawFilledWave(flip) {
                ctx.beginPath();
                const sliceW = W / (waveData.length - 1);
                let x = 0;
                ctx.moveTo(0, H / 2);
                for (let i = 0; i < waveData.length; i++) {
                    const v = (waveData[i] / 128.0) - 1;   /* -1 to +1 */
                    const vy = (v * (H / 2 - 6) * (amp < 0.01 ? 0.08 : 1)) * (flip ? -1 : 1);
                    const py = H / 2 + vy;
                    i === 0 ? ctx.moveTo(x, py) : ctx.lineTo(x, py);
                    x += sliceW;
                }
                ctx.lineTo(W, H / 2);
                ctx.lineTo(0, H / 2);
                ctx.closePath();

                const grad = ctx.createLinearGradient(0, 0, W, 0);
                grad.addColorStop(0, `rgba(${r},${g},${b},0.06)`);
                grad.addColorStop(0.5, `rgba(${r},${g},${b},${flip ? 0.18 : 0.28})`);
                grad.addColorStop(1, `rgba(${r},${g},${b},0.06)`);
                ctx.fillStyle = micSucceeded ? 'rgba(74,222,128,0.18)' : grad;
                ctx.fill();
            }

            drawFilledWave(false);   /* top wave  */
            drawFilledWave(true);    /* mirror    */

            /* ── Stroke line on top wave (crisp) ── */
            ctx.beginPath();
            const sw2 = W / (waveData.length - 1);
            let x2 = 0;
            for (let i = 0; i < waveData.length; i++) {
                const v = (waveData[i] / 128.0) - 1;
                const vy = v * (H / 2 - 6) * (amp < 0.01 ? 0.08 : 1);
                const py = H / 2 + vy;
                i === 0 ? ctx.moveTo(x2, py) : ctx.lineTo(x2, py);
                x2 += sw2;
            }
            const lineGrad = ctx.createLinearGradient(0, 0, W, 0);
            lineGrad.addColorStop(0, 'transparent');
            lineGrad.addColorStop(0.15, col);
            lineGrad.addColorStop(0.85, col);
            lineGrad.addColorStop(1, 'transparent');
            ctx.strokeStyle = micSucceeded ? '#4ade80' : lineGrad;
            ctx.lineWidth = micSucceeded ? 2.8 : 2.2;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.stroke();

            /* ── Center idle heartbeat glow when silent ── */
            if (amp < 0.025) {
                wavePhase += 0.03;
                const pulse = 0.45 + Math.sin(wavePhase) * 0.22;
                ctx.save();
                ctx.font = `${14 + Math.sin(wavePhase) * 3}px serif`;
                ctx.globalAlpha = pulse;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💙', W / 2, H / 2);
                ctx.restore();
            }

            /* ── Spawn floating hearts when speaking loud ── */
            if (amp > 0.18 && now - lastHeartSpawn > 160) {
                lastHeartSpawn = now;
                spawnWaveHeart(amp);
            }

            /* ── Center amplitude circle ── */
            if (amp > 0.08) {
                const radius = 4 + amp * 32;
                ctx.save();
                ctx.beginPath();
                ctx.arc(W / 2, H / 2, radius, 0, Math.PI * 2);
                ctx.fillStyle = micSucceeded
                    ? `rgba(74,222,128,${amp * 0.25})`
                    : `rgba(${r},${g},${b},${amp * 0.2})`;
                ctx.fill();
                ctx.restore();
            }
        }

        /* ── EASING HELPER ── */
        function easeOutBack(x) {
            const c1 = 1.70158, c3 = c1 + 1;
            return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
        }

        /* ── HEART PATH HELPER (canvas) ── */
        function canvasHeart(ctx, cx, cy, size) {
            ctx.beginPath();
            ctx.moveTo(cx, cy + size * 0.35);
            ctx.bezierCurveTo(cx + size * 1.1, cy - size * 0.35,
                cx + size * 1.1, cy - size * 1.1, cx, cy - size * 0.55);
            ctx.bezierCurveTo(cx - size * 1.1, cy - size * 1.1,
                cx - size * 1.1, cy - size * 0.35, cx, cy + size * 0.35);
            ctx.closePath();
        }

        /* ── HEART BLAST SEQUENCE ── */
        /* Phase 1: heart grows 0 → full  (GROW_MS)
           Phase 2: heart explodes + particles shoot out (BLAST_MS)
           Then: doHeartRain() + goNext()                                     */
        function doHeartBlast() {
            const canvas = document.getElementById('micCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const cx = W / 2, cy = H / 2;

            const GROW_MS = 1300;   /* ms to grow heart              */
            const BLAST_MS = 700;    /* ms for explosion              */
            const EMOJIS = ['💙', '💜', '💗', '💖', '✨', '⭐', '🌸', '💕', '💝', '🎀', '🥹'];

            let startT = null;
            let blastStartT = null;
            let particles = [];
            let phase = 'grow';
            let blstRaf = null;

            /* Build explosion particle list */
            function buildParticles(ts) {
                blastStartT = ts;
                for (let i = 0; i < 22; i++) {
                    const angle = (i / 22) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
                    const speed = 55 + Math.random() * 90;  /* px per second */
                    particles.push({
                        angle, speed,
                        emoji: EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
                        sz: 0.85 + Math.random() * 1.1
                    });
                }
            }

            function frame(ts) {
                if (!startT) startT = ts;
                const elapsed = ts - startT;
                ctx.clearRect(0, 0, W, H);

                if (phase === 'grow') {
                    /* ── GROW PHASE ── */
                    const prog = Math.min(elapsed / GROW_MS, 1);
                    const scale = Math.max(0.001, easeOutBack(prog));
                    const size = scale * Math.min(W, H) * 0.40;

                    /* Radial gradient fill */
                    const grd = ctx.createRadialGradient(cx, cy - size * 0.18, size * 0.05,
                        cx, cy, size * 1.1);
                    grd.addColorStop(0, 'rgba(255,180,220,1)');
                    grd.addColorStop(0.4, 'rgba(236,72,153,0.95)');
                    grd.addColorStop(0.8, 'rgba(168,85,247,0.85)');
                    grd.addColorStop(1, 'rgba(80,10,60,0.7)');

                    ctx.save();
                    ctx.shadowColor = 'rgba(236,72,153,0.85)';
                    ctx.shadowBlur = 10 + scale * 30;
                    canvasHeart(ctx, cx, cy, size);
                    ctx.fillStyle = grd;
                    ctx.fill();
                    ctx.restore();

                    /* Pulsing ring that appears mid-growth */
                    if (prog > 0.35) {
                        const rProg = (prog - 0.35) / 0.65;
                        ctx.beginPath();
                        ctx.arc(cx, cy - size * 0.05, size * (1.15 + rProg * 0.25), 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(236,72,153,${0.4 * (1 - rProg)})`;
                        ctx.lineWidth = 2.5;
                        ctx.stroke();

                        /* Second ring slightly behind */
                        ctx.beginPath();
                        ctx.arc(cx, cy - size * 0.05, size * (1.30 + rProg * 0.2), 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(168,85,247,${0.25 * (1 - rProg)})`;
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }

                    /* Small text hint while growing */
                    if (prog < 0.6) {
                        ctx.save();
                        ctx.globalAlpha = prog;
                        ctx.font = `${Math.floor(12 + prog * 6)}px serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('💙', cx, cy - size * 0.08);
                        ctx.restore();
                    }

                    if (prog >= 1) {
                        phase = 'blast';
                        buildParticles(ts);
                    }

                } else if (phase === 'blast') {
                    /* ── BLAST PHASE ── */
                    const bElapsed = ts - blastStartT;
                    const bProg = Math.min(bElapsed / BLAST_MS, 1);

                    /* Fading heart at center that expands outward */
                    const heartAlpha = Math.max(0, 1 - bProg * 2.2);
                    if (heartAlpha > 0) {
                        const size = Math.min(W, H) * 0.40 * (1 + bProg * 0.7);
                        const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 1.1);
                        grd.addColorStop(0, `rgba(255,220,240,${heartAlpha})`);
                        grd.addColorStop(0.5, `rgba(236,72,153,${heartAlpha * 0.7})`);
                        grd.addColorStop(1, `rgba(168,85,247,0)`);
                        ctx.save();
                        canvasHeart(ctx, cx, cy, size);
                        ctx.fillStyle = grd;
                        ctx.fill();
                        ctx.restore();
                    }

                    /* Flash white burst at frame 0 */
                    if (bProg < 0.12) {
                        const flashA = (0.12 - bProg) / 0.12;
                        ctx.save();
                        ctx.globalAlpha = flashA * 0.55;
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(0, 0, W, H);
                        ctx.restore();
                    }

                    /* Fly particles outward */
                    const dt = bElapsed / 1000;   /* seconds elapsed since blast */
                    particles.forEach(p => {
                        const dist = p.speed * dt;
                        const px = cx + Math.cos(p.angle) * dist;
                        const py = cy + Math.sin(p.angle) * dist;
                        const pA = Math.max(0, 1 - bProg * 1.6);
                        ctx.save();
                        ctx.globalAlpha = pA;
                        ctx.font = `${p.sz}rem serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(p.emoji, px, py);
                        ctx.restore();
                    });

                    if (bProg >= 1) {
                        ctx.clearRect(0, 0, W, H);   /* final clean */
                        return;                        /* stop RAF     */
                    }
                }

                blstRaf = requestAnimationFrame(frame);
            }

            blstRaf = requestAnimationFrame(frame);
        }

                drawWave();
            }).catch(() => { });
        }

                rec.lang = 'en-US';

                rec.onresult = ev => {
                    let t = '';
                    for (let i = ev.resultIndex; i < ev.results.length; i++)
                        t += ev.results[i][0].transcript;
                    const clean = t.toLowerCase().replace(/[^a-z ]/g, '').trim();
                    if (heard) heard.textContent = '"' + t + '"';

                        /* ① Stop wave loop NOW – blast takes over the canvas */
                        if (waveRAF) { cancelAnimationFrame(waveRAF); waveRAF = null; }

                        if (btn) { btn.textContent = '💙 Got it!'; btn.classList.remove('recording'); }

                        setTimeout(doHeartRain, 1300);

                        /* ⑤ Go next after rain fills the screen */
                        setTimeout(goNext, 3500);
                    }
                };

                rec.onerror = er => {
                    if (er.error === 'not-allowed') {
                        micActive = false;
                        if (status) status.textContent = '� Mic blocked – allow mic in browser settings!';
                        if (circle) circle.classList.remove('listening');
                        if (btn) { btn.textContent = '🎤 Try Again'; btn.classList.remove('recording'); }
                    }
                };

                rec.onend = () => {
                    if (!micSucceeded && micActive) {
                        setTimeout(() => { try { createRec().start(); } catch (e) { } }, 300);
                    }
                };

                return rec;
            }

            try { speechRec = createRec(); speechRec.start(); } catch (e) { micActive = false; }
        }

        /* ── REAL PUZZLE GAME – 4×3 = 12 pieces drag-and-drop ── */
        const PIC = 'eee.jpg';   /* 📸 Replace eee.jpg with your actual love photo */
        const PZ_COLS = 4, PZ_ROWS = 3; /* 12 pieces */

        function buildPuzzle() {
            const board = document.getElementById('pzBoard');
            const tray = document.getElementById('pzTray');
            const stat = document.getElementById('pzStat');
            if (!board || board.dataset.built) return;
            board.dataset.built = '1';

            /* ── Responsive piece size ── */
            const cardW = document.getElementById('card').offsetWidth || 360;
            const PW = Math.floor((cardW - 28) / PZ_COLS) - 2;   /* piece width  */
            const PH = Math.floor(PW * 0.75);                      /* 4:3 ratio    */
            const TOTAL = PZ_COLS * PZ_ROWS;
            let placed = 0;
            let dragTile = null, dragPid = -1, dragClone = null;

            /* Apply grid dimensions */
            board.style.gridTemplateColumns = `repeat(${PZ_COLS}, ${PW}px)`;
            board.style.gridTemplateRows = `repeat(${PZ_ROWS}, ${PH}px)`;
            tray.style.gridTemplateColumns = `repeat(${PZ_COLS}, ${PW}px)`;
            tray.style.maxHeight = (PH * 2 + 4 * 3) + 'px';  /* show 2 rows */

            /* ── Build board slots ── */
            for (let i = 0; i < TOTAL; i++) {
                const slot = document.createElement('div');
                slot.className = 'pz-slot';
                slot.dataset.slotId = i;
                /* Ghost hint: faint image in background so user knows correct position */
                slot.style.backgroundImage = `url('${PIC}')`;
                slot.style.backgroundSize = `${PZ_COLS * PW}px ${PZ_ROWS * PH}px`;
                slot.style.backgroundPosition = `-${(i % PZ_COLS) * PW}px -${Math.floor(i / PZ_COLS) * PH}px`;
                slot.style.opacity = '1';
                /* Ghost filter – very dark until filled */
                slot.style.filter = 'brightness(0.12) saturate(0.3)';
                board.appendChild(slot);
            }

            /* ── Build shuffled tray pieces ── */
            const ids = [...Array(TOTAL).keys()].sort(() => Math.random() - 0.5);
            ids.forEach(pid => {
                const r = Math.floor(pid / PZ_COLS), c = pid % PZ_COLS;
                const tile = document.createElement('div');
                tile.className = 'pz-tile';
                tile.dataset.pid = pid;
                tile.style.width = PW + 'px';
                tile.style.height = PH + 'px';
                tile.style.backgroundImage = `url('${PIC}')`;
                tile.style.backgroundSize = `${PZ_COLS * PW}px ${PZ_ROWS * PH}px`;
                tile.style.backgroundPosition = `-${c * PW}px -${r * PH}px`;
                tray.appendChild(tile);
            });

            /* ── Drag Manager ── */
            function startDrag(tile, cx, cy) {
                dragTile = tile;
                dragPid = parseInt(tile.dataset.pid);
                dragClone = document.createElement('div');
                dragClone.className = 'pz-drag-clone';
                dragClone.style.width = PW + 'px';
                dragClone.style.height = PH + 'px';
                dragClone.style.backgroundImage = tile.style.backgroundImage;
                dragClone.style.backgroundSize = tile.style.backgroundSize;
                dragClone.style.backgroundPosition = tile.style.backgroundPosition;
                dragClone.style.left = (cx - PW / 2) + 'px';
                dragClone.style.top = (cy - PH / 2) + 'px';
                document.body.appendChild(dragClone);
                tile.style.opacity = '.3';
            }

            function moveDrag(cx, cy) {
                if (!dragClone) return;
                dragClone.style.left = (cx - PW / 2) + 'px';
                dragClone.style.top = (cy - PH / 2) + 'px';
                board.querySelectorAll('.pz-slot').forEach(s => s.classList.remove('pz-highlight'));
                const el = document.elementFromPoint(cx, cy);
                const slot = el && el.closest('.pz-slot');
                if (slot && !slot.dataset.filled) slot.classList.add('pz-highlight');
            }

            function endDrag(cx, cy) {
                if (!dragClone || !dragTile) return;
                dragClone.remove(); dragClone = null;
                board.querySelectorAll('.pz-slot').forEach(s => s.classList.remove('pz-highlight'));
                const pid = dragPid;
                const tile = dragTile;
                dragTile = null; dragPid = -1;
                tile.style.opacity = '';

                const el = document.elementFromPoint(cx, cy);
                const slot = el && el.closest('.pz-slot');
                if (!slot || slot.dataset.filled) return;

                if (parseInt(slot.dataset.slotId) === pid) {
                    /* ✅ CORRECT */
                    slot.dataset.filled = '1';
                    slot.classList.add('pz-filled');
                    slot.style.filter = 'none';  /* reveal full-colour piece */
                    slot.style.border = 'none';
                    tile.classList.add('pz-placed');

                    /* Green flash */
                    slot.classList.add('pz-correct');
                    setTimeout(() => slot.classList.remove('pz-correct'), 520);

                    /* GSAP micro-scale bounce on the slot */
                    gsap.fromTo(slot, { scale: 1.12 }, { scale: 1, duration: 0.4, ease: 'back.out(1.6)' });

                    placed++;
                    stat.innerHTML = `<span>✨ ${placed}/${TOTAL} placed!</span>`;

                    if (placed === TOTAL) {
                        stat.innerHTML = '<span>🎉 Perfect! Our memory is revealed! 💙</span>';
                        savePz();
                        /* GSAP board celebration glow */
                        gsap.timeline()
                            .to(board, { boxShadow: '0 0 50px rgba(96,165,250,.85)', scale: 1.04, duration: 0.4, ease: 'power2.out' })
                            .to(board, { boxShadow: '0 0 0px rgba(96,165,250,0)', scale: 1, duration: 0.7, ease: 'elastic.out(1,0.5)' });
                        doConfetti();
                        setTimeout(goNext, 2400);
                    }
                } else {
                    /* ❌ WRONG – shake slot */
                    slot.classList.add('pz-wrong');
                    setTimeout(() => slot.classList.remove('pz-wrong'), 400);
                }
            }

            /* Touch handlers */
            const stepEl = board.closest('.stp');
            const onTS = e => {
                const tile = e.target.closest('.pz-tile:not(.pz-placed)');
                if (!tile) return;
                e.stopPropagation();
                const t = e.touches[0];
                startDrag(tile, t.clientX, t.clientY);
            };
            const onTM = e => {
                if (!dragClone) return;
                const t = e.touches[0];
                moveDrag(t.clientX, t.clientY);
            };
            const onTE = e => {
                if (!dragClone) return;
                const t = e.changedTouches[0];
                endDrag(t.clientX, t.clientY);
            };

            /* Mouse handlers */
            const onMS = e => {
                const tile = e.target.closest('.pz-tile:not(.pz-placed)');
                if (!tile) return;
                e.preventDefault();
                startDrag(tile, e.clientX, e.clientY);
            };
            const onMM = e => { if (dragClone) moveDrag(e.clientX, e.clientY); };
            const onMU = e => { if (dragClone) endDrag(e.clientX, e.clientY); };

            stepEl.addEventListener('touchstart', onTS, { passive: true });
            document.addEventListener('touchmove', onTM, { passive: true });
            document.addEventListener('touchend', onTE, { passive: true });
            stepEl.addEventListener('mousedown', onMS);
            document.addEventListener('mousemove', onMM);
            document.addEventListener('mouseup', onMU);

            /* Cleanup when leaving this step */
            const pzIdx = ST.findIndex(s => s.puzzle);
            registerCleanup(pzIdx, () => {
                stepEl.removeEventListener('touchstart', onTS);
                document.removeEventListener('touchmove', onTM);
                document.removeEventListener('touchend', onTE);
                stepEl.removeEventListener('mousedown', onMS);
                document.removeEventListener('mousemove', onMM);
                document.removeEventListener('mouseup', onMU);
                if (dragClone) { dragClone.remove(); dragClone = null; }
            });
        }

            document.addEventListener('touchmove', e => {
                if (!dragging) return;
                const dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
                heart.style.left = (origL + dx) + 'px'; heart.style.top = (origT + dy) + 'px';
            }, { passive: true });
            document.addEventListener('touchend', e => {
                if (!dragging) return; dragging = false;
                if (e.changedTouches[0].clientX > window.innerWidth * .6) {
                    heart.style.transition = 'all .4s'; heart.style.fontSize = '5rem';
                    setTimeout(goNext, 600);
                } else { heart.style.transition = 'all .3s'; heart.style.left = '20px'; heart.style.top = '50%'; }
                setTimeout(() => heart.style.transition = 'none', 400);
            }, { passive: true });
        }

        function buildFinishHtml() {

                return `<div class="fstar" style="width:${sz}px;height:${sz}px;left:${x}%;top:${y}%;animation-duration:${dur}s;animation-delay:${del}s;"></div>`;
            }).join('');
            return `
            <div class="fin-wrap">
                <div class="fin-stars">${stars}</div>
                <div class="fin-crown">👑</div>
                <div class="fin-hb">Happy Birthday</div>
                <div class="fin-name">Jenifar 💙</div>
                <div class="fin-hearts-row">
                    <span class="fin-hrt">💙</span>
                    <span class="fin-hrt">💜</span>
                    <span class="fin-hrt">💖</span>
                    <span class="fin-hrt">⭐</span>
                    <span class="fin-hrt">💙</span>
                </div>
                <div class="fin-letter">
                    My dearest <b>Thangam</b>,<br><br>
                    Every single day with you is a blessing I never deserved but always treasure. 🥹<br><br>
                    You are not just my girlfriend — you are my <b>home, my peace, my reason</b>. 🏡💙<br><br>
                    Today, as you turn another year more beautiful & wise, I want the whole world to know —<br><br>
                    <b>"I love you forever, Thangam. Always yours — Bharath." 💍</b>
                </div>
                <div class="fin-age-wrap">
                    <div class="fin-age-lbl">You have been alive for</div>
                    ${buildAgeHtml('B')}
                </div>
                <div class="fin-cta-row">
                    <a href="https://call.whatsapp.com/video/hdzUkrheCL54ZESXslks2t" class="call-btn" target="_blank">📞 Video Call Now!</a>
                </div>
            </div>`;
        }

        /* ── CONFETTI ── */
        function doConfetti() {
            const end = Date.now() + 7000;
            (function fire() {
                confetti({ particleCount: 12, angle: 60, spread: 70, origin: { x: 0 }, colors: ['#3b82f6', '#a855f7', '#ec4899', '#facc15'] });
                confetti({ particleCount: 12, angle: 120, spread: 70, origin: { x: 1 }, colors: ['#3b82f6', '#60a5fa', '#818cf8', '#f0abfc'] });
                if (Date.now() < end) requestAnimationFrame(fire);
            })();
        }

        /* ── PETALS ── */
        function startPetals() {
            setInterval(() => {
                const p = document.createElement('div'); p.className = 'pt';
                p.innerText = ['💙', '✨', '⭐', '❄️', '💫'][Math.floor(Math.random() * 5)];
                p.style.left = Math.random() * 100 + 'vw'; p.style.fontSize = (10 + Math.random() * 14) + 'px';
                p.style.animationDuration = (5 + Math.random() * 5) + 's';
                document.body.appendChild(p); setTimeout(() => p.remove(), 8000);
            }, 900);
        }
    </script>
