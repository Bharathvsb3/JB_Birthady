<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Ammu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #0f010a;
            overflow: hidden;
            color: #fff;
        }

        /* ── DYNAMIC COLORFUL BACKGROUND ── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            filter: blur(80px);
            opacity: 0.7;
            pointer-events: none;
        }

        .b {
            position: absolute;
            border-radius: 50%;
            transition: all 1s ease;
        }

        .b1 {
            width: 600px;
            height: 600px;
            top: -100px;
            left: -100px;
            background: #d90429;
            animation: m1 20s infinite alternate;
        }

        .b2 {
            width: 500px;
            height: 500px;
            bottom: -100px;
            right: -100px;
            background: #ff4d6d;
            animation: m2 25s infinite alternate;
        }

        .b3 {
            width: 400px;
            height: 400px;
            top: 30%;
            left: 30%;
            background: #800f2f;
            animation: m3 15s infinite alternate;
        }

        @keyframes m1 {
            to {
                transform: translate(150px, 200px) scale(1.1)
            }
        }

        @keyframes m2 {
            to {
                transform: translate(-150px, -150px) scale(0.9)
            }
        }

        @keyframes m3 {
            from {
                transform: translate(-50%, -50%)
            }

            to {
                transform: translate(100px, -200px) scale(1.2)
            }
        }

        .pt {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            animation: ptr 7s linear infinite;
        }

        @keyframes ptr {
            0% {
                transform: translateY(105vh) rotate(0);
                opacity: 0
            }

            15% {
                opacity: 0.6
            }

            90% {
                opacity: 0.4
            }

            100% {
                transform: translateY(-15vh) rotate(360deg);
                opacity: 0
            }
        }

        /* ════════════ LOGIN ════════════ */
        #login {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
        }

        .lc {
            width: 100%;
            max-width: 360px;
            background: rgba(20, 2, 10, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            padding: 40px 24px 30px;
            text-align: center;
            animation: popIn .7s cubic-bezier(.34, 1.56, .64, 1);
        }

        @keyframes popIn {
            from {
                transform: scale(.8);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .hrt {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 12px;
            animation: hp 1.4s ease-in-out infinite;
        }

        @keyframes hp {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.15)
            }
        }

        .lt {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2rem, 8vw, 2.7rem);
            color: #ff4d6d;
            margin-bottom: 5px;
        }

        .clue {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ct {
            font-size: .8rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all .2s;
        }

        .dot.on {
            background: #ff4d6d;
            border-color: #ff4d6d;
            transform: scale(1.2);
            box-shadow: 0 0 10px #ff4d6d;
        }

        .pgrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .pb {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 15px 0;
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all .15s;
        }

        .pb:active {
            transform: scale(.9);
            background: rgba(255, 77, 109, 0.3);
        }

        #login.out {
            animation: lout .6s ease forwards;
            pointer-events: none;
        }

        @keyframes lout {
            to {
                opacity: 0;
                transform: scale(1.1)
            }
        }

        /* ════════════ MAIN CARD ════════════ */
        #card {
            width: 94%;
            max-width: 440px;
            height: 88vh;
            height: 88dvh;
            max-height: 820px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
            transition: all .8s cubic-bezier(.34, 1.56, .64, 1);
        }

        #card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .prog {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            z-index: 20;
            background: rgba(255, 255, 255, 0.05);
        }

        #pbi {
            height: 100%;
            width: 0%;
            background: #ff4d6d;
            transition: width .6s ease;
        }

        .sw {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .stp {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform: translateX(100%);
            transition: transform .6s cubic-bezier(.4, 1, .2, 1), opacity .4s ease;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .stp::-webkit-scrollbar {
            display: none;
        }

        .stp.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
        }

        .stp.exit {
            opacity: 0;
            transform: translateX(-100%);
        }

        /* ── INNER CONTENT ── */
        .inner {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px 20px;
            text-align: center;
        }

        .s-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: flt 3s ease-in-out infinite;
        }

        @keyframes flt {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-15px)
            }
        }

        .s-title {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            color: #ff4d6d;
            margin-bottom: 10px;
        }

        .s-head {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .hints-wrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .hint-line {
            font-size: .9rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            line-height: 1.6;
            padding: 12px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: translateY(15px);
            transition: all .6s ease;
        }

        .hint-line.show {
            opacity: 1;
            transform: translateY(0);
        }

        .mf {
            width: 90%;
            height: 180px;
            margin-bottom: 20px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
            transform: rotate(-2deg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }

        .mf img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ── TRICK HINT (BOTTOM) ── */
        .trick-hint {
            width: 100%;
            padding: 15px;
            background: rgba(255, 77, 109, 0.1);
            font-size: 0.75rem;
            font-weight: 700;
            color: #ff8fa3;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255, 77, 109, 0.2);
        }

        /* ── PUZZLE ── */
        .pz-wrap {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .piece {
            position: absolute;
            background-repeat: no-repeat;
            transition: all .6s cubic-bezier(.34, 1.56, .64, 1);
        }

        /* ── METER ── */
        .sw-wrap {
            width: 90%;
            margin: 20px 0;
        }

        .love-sl {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }

        .love-sl::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: #ff4d6d;
            border-radius: 50%;
            border: 3px solid #fff;
            cursor: pointer;
        }

        /* ── VINYL ── */
        .vinyl {
            font-size: 5rem;
            animation: spin 4s linear infinite;
            display: block;
            margin-bottom: 15px;
            cursor: pointer;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        /* ── FINISH ── */
        .call-btn {
            background: #ff4d6d;
            color: #fff;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="bg">
        <div class="b b1"></div>
        <div class="b b2"></div>
        <div class="b b3"></div>
    </div>

    <!-- ════════════ LOGIN ════════════ -->
    <div id="login">
        <div class="lc">
            <span class="hrt">💝</span>
            <div class="lt">Happy Birthday!</div>
            <div class="ls">Unlock your special 15-step journey Ammu!</div>
            <div class="clue">
                <div class="ct">Birth Date (DDMM) please! 🥰</div>
            </div>
            <div class="dots">
                <div class="dot" id="d0"></div>
                <div class="dot" id="d1"></div>
                <div class="dot" id="d2"></div>
                <div class="dot" id="d3"></div>
            </div>
            <div id="lerr" style="color:#ff4d6d;font-size:.8rem;height:1.2rem;margin-bottom:10px;"></div>
            <div class="pgrid">
                <button class="pb" onclick="pp('1')">1</button><button class="pb" onclick="pp('2')">2</button><button
                    class="pb" onclick="pp('3')">3</button>
                <button class="pb" onclick="pp('4')">4</button><button class="pb" onclick="pp('5')">5</button><button
                    class="pb" onclick="pp('6')">6</button>
                <button class="pb" onclick="pp('7')">7</button><button class="pb" onclick="pp('8')">8</button><button
                    class="pb" onclick="pp('9')">9</button>
                <button class="pb z" onclick="pp('0')">0</button><button class="pb del" onclick="pd()">⌫</button>
            </div>
        </div>
    </div>

    <!-- ════════════ JOURNEY ════════════ -->
    <audio id="bgm" loop>
        <source src="Neelothi Video Song Out Now  Sirai  Vikram Prabhu.mp3" type="audio/mpeg">
    </audio>
    <div id="card">
        <div class="prog">
            <div id="pbi"></div>
        </div>
        <div class="sw" id="sw"></div>
    </div>

    <script>
        const PIN = '1203'; let pv = '';
        function pp(n) { if (pv.length >= 4) return; pv += n; updD(); if (pv.length === 4) chkPin(); }
        function pd() { pv = pv.slice(0, -1); updD(); document.getElementById('lerr').innerText = ''; }
        function updD() { for (let i = 0; i < 4; i++)document.getElementById('d' + i).classList.toggle('on', i < pv.length); }
        function chkPin() { if (pv === PIN) { document.getElementById('login').classList.add('out'); setTimeout(() => { document.getElementById('login').style.display = 'none'; document.getElementById('card').classList.add('show'); initSteps(); }, 600); } else { document.getElementById('lerr').innerText = 'Wrong PIN! 😜'; pv = ''; updD(); } }

        const ST = [
            { icon: '💝', title: 'Step 1: Start!', hints: ['Happy Birthday Jenifar!', 'Idhu namma 15-step unique journey!', 'Check the hint below for every step!'], trick: 'Tap anywhere to begin' },
            { icon: '🎓', head: 'Step 2: 2019 Vibes', hints: ['Nan invisible-ah dhaan irunthen.', 'Corner-la irunthu unna pathutu...', 'Namma college days memory!'], trick: 'Shake your phone to skip!' },
            { icon: '🎶', head: 'Step 3: Neelothi', hints: ['My voice for my Thangam!', 'Listen to this special song...'], trick: 'Double tap the spinning record!' },
            { icon: '📞', head: 'Step 4: First Contact', hints: ['August 2021 dhaan start achi!', 'The first "Hi" that changed everything.'], trick: 'Long press (Hold) for 2 seconds!' },
            { icon: '💖', head: 'Step 5: Nickname', hints: ['"Thangam" - En gold nee!', 'Why I call you my precious.'], trick: 'Swipe UP on this card!' },
            { icon: '🧩', head: 'Step 6: Memory Puzzle', hints: ['Namma photo reveal panna assemble pannu!'], trick: 'Tap pieces to build the picture!' },
            { icon: '😁', head: 'Step 7: That Smile', hints: ['Un smile pathu dhaan nan flat aanein!', 'Magical expression...'], trick: 'Shake to see the next memory!' },
            { icon: '🥊', head: 'Step 8: The Fight Cycle', hints: ['Fight -> Sorry -> Repeat 😂', 'Every fight made us stronger!'], trick: 'Double tap to say "Sorry" 😜' },
            { icon: '💍', head: 'Step 9: The YES Day!', hints: ['Dec 28, 2021.', 'The day you made me the happiest!'], trick: 'Hold the Pink Heart for 2 seconds!' },
            { icon: '✈️', head: 'Step 10: Animun Dreams', hints: ['Switzerland? Paris? Maldives?', 'Enga polam Thangam?'], trick: 'Rotate your phone 90 degrees!' },
            { icon: '🏡', head: 'Step 11: Home', hints: ['You are not just my love.', 'You are my home and my peace.'], trick: 'Shake for some love vibes!' },
            { icon: '📊', head: 'Step 12: Love Meter', hints: ['Can you show how much?', 'Slide it to the max!'], trick: 'Slide to 100% to continue!' },
            { icon: '✨', head: 'Step 13: Compliments', hints: ['Nee dhaan en devathai!', 'Walking angel nee.'], trick: 'Shake to shuffle compliments!' },
            { icon: '🎉', head: 'Step 14: Celebration', hints: ['It\'s 2026 and we are here!', 'Best year is coming for us.'], trick: 'Long press to release confetti!' },
            { icon: '💍', title: 'Step 15: Forever!', hints: ['Happy Birthday Ammu!', 'Seekiram vaa Thangam!', 'Wait panreinn... 😍'], trick: 'Double Tap to finish!' }
        ];

        let curIdx = 0, pzS = 0, pzPcs = [];
        const swEl = document.getElementById('sw'), pbi = document.getElementById('pbi');

        function initSteps() {
            ST.forEach((s, idx) => {
                const d = document.createElement('div'); d.className = 'stp' + (idx === 0 ? ' active' : ''); d.id = 'stp' + idx;
                let html = '';
                if (idx === 2) { // Music
                    html = `<div class="inner"><span class="vinyl" onclick="handleTrick('doubletap')">🎵</span><div class="s-head">${s.head}</div><div class="hints-wrap" id="hw${idx}"></div></div>`;
                } else if (idx === 5) { // Puzzle
                    html = `<div class="inner"><div class="s-head">${s.head}</div><div class="pz-wrap" id="pzWrap" onclick="tp()"></div><div class="pz-stat" id="pzStat">Assemble it!</div><div class="pz-cont" id="pzc" onclick="handleTrick('puzzle')">Continue ❤️</div></div>`;
                } else if (idx === 11) { // Meter
                    html = `<div class="inner"><span class="s-icon">📊</span><div class="s-head">${s.head}</div><div class="sw-wrap"><input type="range" min="1" max="100" value="50" class="love-sl" oninput="um(this.value)"></div><div id="mt">Slide it!</div></div>`;
                } else {
                    html = `<div class="inner"><span class="s-icon">${s.icon || '💖'}</span>${s.title ? `<div class="s-title">${s.title}</div>` : ''}${s.head ? `<div class="s-head">${s.head}</div>` : ''}<div class="hints-wrap" id="hw${idx}"></div>${idx === 14 ? `<a href="https://call.whatsapp.com/video/hdzUkrheCL54ZESXslks2t" class="call-btn" target="_blank">📞 Video Call!</a>` : ''}</div>`;
                }
                html += `<div class="trick-hint">👉 ${s.trick}</div>`;
                d.innerHTML = html; swEl.appendChild(d);
                d.addEventListener('click', e => { if (ST[curIdx].trick.includes('Tap anywhere') && !ST[curIdx].trick.includes('Double')) handleTrick('tap'); });

                // Double Tap detector
                let lastTap = 0;
                d.addEventListener('touchstart', e => {
                    let now = Date.now();
                    if (now - lastTap < 300) handleTrick('doubletap');
                    lastTap = now;
                    // Long press detector
                    window.lpTimer = setTimeout(() => handleTrick('longpress'), 1500);
                });
                d.addEventListener('touchend', () => clearTimeout(window.lpTimer));

                // Swipe detector
                let startY = 0;
                d.addEventListener('touchstart', e => startY = e.touches[0].pageY);
                d.addEventListener('touchend', e => { if (startY - e.changedTouches[0].pageY > 100) handleTrick('swipeup'); });
            });
            sh(0);
            setupShake();
            window.addEventListener('orientationchange', () => handleTrick('rotate'));
        }

        function handleTrick(t) {
            const s = ST[curIdx];
            const tr = s.trick.toLowerCase();
            if (tr.includes(t)) gn(curIdx);
        }

        function sh(idx) {
            const h = ST[idx].hints; if (!h) return;
            const w = document.getElementById('hw' + idx);
            h.forEach((t, i) => {
                const p = document.createElement('div'); p.className = 'hint-line'; p.innerText = t; w.appendChild(p);
                setTimeout(() => p.classList.add('show'), i * 800 + 200);
            });
        }

        function gn(i) {
            if (i !== curIdx) return;
            const n = i + 1; if (n >= ST.length) return;
            document.getElementById('stp' + i).classList.remove('active');
            document.getElementById('stp' + i).classList.add('exit');
            curIdx = n;
            setTimeout(() => {
                document.getElementById('stp' + n).classList.add('active');
                pbi.style.width = `${((n + 1) / ST.length) * 100}%`;
                if (ST[n].hints) sh(n);
            }, 500);
        }

        function setupShake() {
            let lx, ly, lz, lastS = 0;
            window.addEventListener('devicemotion', e => {
                const a = e.accelerationIncludingGravity; if (!a) return;
                if (!lx) { lx = a.x; ly = a.y; lz = a.z; return; }
                let d = Math.abs(a.x - lx) + Math.abs(a.y - ly) + Math.abs(a.z - lz);
                lx = a.x; ly = a.y; lz = a.z;
                if (d > 25 && Date.now() - lastS > 1000) { lastS = Date.now(); handleTrick('shake'); }
            });
        }

        const PIC = 'https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&q=80&w=600';
        function buildPz() {
            const w = document.getElementById('pzWrap'); if (!w) return;
            const sz = Math.floor(Math.min(260, window.innerWidth * 0.7) / 3) * 3, ps = sz / 3;
            w.style.width = sz + 'px'; w.style.height = sz + 'px';
            for (let i = 0; i < 9; i++) {
                const r = Math.floor(i / 3), c = i % 3, p = document.createElement('div'); p.className = 'piece';
                p.style.cssText = `width:${ps}px;height:${ps}px;left:${c * ps}px;top:${r * ps}px;background-image:url('${PIC}');background-size:${sz}px ${sz}px;background-position:${-c * ps}px ${-r * ps}px;transform:translate(${(i - 4) * 100}%,${(i - 4) * 100}%) rotate(${30 * i}deg);opacity:0;`;
                w.appendChild(p); pzPcs.push(p);
            }
        }
        function tp() {
            if (pzPcs.length === 0) { buildPz(); return; }
            if (pzS >= 9) return;
            const p = pzPcs[pzS]; p.style.opacity = '1'; p.style.transform = 'none'; pzS++;
            if (pzS === 9) document.getElementById('pzc').style.display = 'block';
        }

        function um(v) { document.getElementById('mt').innerText = v >= 99 ? 'MAX LOVE! ❤️' : 'Slide more...'; if (v >= 99) handleTrick('slide'); }
        function pm() { document.getElementById('bgm').play(); }

        function mp() {
            const p = document.createElement('div'); p.className = 'pt'; p.innerText = ['❤️', '✨', '🌸'][Math.floor(Math.random() * 3)];
            p.style.left = Math.random() * 100 + 'vw'; p.style.fontSize = (10 + Math.random() * 20) + 'px';
            p.style.animationDuration = (5 + Math.random() * 5) + 's'; document.body.appendChild(p);
            setTimeout(() => p.remove(), 7000);
        }
        setInterval(mp, 800);
    </script>
</body>

</html>
