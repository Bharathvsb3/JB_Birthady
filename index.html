<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Happy Birthday Jenifar 💙</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020c22;
            overflow: hidden;
            color: #fff;
            user-select: none;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            filter: blur(100px);
            opacity: .7;
            pointer-events: none;
        }

        .b {
            position: absolute;
            border-radius: 50%;
        }

        .b1 {
            width: 600px;
            height: 600px;
            top: -150px;
            left: -150px;
            background: radial-gradient(circle, #1e40af, transparent 70%);
            animation: m1 20s infinite alternate;
        }

        .b2 {
            width: 550px;
            height: 550px;
            bottom: -130px;
            right: -130px;
            background: radial-gradient(circle, #0284c7, transparent 70%);
            animation: m2 24s infinite alternate;
        }

        .b3 {
            width: 450px;
            height: 450px;
            top: 35%;
            left: 20%;
            background: radial-gradient(circle, #4f46e5, transparent 70%);
            animation: m3 16s infinite alternate;
        }

        @keyframes m1 {
            to {
                transform: translate(200px, 250px)scale(1.2)
            }
        }

        @keyframes m2 {
            to {
                transform: translate(-200px, -200px)scale(.8)
            }
        }

        @keyframes m3 {
            from {
                transform: translate(-40%, -40%)
            }

            to {
                transform: translate(100px, -220px)scale(1.25)
            }
        }

        .pt {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            animation: ptr 7s linear infinite;
        }

        @keyframes ptr {
            0% {
                transform: translateY(106vh)rotate(0);
                opacity: 0
            }

            12% {
                opacity: .5
            }

            88% {
                opacity: .4
            }

            100% {
                transform: translateY(-12vh)rotate(380deg);
                opacity: 0
            }
        }

        /* LOGIN */
        #login {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lc {
            width: 100%;
            max-width: 360px;
            background: rgba(2, 8, 30, .88);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 40px;
            border: 1px solid rgba(96, 165, 250, .22);
            box-shadow: 0 35px 80px rgba(0, 0, 0, .65);
            padding: 44px 26px 34px;
            text-align: center;
            animation: popIn .75s cubic-bezier(.34, 1.56, .64, 1);
        }

        @keyframes popIn {
            from {
                transform: scale(.78);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        #login.out {
            animation: lout .5s ease forwards;
            pointer-events: none;
        }

        @keyframes lout {
            to {
                opacity: 0;
                transform: scale(1.08)
            }
        }

        .hrt {
            font-size: 3.8rem;
            display: block;
            margin-bottom: 14px;
            animation: hp 1.6s ease-in-out infinite;
        }

        @keyframes hp {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 10px #3b82f6)
            }

            50% {
                transform: scale(1.14);
                filter: drop-shadow(0 0 24px #60a5fa)
            }
        }

        .lt {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2rem, 8vw, 2.8rem);
            color: #60a5fa;
            margin-bottom: 6px;
        }

        .ls {
            font-size: .82rem;
            color: rgba(255, 255, 255, .38);
            margin-bottom: 18px;
        }

        .clue {
            background: rgba(59, 130, 246, .07);
            border: 1px solid rgba(59, 130, 246, .18);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 20px;
        }

        .ct {
            font-size: .82rem;
            color: rgba(255, 255, 255, .6);
            line-height: 1.6;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 13px;
            margin-bottom: 14px;
        }

        .dot {
            width: 17px;
            height: 17px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .07);
            border: 2px solid rgba(59, 130, 246, .22);
            transition: all .22s;
        }

        .dot.on {
            background: #3b82f6;
            border-color: #60a5fa;
            box-shadow: 0 0 14px #3b82f6;
            transform: scale(1.22);
        }

        #lerr {
            font-size: .82rem;
            font-weight: 700;
            min-height: 22px;
            margin-bottom: 10px;
            color: #f87171;
        }

        @keyframes shk {

            0%,
            100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-8px)
            }

            75% {
                transform: translateX(8px)
            }
        }

        .pgrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 11px;
            margin-bottom: 10px;
        }

        .pb {
            background: rgba(59, 130, 246, .07);
            border: 1px solid rgba(59, 130, 246, .18);
            border-radius: 18px;
            padding: 15px 0;
            font-size: 1.28rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all .15s;
        }

        .pb:active {
            transform: scale(.88);
            background: rgba(59, 130, 246, .3);
        }

        .pb.del {
            color: rgba(255, 255, 255, .38);
            font-size: 1rem;
        }

        .pb.z {
            grid-column: 2;
        }

        /* CARD */
        #card {
            width: 94%;
            max-width: 440px;
            height: 90dvh;
            max-height: 830px;
            border-radius: 42px;
            background: rgba(2, 10, 35, .6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 35px 80px rgba(0, 0, 0, .6), 0 0 0 1px rgba(96, 165, 250, .12) inset;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(32px);
            transition: all .85s cubic-bezier(.34, 1.56, .64, 1);
        }

        #card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .prog {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            z-index: 20;
            background: rgba(255, 255, 255, .05);
        }

        #pbi {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1d4ed8, #38bdf8, #818cf8);
            transition: width .7s ease;
        }

        .sbadge {
            position: absolute;
            top: 14px;
            right: 16px;
            z-index: 20;
            background: rgba(59, 130, 246, .14);
            border: 1px solid rgba(59, 130, 246, .28);
            border-radius: 50px;
            padding: 5px 14px;
            font-size: .7rem;
            font-weight: 700;
            color: #60a5fa;
        }

        .sw {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .stp {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform: translateX(105%);
            transition: transform .6s cubic-bezier(.4, 1, .2, 1), opacity .38s ease;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .stp::-webkit-scrollbar {
            display: none;
        }

        .stp.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
        }

        .stp.exit {
            opacity: 0;
            transform: translateX(-105%);
        }

        /* Back-navigation: previous step enters from left */
        .stp.from-left {
            opacity: 0 !important;
            transform: translateX(-105%) !important;
            pointer-events: none !important;
        }

        /* STEP CONTENT */
        .inner {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 22px 16px;
            text-align: center;
            gap: 10px;
        }

        .s-icon {
            font-size: clamp(3rem, 11vw, 4.5rem);
            animation: flt 3.2s ease-in-out infinite;
            filter: drop-shadow(0 0 16px rgba(96, 165, 250, .35));
        }

        @keyframes flt {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-16px)
            }
        }

        .s-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.2rem, 9vw, 3rem);
            color: #60a5fa;
            text-shadow: 0 0 30px rgba(96, 165, 250, .3);
        }

        .s-head {
            font-size: 1.05rem;
            font-weight: 700;
            color: rgba(255, 255, 255, .88);
            line-height: 1.45;
        }

        .s-txt {
            font-size: .88rem;
            color: rgba(255, 255, 255, .6);
            line-height: 1.75;
            white-space: pre-line;
            max-width: 340px;
        }

        .mf {
            width: 90%;
            height: 155px;
            border-radius: 22px;
            overflow: hidden;
            flex-shrink: 0;
            transform: rotate(-1.5deg);
            box-shadow: 0 14px 40px rgba(0, 0, 0, .35);
            border: 2px solid rgba(255, 255, 255, .1);
        }

        .mf img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .trick-bar {
            flex-shrink: 0;
            padding: 13px 18px;
            background: rgba(30, 64, 175, .12);
            border-top: 1px solid rgba(59, 130, 246, .18);
            font-size: .75rem;
            font-weight: 700;
            color: #7dd3fc;
            letter-spacing: .6px;
            text-align: center;
        }

        /* LIVE AGE COUNTER */
        .age-live {
            display: flex;
            gap: 7px;
            justify-content: center;
            flex-wrap: nowrap;
            margin: 10px 0;
        }

        .ac-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(59, 130, 246, .1);
            border: 1px solid rgba(59, 130, 246, .22);
            border-radius: 14px;
            padding: 10px 8px;
            min-width: clamp(46px, 13vw, 62px);
        }

        .ac-n {
            font-size: clamp(1.1rem, 4.5vw, 1.6rem);
            font-weight: 800;
            color: #60a5fa;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
        }

        .ac-u {
            font-size: .6rem;
            color: rgba(255, 255, 255, .37);
            text-transform: uppercase;
            letter-spacing: .4px;
            margin-top: 2px;
        }

        /* MUSIC */
        .vinyl {
            font-size: 6rem;
            display: block;
            cursor: pointer;
            animation: spin 4s linear infinite;
            filter: drop-shadow(0 0 22px rgba(96, 165, 250, .55));
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .plbl {
            font-size: .85rem;
            color: rgba(255, 255, 255, .45);
            margin-top: 6px;
        }

        /* TAP COUNT */
        .tap-feed {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 50;
        }

        .tc-num {
            font-size: 5rem;
            font-weight: 800;
            color: rgba(96, 165, 250, .5);
            opacity: 0;
            transform: scale(.5);
            transition: all .18s;
        }

        .tc-num.show {
            opacity: 1;
            transform: scale(1);
        }

        /* PUZZLE */
        .pz-wrap {
            position: relative;
            border-radius: 22px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(59, 130, 246, .25);
            flex-shrink: 0;
        }

        .pz-piece {
            position: absolute;
            background-repeat: no-repeat;
            transition: all .58s cubic-bezier(.34, 1.56, .64, 1);
        }

        .pz-stat {
            font-size: .82rem;
            color: #60a5fa;
            font-weight: 700;
            margin-top: 12px;
            min-height: 22px;
        }

        .pz-btn {
            display: none;
            margin-top: 14px;
            background: rgba(59, 130, 246, .18);
            border: 1.5px solid rgba(59, 130, 246, .4);
            border-radius: 50px;
            padding: 13px 30px;
            font-weight: 700;
            font-size: .88rem;
            color: #fff;
            cursor: pointer;
        }

        /* METER */
        .sw-wrap {
            width: 92%;
            margin: 6px 0;
        }

        .love-sl {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .08);
            outline: none;
        }

        .love-sl::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: #3b82f6;
            border-radius: 50%;
            border: 4px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 14px rgba(59, 130, 246, .6);
        }

        .m-lbl {
            font-size: .92rem;
            font-weight: 700;
            color: #60a5fa;
            min-height: 24px;
        }

        /* TYPE STEP */
        .yr-input {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            background: rgba(59, 130, 246, .08);
            border: 2px solid rgba(59, 130, 246, .3);
            border-radius: 20px;
            padding: 16px;
            width: 78%;
            max-width: 220px;
            color: #60a5fa;
            outline: none;
            letter-spacing: 6px;
        }

        .yr-input:focus {
            border-color: #60a5fa;
            background: rgba(59, 130, 246, .12);
        }

        /* DRAG STEP */
        .drag-zone {
            width: 90%;
            height: 150px;
            position: relative;
            background: rgba(59, 130, 246, .05);
            border: 1px dashed rgba(59, 130, 246, .2);
            border-radius: 22px;
            flex-shrink: 0;
        }

        .drag-heart {
            position: absolute;
            font-size: 3.5rem;
            cursor: grab;
            z-index: 10;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            transition: font-size .3s;
            touch-action: none;
        }

        .drag-target {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            height: 70px;
            border: 2px dashed rgba(59, 130, 246, .5);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            gap: 2px;
        }

        .drag-lbl {
            font-size: .65rem;
            color: rgba(255, 255, 255, .4);
        }

        /* CONFETTI BTN */
        .conf-btn {
            background: rgba(59, 130, 246, .14);
            border: 1.5px solid rgba(59, 130, 246, .35);
            border-radius: 50px;
            padding: 16px 36px;
            font-weight: 700;
            font-size: .92rem;
            color: #fff;
            cursor: pointer;
            letter-spacing: .5px;
        }

        .conf-btn:active {
            background: rgba(59, 130, 246, .3);
        }

        /* FINISH */
        .call-btn {
            background: #3b82f6;
            color: #fff;
            padding: 17px 40px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            margin-top: 14px;
            box-shadow: 0 12px 32px rgba(59, 130, 246, .45);
            animation: cpulse 2.2s infinite;
        }

        @keyframes cpulse {

            0%,
            100% {
                box-shadow: 0 12px 32px rgba(59, 130, 246, .45), 0 0 0 0 rgba(59, 130, 246, .25)
            }

            50% {
                box-shadow: 0 12px 32px rgba(59, 130, 246, .45), 0 0 0 14px rgba(59, 130, 246, 0)
            }
        }

        /* HIDDEN BACK BUTTON */
        #backBtn {
            position: absolute;
            top: 0;
            left: 0;
            width: 55px;
            height: 55px;
            z-index: 25;
            cursor: pointer;
            opacity: 0.01;
            -webkit-tap-highlight-color: transparent;
        }

        /* RESPONSIVE */
        @media (max-width: 360px) {
            .inner {
                padding: 44px 14px 12px;
                gap: 7px;
            }

            .s-icon {
                font-size: 2.8rem;
            }

            .s-title {
                font-size: 2rem;
            }

            .s-head {
                font-size: .95rem;
            }

            .s-txt {
                font-size: .82rem;
            }

            .ac-box {
                min-width: 40px;
                padding: 8px 4px;
            }

            .ac-n {
                font-size: 1rem;
            }

            .ac-u {
                font-size: .55rem;
            }

            .age-live {
                gap: 4px;
            }

            .mf {
                height: 130px;
            }

            .trick-bar {
                font-size: .7rem;
                padding: 10px 14px;
            }
        }

        @media (min-width: 768px) {
            #card {
                border-radius: 48px;
                max-width: 480px;
            }

            .s-icon {
                font-size: 5rem;
            }

            .s-title {
                font-size: 3.5rem;
            }

            .inner {
                padding: 55px 30px 20px;
            }

            .mf {
                height: 200px;
            }
        }

        @media (min-width: 1024px) {
            #card {
                max-width: 500px;
            }
        }
    </style>
</head>

<body>
    <div class="bg">
        <div class="b b1"></div>
        <div class="b b2"></div>
        <div class="b b3"></div>
    </div>
    <div id="login">
        <div class="lc">
            <span class="hrt">💙</span>
            <div class="lt">Hi Thangam!</div>
            <div class="ls">Unlock your 24-step Birthday Journey 🎁</div>
            <div class="clue">
                <div class="ct">Enter your secret PIN!<br><b style="color:#60a5fa;">PIN = 1201</b></div>
            </div>
            <div class="dots">
                <div class="dot" id="d0"></div>
                <div class="dot" id="d1"></div>
                <div class="dot" id="d2"></div>
                <div class="dot" id="d3"></div>
            </div>
            <div id="lerr"></div>
            <div class="pgrid">
                <button class="pb" onclick="pp('1')">1</button><button class="pb" onclick="pp('2')">2</button><button
                    class="pb" onclick="pp('3')">3</button>
                <button class="pb" onclick="pp('4')">4</button><button class="pb" onclick="pp('5')">5</button><button
                    class="pb" onclick="pp('6')">6</button>
                <button class="pb" onclick="pp('7')">7</button><button class="pb" onclick="pp('8')">8</button><button
                    class="pb" onclick="pp('9')">9</button>
                <button class="pb z" onclick="pp('0')">0</button><button class="pb del" onclick="pd()">⌫</button>
            </div>
        </div>
    </div>
    <audio id="bgm" loop>
        <source src="Neelothi Video Song Out Now  Sirai  Vikram Prabhu.mp3" type="audio/mpeg">
    </audio>
    <div id="card">
        <div class="prog">
            <div id="pbi"></div>
        </div>
        <div class="sbadge" id="sbadge">1 / 24</div>
        <!-- Hidden back button – top-left corner secret tap -->
        <div id="backBtn" onclick="goPrev()"></div>
        <div class="sw" id="sw"></div>
    </div>

    <script>
        /* ── PIN ── */
        const PIN = '1201'; let pv = '';
        function pp(n) { if (pv.length >= 4) return; pv += n; updD(); if (pv.length === 4) chkPin(); }
        function pd() { pv = pv.slice(0, -1); updD(); ler(''); }
        function updD() { for (let i = 0; i < 4; i++)document.getElementById('d' + i).classList.toggle('on', i < pv.length); }
        function ler(m, c) { const e = document.getElementById('lerr'); e.textContent = m; e.style.color = c || '#f87171'; }
        function chkPin() {
            if (pv === PIN) { ler('✅ Welcome Thangam! 💙', '#4ade80'); setTimeout(() => document.getElementById('login').classList.add('out'), 350); setTimeout(() => { document.getElementById('login').style.display = 'none'; document.getElementById('card').classList.add('show'); startJourney(); }, 900); }
            else { ler('Wrong PIN! 😜'); const e = document.getElementById('lerr'); e.style.animation = 'none'; void e.offsetWidth; e.style.animation = 'shk .4s ease'; pv = ''; updD(); }
        }

        /* ── BIRTH & LIVE AGE ── */
        const BIRTH = new Date('2002-03-12T00:00:00+05:30');
        function calcAge() {
            const now = new Date(), diff = now - BIRTH;
            const ts = Math.floor(diff / 1000), s = ts % 60, tm = Math.floor(ts / 60), m = tm % 60, th = Math.floor(tm / 60), h = th % 24;
            let yr = now.getFullYear() - BIRTH.getFullYear();
            const bdy = new Date(now.getFullYear(), BIRTH.getMonth(), BIRTH.getDate());
            if (now < bdy) yr--;
            const lastBd = new Date(now.getFullYear() + (now < bdy ? -1 : 0), BIRTH.getMonth(), BIRTH.getDate());
            const d = Math.floor((now - lastBd) / 86400000);
            return { yr, d, h, m, s };
        }
        function buildAgeHtml(uid) {
            return `<div class="age-live" id="ag${uid}">
    <div class="ac-box"><span class="ac-n yr">?</span><span class="ac-u">Years</span></div>
    <div class="ac-box"><span class="ac-n dy">?</span><span class="ac-u">Days</span></div>
    <div class="ac-box"><span class="ac-n hr">?</span><span class="ac-u">Hours</span></div>

            }, { passive: true });
        }

        /* ── CONFETTI ── */
        function doConfetti() {
            const end = Date.now() + 5000;
            (function fire() {
                confetti({ particleCount: 9, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#3b82f6', '#60a5fa', '#818cf8'] });
                confetti({ particleCount: 9, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#3b82f6', '#60a5fa', '#818cf8'] });
                if (Date.now() < end) requestAnimationFrame(fire);
            })();
        }

        /* ── PETALS ── */
        function startPetals() {
            setInterval(() => {
                const p = document.createElement('div'); p.className = 'pt';
                p.innerText = ['💙', '✨', '⭐', '❄️', '💫'][Math.floor(Math.random() * 5)];
                p.style.left = Math.random() * 100 + 'vw'; p.style.fontSize = (10 + Math.random() * 14) + 'px';
                p.style.animationDuration = (5 + Math.random() * 5) + 's';
                document.body.appendChild(p); setTimeout(() => p.remove(), 8000);
            }, 900);
        }
    </script>
</body>

</html>
