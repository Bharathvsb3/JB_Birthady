<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Happy Birthday Jenifar 💙</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020c22;
            overflow: hidden;
            color: #fff;
            user-select: none;
        }

        /* BLUE AURORA */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            filter: blur(100px);
            opacity: .75;
            pointer-events: none;
        }

        .b {
            position: absolute;
            border-radius: 50%;
        }

        .b1 {
            width: 650px;
            height: 650px;
            top: -150px;
            left: -150px;
            background: radial-gradient(circle, #1e40af 0%, transparent 70%);
            animation: m1 20s ease-in-out infinite alternate;
        }

        .b2 {
            width: 550px;
            height: 550px;
            bottom: -130px;
            right: -130px;
            background: radial-gradient(circle, #0284c7 0%, transparent 70%);
            animation: m2 24s ease-in-out infinite alternate;
        }

        .b3 {
            width: 450px;
            height: 450px;
            top: 35%;
            left: 20%;
            background: radial-gradient(circle, #4f46e5 0%, transparent 70%);
            animation: m3 16s ease-in-out infinite alternate;
        }

        @keyframes m1 {
            to {
                transform: translate(200px, 250px)scale(1.2)
            }
        }

        @keyframes m2 {
            to {
                transform: translate(-220px, -200px)scale(.8)
            }
        }

        @keyframes m3 {
            from {
                transform: translate(-40%, -40%)
            }

            to {
                transform: translate(110px, -220px)scale(1.25)
            }
        }

        /* PETALS */
        .pt {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            animation: ptr 7s linear infinite;
        }

        @keyframes ptr {
            0% {
                transform: translateY(106vh)rotate(0);
                opacity: 0
            }

            12% {
                opacity: .55
            }

            88% {
                opacity: .4
            }

            100% {
                transform: translateY(-13vh)rotate(380deg);
                opacity: 0
            }
        }

        /* ═══ LOGIN ═══ */
        #login {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lc {
            width: 100%;
            max-width: 370px;
            background: rgba(2, 8, 30, .88);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 40px;
            border: 1px solid rgba(96, 165, 250, .22);
            box-shadow: 0 35px 80px rgba(0, 0, 0, .65), 0 0 45px rgba(30, 64, 175, .18);
            padding: 44px 26px 34px;
            text-align: center;
            animation: popIn .75s cubic-bezier(.34, 1.56, .64, 1);
        }

        @keyframes popIn {
            from {
                transform: scale(.78);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        #login.out {
            animation: lout .6s ease forwards;
            pointer-events: none;
        }

        @keyframes lout {
            to {
                opacity: 0;
                transform: scale(1.08)
            }
        }

        .hrt {
            font-size: 3.8rem;
            display: block;
            margin-bottom: 14px;
            animation: hp 1.6s ease-in-out infinite;
        }

        @keyframes hp {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 10px #3b82f6)
            }

            50% {
                transform: scale(1.14);
                filter: drop-shadow(0 0 24px #60a5fa)
            }
        }

        .lt {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.1rem, 8vw, 2.9rem);
            color: #60a5fa;
            margin-bottom: 6px;
            text-shadow: 0 0 25px rgba(96, 165, 250, .4);
        }

        .ls {
            font-size: .82rem;
            color: rgba(255, 255, 255, .38);
            margin-bottom: 22px;
        }

        .clue {
            background: rgba(59, 130, 246, .07);
            border: 1px solid rgba(59, 130, 246, .18);
            border-radius: 20px;
            padding: 15px 18px;
            margin-bottom: 22px;
        }

        .ct {
            font-size: .82rem;
            color: rgba(255, 255, 255, .6);
            line-height: 1.6;
        }

        .ct b {
            color: #60a5fa;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 13px;
            margin-bottom: 16px;
        }

        .dot {
            width: 17px;
            height: 17px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .07);
            border: 2px solid rgba(59, 130, 246, .22);
            transition: all .22s;
        }

        .dot.on {
            background: #3b82f6;
            border-color: #60a5fa;
            box-shadow: 0 0 14px #3b82f6;
            transform: scale(1.22);
        }

        .lerr {
            font-size: .82rem;
            font-weight: 700;
            min-height: 22px;
            margin-bottom: 10px;
            color: #f87171;
            transition: all .3s;
        }

        @keyframes shk {

            0%,
            100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-8px)
            }

            75% {
                transform: translateX(8px)
            }
        }

        .shk {
            animation: shk .4s ease;
        }

        .pgrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 11px;
            margin-bottom: 12px;
        }

        .pb {
            background: rgba(59, 130, 246, .07);
            border: 1px solid rgba(59, 130, 246, .18);
            border-radius: 18px;
            padding: 15px 0;
            font-size: 1.28rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all .15s;
        }

        .pb:active {
            transform: scale(.88);
            background: rgba(59, 130, 246, .3);
            border-color: #60a5fa;
        }

        .pb.del {
            color: rgba(255, 255, 255, .38);
            font-size: 1rem;
        }

        .pb.z {
            grid-column: 2;
        }

        .xh {
            font-size: .72rem;
            color: rgba(255, 255, 255, .28);
            margin-top: 4px;
        }

        /* ═══ CARD ═══ */
        #card {
            width: 94%;
            max-width: 440px;
            height: 90dvh;
            max-height: 830px;
            border-radius: 42px;
            background: rgba(2, 10, 35, .6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 35px 80px rgba(0, 0, 0, .6), 0 0 0 1px rgba(96, 165, 250, .13) inset;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(32px);
            transition: all .85s cubic-bezier(.34, 1.56, .64, 1);
        }

        #card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .prog {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            z-index: 20;
            background: rgba(255, 255, 255, .05);
        }

        #pbi {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1d4ed8, #38bdf8, #818cf8);
            transition: width .7s ease;
            border-radius: 2px;
        }

        .sbadge {
            position: absolute;
            top: 14px;
            right: 18px;
            z-index: 20;
            background: rgba(59, 130, 246, .14);
            border: 1px solid rgba(59, 130, 246, .28);
            border-radius: 50px;
            padding: 5px 15px;
            font-size: .7rem;
            font-weight: 700;
            color: #60a5fa;
            letter-spacing: .6px;
        }

        .sw {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .stp {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform: translateX(105%);
            transition: transform .6s cubic-bezier(.4, 1, .2, 1), opacity .38s ease;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .stp::-webkit-scrollbar {
            display: none;
        }

        .stp.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
        }

        .stp.exit {
            opacity: 0;
            transform: translateX(-105%);
        }

        /* INNER */
        .inner {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 22px 16px;
            text-align: center;
            gap: 10px;
        }

        .s-icon {
            font-size: clamp(3.2rem, 11vw, 4.5rem);
            animation: flt 3.2s ease-in-out infinite;
            display: block;
            filter: drop-shadow(0 0 16px rgba(96, 165, 250, .35));
        }

        @keyframes flt {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-16px)
            }
        }

        .s-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.3rem, 9vw, 3.2rem);
            color: #60a5fa;
            text-shadow: 0 0 30px rgba(96, 165, 250, .35);
            line-height: 1.2;
        }

        .s-head {
            font-size: 1.05rem;
            font-weight: 700;
            color: rgba(255, 255, 255, .88);
            line-height: 1.45;
        }

        .s-txt {
            font-size: .9rem;
            color: rgba(255, 255, 255, .6);
            line-height: 1.7;
            max-width: 340px;
        }

        .mf {
            width: 90%;
            height: 165px;
            border-radius: 24px;
            overflow: hidden;
            flex-shrink: 0;
            transform: rotate(-1.5deg);
            box-shadow: 0 14px 40px rgba(0, 0, 0, .35);
            border: 2px solid rgba(255, 255, 255, .1);
        }

        .mf img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* TRICK BAR */
        .trick-bar {
            flex-shrink: 0;
            padding: 13px 18px;
            background: rgba(30, 64, 175, .12);
            border-top: 1px solid rgba(59, 130, 246, .18);
            font-size: .75rem;
            font-weight: 700;
            color: #7dd3fc;
            letter-spacing: .6px;
            text-align: center;
        }

        /* MUSIC */
        .vinyl {
            font-size: 6rem;
            display: block;
            cursor: pointer;
            animation: spin 4s linear infinite;
            filter: drop-shadow(0 0 22px rgba(96, 165, 250, .55));
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .plbl {
            font-size: .85rem;
            color: rgba(255, 255, 255, .45);
            margin-top: 6px;
            transition: color .3s;
        }

        /* PUZZLE */
        .pz-wrap {
            position: relative;
            border-radius: 22px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(59, 130, 246, .25);
            flex-shrink: 0;
        }

        .pz-piece {
            position: absolute;
            background-repeat: no-repeat;
            transition: all .58s cubic-bezier(.34, 1.56, .64, 1);
        }

        .pz-stat {
            font-size: .82rem;
            color: #60a5fa;
            font-weight: 700;
            margin-top: 12px;
            min-height: 22px;
        }

        .pz-btn {
            display: none;
            margin-top: 14px;
            background: rgba(59, 130, 246, .18);
            border: 1.5px solid rgba(59, 130, 246, .4);
            border-radius: 50px;
            padding: 13px 30px;
            font-weight: 700;
            font-size: .88rem;
            color: #fff;
            cursor: pointer;
        }

        /* METER */
        .sw-wrap {
            width: 92%;
            margin: 6px 0;
        }

        .love-sl {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .08);
            outline: none;
        }

        .love-sl::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: #3b82f6;
            border-radius: 50%;
            border: 4px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 14px rgba(59, 130, 246, .6);
        }

        .m-lbl {
            font-size: .92rem;
            font-weight: 700;
            color: #60a5fa;
            min-height: 24px;
            transition: color .3s;
        }

        /* CONFETTI BTN */
        .conf-btn {
            background: rgba(59, 130, 246, .14);
            border: 1.5px solid rgba(59, 130, 246, .35);
            border-radius: 50px;
            padding: 14px 32px;
            font-weight: 700;
            font-size: .9rem;
            color: #fff;
            cursor: pointer;
            letter-spacing: .5px;
        }

        /* FINISH */
        .call-btn {
            background: #3b82f6;
            color: #fff;
            padding: 17px 42px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            margin-top: 12px;
            box-shadow: 0 12px 32px rgba(59, 130, 246, .45);
            animation: cpulse 2.2s infinite;
        }

        @keyframes cpulse {

            0%,
            100% {
                box-shadow: 0 12px 32px rgba(59, 130, 246, .45), 0 0 0 0 rgba(59, 130, 246, .25)
            }

            50% {
                box-shadow: 0 12px 32px rgba(59, 130, 246, .45), 0 0 0 14px rgba(59, 130, 246, 0)
            }
        }

        /* TAP-COUNT FEEDBACK */
        .tap-ring {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 50;
        }

        .tap-count {
            font-size: 5rem;
            font-weight: 800;
            color: rgba(96, 165, 250, .6);
            opacity: 0;
            transition: opacity .2s;
        }

        .tap-count.show {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="bg">
        <div class="b b1"></div>
        <div class="b b2"></div>
        <div class="b b3"></div>
    </div>

    <!-- LOGIN -->
    <div id="login">
        <div class="lc">
            <span class="hrt">💙</span>
            <div class="lt">Hi Thangam!</div>
            <div class="ls">Unlock your Birthday Surprise 🎁</div>
            <div class="clue">
                <div class="ct">Enter your secret PIN!<br><b>Clue: December 01 → 0112</b><br><b
                        style="color:#7dd3fc;font-size:.75rem;">(PIN = 1201)</b></div>
            </div>
            <div class="dots">
                <div class="dot" id="d0"></div>
                <div class="dot" id="d1"></div>
                <div class="dot" id="d2"></div>
                <div class="dot" id="d3"></div>
            </div>
            <div class="lerr" id="lerr"></div>
            <div class="pgrid">
                <button class="pb" onclick="pp('1')">1</button><button class="pb" onclick="pp('2')">2</button><button
                    class="pb" onclick="pp('3')">3</button>
                <button class="pb" onclick="pp('4')">4</button><button class="pb" onclick="pp('5')">5</button><button
                    class="pb" onclick="pp('6')">6</button>
                <button class="pb" onclick="pp('7')">7</button><button class="pb" onclick="pp('8')">8</button><button
                    class="pb" onclick="pp('9')">9</button>
                <button class="pb z" onclick="pp('0')">0</button><button class="pb del" onclick="pd()">⌫</button>
            </div>
            <div class="xh">💡 Think about the PIN above!</div>
        </div>
    </div>

    <!-- AUDIO -->
    <audio id="bgm" loop>
        <source src="Neelothi Video Song Out Now  Sirai  Vikram Prabhu.mp3" type="audio/mpeg">
    </audio>

    <!-- CARD -->
    <div id="card">
        <div class="prog">
            <div id="pbi"></div>
        </div>
        <div class="sbadge" id="sbadge">1 / 15</div>
        <div class="sw" id="sw"></div>
    </div>

    <script>
        /* ═══ PIN ═══ */
        const PIN = '1201'; let pv = '';
        function pp(n) { if (pv.length >= 4) return; pv += n; updD(); if (pv.length === 4) chkPin(); }
        function pd() { pv = pv.slice(0, -1); updD(); ler(''); }
        function updD() { for (let i = 0; i < 4; i++)document.getElementById('d' + i).classList.toggle('on', i < pv.length); }
        function ler(m, c) { const e = document.getElementById('lerr'); e.textContent = m; if (c) e.style.color = c; }
        function chkPin() {
            if (pv === PIN) {
                ler('✅ Welcome Thangam! 💙', '#4ade80');
                setTimeout(() => document.getElementById('login').classList.add('out'), 350);
                setTimeout(() => { document.getElementById('login').style.display = 'none'; document.getElementById('card').classList.add('show'); startJourney(); }, 900);
            } else {
                ler('Wrong PIN! Try again 😜', '#f87171');
                const e = document.getElementById('lerr'); e.classList.remove('shk'); void e.offsetWidth; e.classList.add('shk');
                pv = ''; updD();
            }
        }

        /* ═══ 15 STEPS (no hints array – content shown directly) ═══
           nav types: tap | shake | doubletap | longpress | swipeup | swipeleft |
                      tap3 | tap5 | pinch | spread | tilt | rotate | blow | puzzle | meter | finish
        */
        const ST = [

                trick: '👆 TAP anywhere on screen to begin!'
            },

            {
                icon: '🎓', head: '2019 – College Days 📚', nav: 'shake',

                txt: 'Same college same time... but nee Bharath-ah notice pannala! 😂\nNan corner-la invisible mathiri irunthen... waiting!',
                trick: '📳 SHAKE your phone to go to next!'
            },

            {
                icon: '😄', head: 'Step 3 – That First Smile!', nav: 'doubletap',
                img: 'https://images.unsplash.com/photo-1516589174184-e67823dbf48e?auto=format&fit=crop&q=80&w=500',
                txt: 'Un smile pathu dhaan nan flat aanen! 🥹\nEven now – same feeling every single time!',

            {

            {

            },

            {
                icon: '💘', head: 'Step 6 – I Said It! 💘', nav: 'swipeleft',
                txt: 'Heart 200 bpm-la odichuchu! 🙈\nFinally sonnein – "I love you Thangam!"\nAnd you just... SMILED! 🥹',

            },

            {

                trick: '👆 TAP 3 TIMES quickly to celebrate!'
            },

            {
                icon: '🥊', head: 'Step 8 – The Fight Formula 😂', nav: 'pinch',
                txt: 'Nee: 💢 "Fight mode ON!"\nNaan: 😇 "Sorry Thangam..."\nNee: 😤 "NOT ENOUGH!"\n(Infinite loop 🔁 love you still! 😂)',
                trick: '🤏 PINCH fingers IN on screen!'
            },

            {
                icon: '🎵', head: 'Step 9 – Our Song 🎶', nav: 'blow', music: true,
                txt: 'Neelothi – nan unakkaaga paadinen! 💙\nTap 🎵 to play the song first!\nThen BLOW into the phone mic!',
                trick: '💨 TAP 🎵 to play then BLOW into mic!'
            },

            {
                icon: '✈️', head: 'Step 10 – Animun Dreams ✈️', nav: 'spread',
                txt: 'Enga pogalam Thangam? 🗺️\nMaldives? Switzerland? Paris?\nEnna aanalum un kooda = Paradise! 💙',
                trick: '🤲 SPREAD fingers OUT on screen!'
            },

            {
                icon: '🏡', head: 'Step 11 – My Home 🏡', nav: 'tilt',
                txt: 'Nee dhaan en home, en peace, en world! 🏡\nEvery day is better because of YOU!\nMy calm in every storm. 💙',
                trick: '📱 TILT phone to the LEFT side!'
            },

            {
                icon: '🧩', head: 'Step 12 – Memory Puzzle', nav: 'puzzle',
                txt: 'Assemble namma photo! 🧩\nTap each piece to place it perfectly!',
                trick: 'Tap all 9 pieces to build the picture!'
            },

            {
                icon: '✨', head: 'Step 13 – You Are...', nav: 'tap5',
                txt: 'Walking angel! 👼\nMy sunshine on dark days ☀️\nMy favourite human forever! 💙',
                trick: '👆 TAP 5 TIMES quickly to continue!'
            },

            {
                icon: '📊', head: 'Step 14 – Love Meter 💙', nav: 'meter',
                txt: 'How much do you love me?\nSlide it ALL the way to 100%!\n(I already know the answer 😏)',
                trick: 'Slide to 100% to unlock next step!'
            },

            {
                icon: '💙', title: 'Happy Birthday Ammu! 🎂', nav: 'finish',
                txt: 'Forever yours, Bharath 💍\nYou are my whole world!\nSeekiram vaa Thangam! 📞😍',
                trick: '🎁 Your final gift is below! 💙'
            }
        ];

        let cur = 0, pzS = 0, pzPcs = [];
        const swEl = document.getElementById('sw'), pbi = document.getElementById('pbi'), sbadge = document.getElementById('sbadge');

        /* ═══ BUILD STEPS ═══ */
        function startJourney() {
            ST.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = 'stp' + (i === 0 ? ' active' : ''); d.id = 'stp' + i;
                let body = '';

                if (s.music) {
                    body = `<div class="inner">
        <span class="vinyl" id="vinyl" onclick="playS()">🎵</span>
        <div class="s-head">${s.head}</div>
        <div class="s-txt" style="white-space:pre-line">${s.txt}</div>
        <div class="plbl" id="plbl">👆 Tap 🎵 to play song first!</div>
      </div>`;
                } else if (s.nav === 'puzzle') {
                    body = `<div class="inner">
        <div class="s-head">${s.head}</div>
        <div class="s-txt">${s.txt}</div>
        <div class="pz-wrap" id="pzWrap" onclick="tapPz()"></div>
        <div class="pz-stat" id="pzStat">👆 Tap the puzzle!</div>
        <button class="pz-btn" id="pzBtn" onclick="goNext()">Continue ❤️</button>
      </div>`;
                } else if (s.nav === 'meter') {
                    body = `<div class="inner">
        <span class="s-icon">${s.icon}</span>
        <div class="s-head">${s.head}</div>
        <div class="s-txt">${s.txt}</div>
        <div class="sw-wrap"><input type="range" min="1" max="100" value="1" class="love-sl" id="loveSl" oninput="updMeter(this.value)"></div>
        <div class="m-lbl" id="mLbl">Slide it! ❤️</div>
      </div>`;
                } else if (s.nav === 'finish') {
                    body = `<div class="inner">
        <span class="s-icon">${s.icon}</span>
        <div class="s-title">${s.title || ''}</div>
        <div class="s-txt" style="white-space:pre-line">${s.txt}</div>
        <a href="https://call.whatsapp.com/video/hdzUkrheCL54ZESXslks2t" class="call-btn" target="_blank">📞 Video Call Now!</a>
      </div>`;
                } else {
                    body = `<div class="inner">
        <span class="s-icon">${s.icon || '💙'}</span>
        ${s.title ? `<div class="s-title">${s.title}</div>` : ''}
        ${s.head ? `<div class="s-head">${s.head}</div>` : ''}
        ${s.img ? `<div class="mf"><img src="${s.img}" loading="lazy" alt=""></div>` : ''}
        ${s.txt ? `<div class="s-txt" style="white-space:pre-line">${s.txt}</div>` : ''}
      </div>`;
                }

                // Tap counter ring
                if (s.nav === 'tap3' || s.nav === 'tap5') {
                    body += `<div class="tap-ring"><div class="tap-count" id="tc${i}">0</div></div>`;
                }

                d.innerHTML = body + `<div class="trick-bar" id="tb${i}">👉 ${s.trick}</div>`;
                swEl.appendChild(d);
            });

            setupAllGestures();
            startPetals();
        }

        /* ═══ GO NEXT ═══ */
        function goNext() {
            if (cur >= ST.length - 1) return;
            const old = document.getElementById('stp' + cur);
            old.classList.remove('active'); old.classList.add('exit');
            cur++;
            setTimeout(() => {
                const nxt = document.getElementById('stp' + cur);
                nxt.classList.add('active');
                pbi.style.width = `${((cur + 1) / ST.length) * 100}%`;
                sbadge.textContent = `${cur + 1} / ${ST.length}`;
                if (ST[cur].nav === 'puzzle' && pzPcs.length === 0) setTimeout(buildPuzzle, 300);
                if (cur === ST.length - 1) doConfetti();
            }, 520);
        }

        /* ═══ GESTURES ═══ */
        function setupAllGestures() {
            const area = swEl;

            /* TAP (single) */
            area.addEventListener('click', () => { if (ST[cur].nav === 'tap') goNext(); });

            /* DOUBLE TAP */
            let lastTap = 0;
            area.addEventListener('touchstart', e => {
                const now = Date.now();
                if (now - lastTap < 320 && ST[cur].nav === 'doubletap') goNext();
                lastTap = now;
            }, { passive: true });

            /* LONG PRESS */
            let lpT = null;
            area.addEventListener('touchstart', () => { if (ST[cur].nav === 'longpress') lpT = setTimeout(goNext, 1800); }, { passive: true });
            area.addEventListener('touchend', () => clearTimeout(lpT));
            area.addEventListener('touchmove', () => clearTimeout(lpT));

            /* SWIPE UP / LEFT */
            let sx = 0, sy = 0;
            area.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, { passive: true });
            area.addEventListener('touchend', e => {
                const dx = sx - e.changedTouches[0].clientX, dy = sy - e.changedTouches[0].clientY;
                const nav = ST[cur].nav;
                if (nav === 'swipeup' && dy > 80 && Math.abs(dx) < 60) goNext();
                if (nav === 'swipeleft' && dx > 80 && Math.abs(dy) < 60) goNext();
            });

            /* TAP 3 & TAP 5 */
            let tapCounts = Array(15).fill(0), tapTimer = null;
            area.addEventListener('touchstart', e => {
                const nav = ST[cur].nav;
                if (nav !== 'tap3' && nav !== 'tap5') return;
                const need = nav === 'tap3' ? 3 : 5;
                tapCounts[cur]++;
                const tc = document.getElementById('tc' + cur);
                if (tc) { tc.textContent = tapCounts[cur]; tc.classList.add('show'); setTimeout(() => tc.classList.remove('show'), 300); }
                clearTimeout(tapTimer);
                if (tapCounts[cur] >= need) { tapCounts[cur] = 0; goNext(); }
                else tapTimer = setTimeout(() => tapCounts[cur] = 0, 2000);
            }, { passive: true });

            /* PINCH & SPREAD */
            let pinchDist = null;
            area.addEventListener('touchstart', e => {
                if (e.touches.length === 2 && (ST[cur].nav === 'pinch' || ST[cur].nav === 'spread')) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
                    pinchDist = Math.hypot(dx, dy);
                }
            }, { passive: true });
            area.addEventListener('touchend', e => {
                if (pinchDist === null) return;
                if (e.changedTouches.length >= 1 && document.ontouchmove !== undefined) { } // ignore single touch-end
                // measure on touchmove
                pinchDist = null;
            }, { passive: true });
            area.addEventListener('touchmove', e => {
                if (e.touches.length === 2 && pinchDist !== null) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
                    const newDist = Math.hypot(dx, dy);
                    const nav = ST[cur].nav;
                    if (nav === 'pinch' && newDist < pinchDist - 50) { pinchDist = null; goNext(); }
                    if (nav === 'spread' && newDist > pinchDist + 50) { pinchDist = null; goNext(); }
                }
            }, { passive: true });

            /* SHAKE */
            let lx, ly, lz, lastShake = 0;
            function listenShake() {
                window.addEventListener('devicemotion', e => {
                    const a = e.accelerationIncludingGravity; if (!a) return;
                    if (lx === undefined) { lx = a.x; ly = a.y; lz = a.z; return; }
                    const d = Math.abs(a.x - lx) + Math.abs(a.y - ly) + Math.abs(a.z - lz);
                    lx = a.x; ly = a.y; lz = a.z;
                    if (d > 26 && Date.now() - lastShake > 1100) { lastShake = Date.now(); if (ST[cur].nav === 'shake') goNext(); }
                });
            }
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                document.addEventListener('touchstart', async function rp() {
                    document.removeEventListener('touchstart', rp);
                    try { const p = await DeviceMotionEvent.requestPermission(); if (p === 'granted') listenShake(); } catch (e) { }
                }, { once: true });
            } else listenShake();

            /* ROTATE 90° */
            window.addEventListener('orientationchange', () => { if (ST[cur].nav === 'rotate') setTimeout(goNext, 400); });

            /* TILT LEFT using DeviceOrientation */
            let tiltLocked = false;
            function listenTilt() {
                window.addEventListener('deviceorientation', e => {
                    if (ST[cur].nav !== 'tilt' || tiltLocked) return;
                    if (e.gamma !== null && e.gamma < -35) { tiltLocked = true; setTimeout(() => tiltLocked = false, 1500); goNext(); }
                });
            }
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                document.addEventListener('touchstart', async function ro() {
                    document.removeEventListener('touchstart', ro);
                    try { const p = await DeviceOrientationEvent.requestPermission(); if (p === 'granted') listenTilt(); } catch (e) { }
                }, { once: true });
            } else listenTilt();

            /* BLOW (MIC AUDIO) */
            function setupMic() {
                navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(stream => {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const src = ctx.createMediaStreamSource(stream);
                    const analyser = ctx.createAnalyser(); analyser.fftSize = 256;
                    src.connect(analyser);
                    const data = new Uint8Array(analyser.frequencyBinCount);
                    let blowCD = 0;
                    setInterval(() => {
                        analyser.getByteTimeDomainData(data);
                        let peak = 0; data.forEach(v => { const d = Math.abs(v - 128); if (d > peak) peak = d; });
                        if (ST[cur].nav === 'blow' && peak > 45 && Date.now() - blowCD > 1200) { blowCD = Date.now(); goNext(); }
                    }, 100);
                }).catch(() => {/* mic denied – user can use tap3 as fallback */ });
            }
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) setupMic();

            /* EMERGENCY: 7-tap to force advance (in case gesture doesn't work) */
            let emergTaps = 0, emergT;
            area.addEventListener('touchstart', () => {
                emergTaps++; clearTimeout(emergT);
                if (emergTaps >= 7) { emergTaps = 0; goNext(); }
                emergT = setTimeout(() => emergTaps = 0, 1500);
            }, { passive: true });
        }

        /* ═══ MUSIC ═══ */
        function playS() {
            document.getElementById('bgm').play().then(() => {
                document.getElementById('plbl').textContent = '🎶 Now Blow into the phone mic to continue!';
                document.getElementById('plbl').style.color = '#60a5fa';
                document.getElementById('vinyl').style.animationDuration = '1.5s';
            }).catch(() => {
                document.getElementById('plbl').textContent = '⚠️ Tap 7 times anywhere to continue!';
            });
        }

        /* ═══ PUZZLE ═══ */
        const PIC = 'https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&q=80&w=600';
        const SCR = [{ tx: '-200%', ty: '-200%', r: '-22deg' }, { tx: '0', ty: '-280%', r: '8deg' }, { tx: '200%', ty: '-200%', r: '20deg' }, { tx: '-280%', ty: '0', r: '16deg' }, { tx: '0', ty: '0', r: '0' }, { tx: '280%', ty: '0', r: '-16deg' }, { tx: '-200%', ty: '200%', r: '20deg' }, { tx: '0', ty: '280%', r: '-8deg' }, { tx: '200%', ty: '200%', r: '-20deg' }];
        function buildPuzzle() {
            const w = document.getElementById('pzWrap'); if (!w || pzPcs.length > 0) return;
            const sz = Math.floor(Math.min(255, window.innerWidth * .68) / 3) * 3, ps = sz / 3;
            w.style.width = sz + 'px'; w.style.height = sz + 'px';
            for (let i = 0; i < 9; i++) {
                const r = Math.floor(i / 3), c = i % 3, p = document.createElement('div'); p.className = 'pz-piece';
                p.style.cssText = `width:${ps}px;height:${ps}px;left:${c * ps}px;top:${r * ps}px;background-image:url('${PIC}');background-size:${sz}px ${sz}px;background-position:${-c * ps}px ${-r * ps}px;transform:translate(${SCR[i].tx},${SCR[i].ty}) rotate(${SCR[i].r});opacity:0;`;
                w.appendChild(p); pzPcs.push(p);
            }
        }
        function tapPz() {
            if (pzPcs.length === 0) { buildPuzzle(); return; }
            if (pzS >= 9) return;
            const p = pzPcs[pzS]; p.style.opacity = '1'; p.style.transform = 'none'; pzS++;
            document.getElementById('pzStat').textContent = pzS < 9 ? `✨ ${pzS}/9 placed!` : '🎉 Perfect! Tap Continue!';
            if (pzS === 9) document.getElementById('pzBtn').style.display = 'block';
        }

        /* ═══ METER ═══ */
        function updMeter(v) {
            const l = document.getElementById('mLbl');
            const n = parseInt(v);
            if (n < 30) l.textContent = `${n}%... really Thangam? 😏`;
            else if (n < 70) l.textContent = `${n}% – konjam konjam! 🤭`;
            else if (n < 100) l.textContent = `${n}%... almost! 💙`;
            else { l.textContent = '💯 100%!! I knew it! ❤️🎉'; l.style.color = '#4ade80'; setTimeout(goNext, 800); }
        }

        /* ═══ CONFETTI ═══ */
        function doConfetti() {
            const end = Date.now() + 4000;
            (function fire() {
                confetti({ particleCount: 8, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#3b82f6', '#60a5fa', '#818cf8'] });
                confetti({ particleCount: 8, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#3b82f6', '#60a5fa', '#818cf8'] });
                if (Date.now() < end) requestAnimationFrame(fire);
            })();
        }

        /* ═══ PETALS ═══ */
        function startPetals() {
            setInterval(() => {
                const p = document.createElement('div'); p.className = 'pt';
                p.innerText = ['💙', '✨', '⭐', '❄️', '💫'][Math.floor(Math.random() * 5)];
                p.style.left = Math.random() * 100 + 'vw'; p.style.fontSize = (10 + Math.random() * 14) + 'px';
                p.style.animationDuration = (5 + Math.random() * 5) + 's';
                document.body.appendChild(p); setTimeout(() => p.remove(), 8000);
            }, 900);
        }
    </script>
</body>
