<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Happy Birthday Jenifar 💙</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        @keyframes hburst {
            0% {
                opacity: 1;
                transform: scale(1) translate(0, 0)
            }

            100% {
                opacity: 0;
                transform: scale(1.8) translate(var(--dx, 20px), var(--dy, -60px))
            }
        }

        /* CINEMATIC OVERLAY */
        #stepOverlay {
            position: fixed;
            inset: 0;
            background: #020c22;
            z-index: 500;
            pointer-events: none;
            opacity: 0;
        }

        /* RESUME BANNER */
        #resumeBanner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 64, 175, .94);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(96, 165, 250, .3);
            border-radius: 50px;
            padding: 11px 20px;
            z-index: 9999;
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: .8rem;
            color: #fff;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
            opacity: 0;
            pointer-events: none;
        }

        #resumeBanner button {
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            font-weight: 700;
            cursor: pointer;
            font-size: .78rem;
        }

        .rb-yes {
            background: #3b82f6;
            color: #fff;
        }

        .rb-no {
            background: none;
            color: rgba(255, 255, 255, .45);
        }

        /* COUNTDOWN */
        #countdownOverlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(30, 58, 138, .96), rgba(2, 12, 34, .99));
            z-index: 9998;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #cdNum {
            font-size: clamp(6rem, 20vw, 9rem);
            font-weight: 800;
            color: #60a5fa;
            line-height: 1;
            filter: drop-shadow(0 0 40px rgba(96, 165, 250, .7));
        }

        #cdMsg {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(1.6rem, 6vw, 2.4rem);
            color: rgba(255, 255, 255, .7);
            text-align: center;
            padding: 0 20px;
        }

        /* BUTTON MICRO-INTERACTIONS */
        .mic-btn,
        .call-btn {
            transform-origin: center;
            will-change: transform;
        }

        .mic-btn:hover {
            transform: scale(1.05);
        }

        .mic-btn:active {
            transform: scale(0.93);
        }

        .call-btn:hover {
            transform: scale(1.05) translateY(-2px);
        }

        .call-btn:active {
            transform: scale(0.95);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020c22;
            overflow: hidden;
            color: #fff;
            user-select: none;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            filter: blur(100px);
            opacity: .7;
            pointer-events: none;
        }

        .b {
            position: absolute;
            border-radius: 50%;
        }

        .b1 {
            width: 600px;
            height: 600px;
            top: -150px;
            left: -150px;
            background: radial-gradient(circle, #1e40af, transparent 70%);
            animation: m1 20s infinite alternate;
        }

        .b2 {
            width: 550px;
            height: 550px;
            bottom: -130px;
            right: -130px;
            background: radial-gradient(circle, #0284c7, transparent 70%);
            animation: m2 24s infinite alternate;
        }

        .b3 {
            width: 450px;
            height: 450px;
            top: 35%;
            left: 20%;
            background: radial-gradient(circle, #4f46e5, transparent 70%);
            animation: m3 16s infinite alternate;
        }

        @keyframes m1 {
            to {
                transform: translate(200px, 250px)scale(1.2)
            }
        }

        @keyframes m2 {
            to {
                transform: translate(-200px, -200px)scale(.8)
            }
        }

        @keyframes m3 {
            from {
                transform: translate(-40%, -40%)
            }

            to {
                transform: translate(100px, -220px)scale(1.25)
            }
        }

        .pt {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            animation: ptr 7s linear infinite;
        }

        @keyframes ptr {
            0% {
                transform: translateY(106vh)rotate(0);
                opacity: 0
            }

            12% {
                opacity: .5
            }

            88% {
                opacity: .4
            }

            100% {
                transform: translateY(-12vh)rotate(380deg);
                opacity: 0
            }
        }

        /* LOGIN */
        #login {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lc {
            width: 100%;
            max-width: 360px;
            background: rgba(2, 8, 30, .88);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 40px;
            border: 1px solid rgba(96, 165, 250, .22);
            box-shadow: 0 35px 80px rgba(0, 0, 0, .65);
            padding: 44px 26px 34px;
            text-align: center;
            animation: popIn .75s cubic-bezier(.34, 1.56, .64, 1);
        }

        @keyframes popIn {
            from {
                transform: scale(.78);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        #login.out {
            animation: lout .5s ease forwards;
            pointer-events: none;
        }

        @keyframes lout {
            to {
                opacity: 0;
                transform: scale(1.08)
            }
        }

        .hrt {
            font-size: 3.8rem;
            display: block;
            margin-bottom: 14px;
            animation: hp 1.6s ease-in-out infinite;
        }

        @keyframes hp {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 10px #3b82f6)
            }

            50% {
                transform: scale(1.14);
                filter: drop-shadow(0 0 24px #60a5fa)
            }
        }

        .lt {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2rem, 8vw, 2.8rem);
            color: #60a5fa;
            margin-bottom: 6px;
        }

        .ls {
            font-size: .82rem;
            color: rgba(255, 255, 255, .38);
            margin-bottom: 18px;
        }

        .clue {
            background: rgba(59, 130, 246, .07);
            border: 1px solid rgba(59, 130, 246, .18);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 20px;
        }

        .ct {
            font-size: .82rem;
            color: rgba(255, 255, 255, .6);
            line-height: 1.6;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 13px;
            margin-bottom: 14px;
        }

        .dot {
            width: 17px;
            height: 17px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .07);
            border: 2px solid rgba(59, 130, 246, .22);
            transition: all .22s;
        }

        .dot.on {
            background: #3b82f6;
            border-color: #60a5fa;
            box-shadow: 0 0 14px #3b82f6;
            transform: scale(1.22);
        }

        #lerr {
            font-size: .82rem;
            font-weight: 700;
            min-height: 22px;
            margin-bottom: 10px;
            color: #f87171;
        }

        @keyframes shk {

            0%,
            100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-8px)
            }

            75% {
                transform: translateX(8px)
            }
        }

        .pgrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 11px;
            margin-bottom: 10px;
        }

        .pb {
            background: rgba(59, 130, 246, .07);
            border: 1px solid rgba(59, 130, 246, .18);
            border-radius: 18px;
            padding: 15px 0;
            font-size: 1.28rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all .15s;
        }

        .pb:active {
            transform: scale(.88);
            background: rgba(59, 130, 246, .3);
        }

        .pb.del {
            color: rgba(255, 255, 255, .38);
            font-size: 1rem;
        }

        .pb.z {
            grid-column: 2;
        }

        /* CARD */
        #card {
            width: 94%;
            max-width: 440px;
            height: 90dvh;
            max-height: 830px;
            border-radius: 42px;
            background: rgba(2, 10, 35, .6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 35px 80px rgba(0, 0, 0, .6), 0 0 0 1px rgba(96, 165, 250, .12) inset;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(32px);
            transition: all .85s cubic-bezier(.34, 1.56, .64, 1);
        }

        #card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .prog {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            z-index: 20;
            background: rgba(255, 255, 255, .05);
        }

        #pbi {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1d4ed8, #38bdf8, #818cf8);
            transition: width .7s ease;
        }

        .sbadge {
            position: absolute;
            top: 14px;
            right: 16px;
            z-index: 20;
            background: rgba(59, 130, 246, .14);
            border: 1px solid rgba(59, 130, 246, .28);
            border-radius: 50px;
            padding: 5px 14px;
            font-size: .7rem;
            font-weight: 700;
            color: #60a5fa;
        }

        .sw {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .stp {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform: translateX(105%);
            transition: transform .55s cubic-bezier(.4, 1, .2, 1), opacity .35s ease;
            overflow-y: auto;
            scrollbar-width: none;
            z-index: 1;
        }

        .stp::-webkit-scrollbar {
            display: none;
        }

        .stp.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
            z-index: 2;
            /* Active step always on top */
        }

        .stp.exit {
            opacity: 0;
            transform: translateX(-105%);
            z-index: 1;
        }

        /* Back-navigation: previous step enters from left */
        .stp.from-left {
            opacity: 0 !important;
            transform: translateX(-105%) !important;
            pointer-events: none !important;
            transition: none !important;
            /* Snap instantly, no animation */
        }

        /* Snap to off-screen right instantly (no animation), then animate in */
        .stp.snap-right {
            opacity: 0 !important;
            transform: translateX(105%) !important;
            pointer-events: none !important;
            transition: none !important;
            /* Snap instantly */
        }

        /* STEP CONTENT */
        .inner {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 22px 16px;
            text-align: center;
            gap: 10px;
        }

        .s-icon {
            font-size: clamp(3rem, 11vw, 4.5rem);
            animation: flt 3.2s ease-in-out infinite;
            filter: drop-shadow(0 0 16px rgba(96, 165, 250, .35));
        }

        @keyframes flt {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-16px)
            }
        }

        .s-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.2rem, 9vw, 3rem);
            color: #60a5fa;
            text-shadow: 0 0 30px rgba(96, 165, 250, .3);
        }

        .s-head {
            font-size: 1.05rem;
            font-weight: 700;
            color: rgba(255, 255, 255, .88);
            line-height: 1.45;
        }

        .s-txt {
            font-size: .88rem;
            color: rgba(255, 255, 255, .6);
            line-height: 1.75;
            white-space: pre-line;
            max-width: 340px;
        }

        .mf {
            width: 90%;
            height: 155px;
            border-radius: 22px;
            overflow: hidden;
            flex-shrink: 0;
            transform: rotate(-1.5deg);
            box-shadow: 0 14px 40px rgba(0, 0, 0, .35);
            border: 2px solid rgba(255, 255, 255, .1);
        }

        .mf img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .trick-bar {
            flex-shrink: 0;
            padding: 13px 18px;
            background: rgba(30, 64, 175, .12);
            border-top: 1px solid rgba(59, 130, 246, .18);
            font-size: .75rem;
            font-weight: 700;
            color: #7dd3fc;
            letter-spacing: .6px;
            text-align: center;
        }

        /* LIVE AGE COUNTER */
        .age-live {
            display: flex;
            gap: 7px;
            justify-content: center;
            flex-wrap: nowrap;
            margin: 10px 0;
        }

        .ac-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(59, 130, 246, .1);
            border: 1px solid rgba(59, 130, 246, .22);
            border-radius: 14px;
            padding: 10px 8px;
            min-width: clamp(46px, 13vw, 62px);
        }

        .ac-n {
            font-size: clamp(1.1rem, 4.5vw, 1.6rem);
            font-weight: 800;
            color: #60a5fa;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
        }

        .ac-u {
            font-size: .6rem;
            color: rgba(255, 255, 255, .37);
            text-transform: uppercase;
            letter-spacing: .4px;
            margin-top: 2px;
        }

        /* MUSIC */
        .vinyl {
            font-size: 6rem;
            display: block;
            cursor: pointer;
            animation: spin 4s linear infinite;
            filter: drop-shadow(0 0 22px rgba(96, 165, 250, .55));
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .plbl {
            font-size: .85rem;
            color: rgba(255, 255, 255, .45);
            margin-top: 6px;
        }

        /* TAP COUNT */
        .tap-feed {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 50;
        }

        .tc-num {
            font-size: 5rem;
            font-weight: 800;
            color: rgba(96, 165, 250, .5);
            opacity: 0;
            transform: scale(.5);
            transition: all .18s;
        }

        .tc-num.show {
            opacity: 1;
            transform: scale(1);
        }

        /* PUZZLE */
        .pz-wrap {
            position: relative;
            border-radius: 22px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(59, 130, 246, .25);
            flex-shrink: 0;
        }

        .pz-piece {
            position: absolute;
            background-repeat: no-repeat;
            transition: all .58s cubic-bezier(.34, 1.56, .64, 1);
        }

        .pz-stat {
            font-size: .82rem;
            color: #60a5fa;
            font-weight: 700;
            margin-top: 12px;
            min-height: 22px;
        }

        .pz-btn {
            display: none;
            margin-top: 14px;
            background: rgba(59, 130, 246, .18);
            border: 1.5px solid rgba(59, 130, 246, .4);
            border-radius: 50px;
            padding: 13px 30px;
            font-weight: 700;
            font-size: .88rem;
            color: #fff;
            cursor: pointer;
        }

        /* METER */
        .sw-wrap {
            width: 92%;
            margin: 6px 0;
        }

        .love-sl {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .08);
            outline: none;
        }

        .love-sl::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: #3b82f6;
            border-radius: 50%;
            border: 4px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 14px rgba(59, 130, 246, .6);
        }

        .m-lbl {
            font-size: .92rem;
            font-weight: 700;
            color: #60a5fa;
            min-height: 24px;
        }

        /* TYPE STEP */
        .yr-input {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            background: rgba(59, 130, 246, .08);
            border: 2px solid rgba(59, 130, 246, .3);
            border-radius: 20px;
            padding: 16px;
            width: 78%;
            max-width: 220px;
            color: #60a5fa;
            outline: none;
            letter-spacing: 6px;
        }

        .yr-input:focus {
            border-color: #60a5fa;
            background: rgba(59, 130, 246, .12);
        }

        /* DRAG STEP */
        .drag-zone {
            width: 90%;
            height: 150px;
            position: relative;
            background: rgba(59, 130, 246, .05);
            border: 1px dashed rgba(59, 130, 246, .2);
            border-radius: 22px;
            flex-shrink: 0;
        }

        .drag-heart {
            position: absolute;
            font-size: 3.5rem;
            cursor: grab;
            z-index: 10;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            transition: font-size .3s;
            touch-action: none;
        }

        .drag-target {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            height: 70px;
            border: 2px dashed rgba(59, 130, 246, .5);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            gap: 2px;
        }

        .drag-lbl {
            font-size: .65rem;
            color: rgba(255, 255, 255, .4);
        }

        /* CONFETTI BTN */
        .conf-btn {
            background: rgba(59, 130, 246, .14);
            border: 1.5px solid rgba(59, 130, 246, .35);
            border-radius: 50px;
            padding: 16px 36px;
            font-weight: 700;
            font-size: .92rem;
            color: #fff;
            cursor: pointer;
            letter-spacing: .5px;
        }

        .conf-btn:active {
            background: rgba(59, 130, 246, .3);
        }

        /* FINISH */
        .call-btn {
            background: linear-gradient(135deg, #1d4ed8, #6366f1);
            color: #fff;
            padding: 17px 40px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            margin-top: 14px;
            box-shadow: 0 12px 32px rgba(59, 130, 246, .55);
            animation: cpulse 2.2s infinite;
            letter-spacing: .5px;
        }

        @keyframes cpulse {

            0%,
            100% {
                box-shadow: 0 12px 32px rgba(99, 102, 241, .55), 0 0 0 0 rgba(99, 102, 241, .3)
            }

            50% {
                box-shadow: 0 12px 32px rgba(99, 102, 241, .55), 0 0 0 18px rgba(99, 102, 241, 0)
            }
        }

        /* ── FINISH SCREEN ── */
        .fin-wrap {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 50px 18px 14px;
            gap: 0;
            position: relative;
            overflow: hidden;
        }

        .fin-stars {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .fstar {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #fff, transparent 70%);
            animation: fstarAnim linear infinite;
            opacity: 0;
        }

        @keyframes fstarAnim {
            0% {
                opacity: 0;
                transform: scale(0)
            }

            20% {
                opacity: 1;
                transform: scale(1)
            }

            80% {
                opacity: .7
            }

            100% {
                opacity: 0;
                transform: scale(1.5) translateY(-30px)
            }
        }

        .fin-crown {
            font-size: clamp(3rem, 13vw, 5rem);
            animation: crownBounce 1.4s ease-in-out infinite;
            filter: drop-shadow(0 0 22px gold);
        }

        @keyframes crownBounce {

            0%,
            100% {
                transform: translateY(0) rotate(-5deg)
            }

            50% {
                transform: translateY(-14px) rotate(5deg)
            }
        }

        .fin-name {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.6rem, 11vw, 4rem);
            background: linear-gradient(135deg, #facc15, #f97316, #ec4899, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 12px rgba(250, 204, 21, .4));
            line-height: 1.1;
            margin: 4px 0;
            animation: nameShimmer 3s linear infinite;
            background-size: 300% 300%;
        }

        @keyframes nameShimmer {
            0% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }

            100% {
                background-position: 0% 50%
            }
        }

        .fin-hb {
            font-size: clamp(.78rem, 3vw, .95rem);
            font-weight: 700;
            color: rgba(255, 255, 255, .55);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .fin-letter {
            width: 92%;
            max-width: 360px;

            }

            }

        .fin-letter::before {

        }

        @keyframes hrtPop {

            100% {
                transform: scale(1)

                transform: scale(1.35) translateY(-4px)
            }

        .fin-age-wrap {

        /* MIC STEP */

            align-items: center;
            gap: 10px;

        .mic-circle {
            width: 90px;

            justify-content: center;
            font-size: 2.6rem;
            transition: all .3s;
            flex-shrink: 0;

        .mic-circle.listening {
            background: rgba(59, 130, 246, .28);
            border-color: #60a5fa;
            animation: micPulse 1.1s ease-in-out infinite;
        }

        .mic-circle.success-ring {
            background: rgba(74, 222, 128, .2);
            border-color: #4ade80;
            animation: successRing .6s ease-out;
        }

        @keyframes micPulse {

            0%,
            100% {
                box-shadow: 0 0 0 6px rgba(59, 130, 246, .22), 0 0 0 14px rgba(59, 130, 246, .08)
            }

            50% {
                box-shadow: 0 0 0 14px rgba(59, 130, 246, .18), 0 0 0 28px rgba(59, 130, 246, .04)
            }
        }

        @keyframes successRing {
            0% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, .8)
            }

            100% {
                box-shadow: 0 0 0 40px rgba(74, 222, 128, 0)
            }
        }

        .mic-canvas {
            width: 92%;
            max-width: 300px;
            height: 50px;
            border-radius: 14px;
            background: rgba(59, 130, 246, .06);
            border: 1px solid rgba(59, 130, 246, .15);
            display: block;
        }

        .mic-status {
            font-size: .85rem;
            color: rgba(255, 255, 255, .55);
            min-height: 22px;
            text-align: center;
            font-weight: 600;
        }

        .mic-status.active {
            color: #60a5fa;
        }

        .mic-status.success {
            color: #4ade80;
            font-size: 1rem;
        }

        .mic-heard {
            font-size: .75rem;
            color: rgba(255, 255, 255, .32);
            min-height: 18px;
            font-style: italic;
            text-align: center;
            max-width: 260px;
        }

        .mic-btn {
            background: linear-gradient(135deg, rgba(59, 130, 246, .25), rgba(99, 102, 241, .2));
            border: 1.5px solid rgba(99, 102, 241, .5);
            border-radius: 50px;
            padding: 13px 32px;
            font-weight: 700;
            font-size: .88rem;
            color: #fff;
            cursor: pointer;
            letter-spacing: .5px;

        .mic-btn:active {

        }

        .mic-btn.recording {
            background: linear-gradient(135deg, rgba(239, 68, 68, .25), rgba(220, 38, 38, .2));
            border-color: rgba(239, 68, 68, .6);
            animation: recPulse 1.1s ease-in-out infinite;
        }

        @keyframes recPulse {

            0%,
            100% {
                box-shadow: 0 4px 16px rgba(239, 68, 68, .3)
            }

            50% {
                box-shadow: 0 4px 24px rgba(239, 68, 68, .55)
            }
        }

        /* HEART RAIN */
        .heart-rain-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .rain-heart {
            position: absolute;
            top: -60px;
            animation: rainFall linear forwards;
            opacity: 0;
        }

        @keyframes rainFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1
            }

            80% {
                opacity: .9
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0
            }
        }

        /* HIDDEN BACK BUTTON */
        #backBtn {
            position: absolute;
            top: 0;
            left: 0;
            width: 55px;
            height: 55px;
            z-index: 25;
            cursor: pointer;
            opacity: 0.01;
            -webkit-tap-highlight-color: transparent;

        /* RESPONSIVE */
        @media (max-width: 360px) {
            .inner {
                padding: 44px 14px 12px;
                gap: 7px;
            }

            .s-icon {
                font-size: 2.8rem;
            }

            .s-title {

            .s-head {

            }

                gap: 4px;

                height: 130px;
            }

        @media (min-width: 768px) {
            #card {
                border-radius: 48px;
                max-width: 480px;

    </style>
</head>

<body>
    <div class="bg">
        <div class="b b1"></div>
        <div class="b b2"></div>
        <div class="b b3"></div>
    </div>
    <div id="login">
        <div class="lc">
            <span class="hrt">💙</span>
            <div class="lt">Hi Thangam!</div>
            <div class="ls">Unlock your 15-step Birthday Journey 🎁</div>
            <div class="clue">
                <div class="ct">Enter your secret PIN! 💙<br><span style="font-size:.78rem;opacity:.55;">Hint: Our
                        special date 🗓️</span></div>
            </div>
            <div class="dots">
                <div class="dot" id="d0"></div>
                <div class="dot" id="d1"></div>
                <div class="dot" id="d2"></div>
                <div class="dot" id="d3"></div>
            </div>
            <div id="lerr"></div>
            <div class="pgrid">
                <button class="pb" onclick="pp('1')">1</button><button class="pb" onclick="pp('2')">2</button><button
                    class="pb" onclick="pp('3')">3</button>
                <button class="pb" onclick="pp('4')">4</button><button class="pb" onclick="pp('5')">5</button><button
                    class="pb" onclick="pp('6')">6</button>
                <button class="pb" onclick="pp('7')">7</button><button class="pb" onclick="pp('8')">8</button><button
                    class="pb" onclick="pp('9')">9</button>
                <button class="pb z" onclick="pp('0')">0</button><button class="pb del" onclick="pd()">⌫</button>
            </div>
        </div>
    </div>
    <audio id="bgm" loop>
        <source src="Neelothi Video Song Out Now  Sirai  Vikram Prabhu.mp3" type="audio/mpeg">
    </audio>
    <div id="card">
        <div class="prog">
            <div id="pbi"></div>
        </div>
        <div class="sbadge" id="sbadge">1 / 15</div>
        <!-- Hidden back button – top-left corner secret tap -->
        <div id="backBtn" onclick="goPrev()"></div>
        <div class="sw" id="sw"></div>
    </div>

    <div id="stepOverlay"></div>
    <div id="countdownOverlay">
        <div id="cdNum">3</div>
        <div id="cdMsg">Get ready...</div>
    </div>
    <div id="resumeBanner">
        <span id="resumeMsg">💙 Continue from Step 1?</span>
        <button class="rb-yes" onclick="doResume()">Continue ▶</button>
        <button class="rb-no" onclick="dismissResume()">Start Over</button>
    </div>
    <script>
        /* ── PIN ── */
        const PIN = '1201'; let pv = '';
        function pp(n) { if (pv.length >= 4) return; pv += n; updD(); if (pv.length === 4) chkPin(); }
        function pd() { pv = pv.slice(0, -1); updD(); ler(''); }
        function updD() { for (let i = 0; i < 4; i++)document.getElementById('d' + i).classList.toggle('on', i < pv.length); }
        function ler(m, c) { const e = document.getElementById('lerr'); e.textContent = m; e.style.color = c || '#f87171'; }
        function chkPin() {
            if (pv === PIN) { ler('✅ Welcome Thangam! 💙', '#4ade80'); setTimeout(() => document.getElementById('login').classList.add('out'), 350); setTimeout(() => { document.getElementById('login').style.display = 'none'; document.getElementById('card').classList.add('show'); startJourney(); }, 900); }
            else { ler('Wrong PIN! 😜'); const e = document.getElementById('lerr'); e.style.animation = 'none'; void e.offsetWidth; e.style.animation = 'shk .4s ease'; pv = ''; updD(); }
        }

        /* ── BIRTH & LIVE AGE ── */
        const BIRTH = new Date('2002-03-12T00:00:00+05:30');
        function calcAge() {
            const now = new Date(), diff = now - BIRTH;
            const ts = Math.floor(diff / 1000), s = ts % 60, tm = Math.floor(ts / 60), m = tm % 60, th = Math.floor(tm / 60), h = th % 24;
            let yr = now.getFullYear() - BIRTH.getFullYear();
            const bdy = new Date(now.getFullYear(), BIRTH.getMonth(), BIRTH.getDate());
            if (now < bdy) yr--;
            const lastBd = new Date(now.getFullYear() + (now < bdy ? -1 : 0), BIRTH.getMonth(), BIRTH.getDate());
            const d = Math.floor((now - lastBd) / 86400000);
            return { yr, d, h, m, s };
        }
        function buildAgeHtml(uid) {
            return `<div class="age-live" id="ag${uid}">
    <div class="ac-box"><span class="ac-n yr">?</span><span class="ac-u">Years</span></div>
    <div class="ac-box"><span class="ac-n dy">?</span><span class="ac-u">Days</span></div>
    <div class="ac-box"><span class="ac-n hr">?</span><span class="ac-u">Hours</span></div>
    <div class="ac-box"><span class="ac-n mn">?</span><span class="ac-u">Mins</span></div>
    <div class="ac-box"><span class="ac-n sc">?</span><span class="ac-u">Secs</span></div>
  </div>`;
        }
        function tickAge(uid) {
            const el = document.getElementById('ag' + uid); if (!el) return;
            const { yr, d, h, m, s } = calcAge();
            el.querySelector('.yr').textContent = yr; el.querySelector('.dy').textContent = d;
            el.querySelector('.hr').textContent = h; el.querySelector('.mn').textContent = m;
            el.querySelector('.sc').textContent = s;
        }
        let ageTmr = null;
        function startTicker() { if (ageTmr) return; ageTmr = setInterval(() => { document.querySelectorAll('[id^="ag"]').forEach(el => tickAge(el.id.slice(2))); }, 1000); tickAge('A'); tickAge('B'); }

        /* ── 15 STEPS ── */
        const ST = [
            { nav: 'tap', icon: '💙', title: 'Hi Thangam! 💙', txt: 'Happy Birthday Jenifar! 🎂\n15 steps = 15 years of our beautiful story!\nEvery step has a unique secret trick!', trick: '👆 TAP anywhere to begin!' },
            { nav: 'shake', icon: '🎂', head: 'Born: March 12, 2002 🌟', txt: 'On this day the most precious person came into this world!\nExactly this many years, days, hours & seconds of YOU!', liveAge: 'A', trick: '📳 SHAKE your phone to celebrate!' },
            { nav: 'doubletap', icon: '👀', head: 'College 2019 📖', txt: 'Same college, same time...\nBut you didn\'t even know my name! 😂\nI was always watching from the corner! 🙈', img: 'https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&q=80&w=500', trick: '✌️ DOUBLE TAP to continue!' },
            { nav: 'swipeup', icon: '😄', head: 'That FIRST Smile! 😍', txt: 'The very first time I saw your smile...\nMy heart just stopped! 🥹\nThat one smile changed everything for me!', img: 'https://images.unsplash.com/photo-1516589174184-e67823dbf48e?auto=format&fit=crop&q=80&w=500', trick: '⬆️ SWIPE UP to continue!' },
            { nav: 'longpress', icon: '📱', head: 'August 2021 – First “Hi” 💙', txt: 'My hands were shaking when I typed “Hi...” 😅\nThat one small message changed our whole world!\nThe best “Hi” I ever sent! 💙', trick: '👆 LONG PRESS (2 sec) to unlock!' },
            { nav: 'swipeleft', icon: '💘', head: '“I Love You” Moment 💘', txt: 'My heart was beating so fast! 💓\nFinally I said it – “I love you Thangam!”\nAnd you just smiled... my world was complete! 🥹', trick: '⬅️ SWIPE LEFT to continue!' },
            { nav: 'tap3', icon: '🎉', head: 'Dec 28, 2021 – YES Day! 🎉', txt: 'The most magical moment of my life!\nYou said “YES”!! 🥳\nI will never forget that day. Never. 💙', trick: '👆 TAP 3 TIMES quickly!' },
            { nav: 'pinch', icon: '🎵', head: 'Our Song – Neelothi 🎶', txt: 'This song is only for you Thangam!\nI sang it thinking of you every day! 💙', music: true, trick: '🎵 TAP to PLAY the song! Then PINCH to continue!' },
            { nav: 'iloveyou', icon: '🎤', head: 'Say It Out Loud! 💙', txt: 'I know you feel it too Thangam...\nNow take a deep breath,\nhold your phone close,\nand say the magic words! 🥹', trick: '🎤 Say "I Love You" into the mic!' },
            { nav: 'spread', icon: '✈️', head: 'Our Future Plans ✨', txt: 'Maldives? Switzerland? Paris?\nEvery place is paradise when you are with me! 🌍\nWe will travel everywhere together! ✈️', trick: '🤲 SPREAD fingers OUT on screen!' },
            { nav: 'tilt', icon: '🤩', head: '15 Reasons I Love You ✨', txt: 'Your smile 😄 Your heart 💙 Your laugh 😂\nYour care 🤗 Your strength 💪 Your kindness 🌟\n...and being YOU is reason #15! ❤️', trick: '📱 TILT phone to the LEFT!' },
            { nav: 'rotate', icon: '🥳', head: 'The Fight Formula 😂', txt: 'You: 💢 Fight mode ON!\nMe: 😇 Sorry sorry sorry...\nYou: 😤 Still not enough!\nBut we ALWAYS come back stronger! 💙😂', trick: '↺ ROTATE phone 90° to continue!' },
            { nav: 'twofingertap', icon: '🧩', head: 'Memory Puzzle 🧩', txt: 'Build our special memory!\nTap each piece to place it! 💙', puzzle: true, trick: 'Tap 9 pieces to build the photo!' },
            { nav: 'meter', icon: '📊', head: 'Love Meter 💙', txt: 'Show me how much you love me!\nSlide it ALL the way to 100%!\n(I already know you will! 😏)', trick: 'Slide to 100% to unlock next step!' },
            { nav: 'finish', isFinish: true, trick: '' }
        ];

        let cur = 0, pzS = 0, pzPcs = [];
        const swEl = document.getElementById('sw'), pbi = document.getElementById('pbi'), sbadge = document.getElementById('sbadge');
        const TOTAL = ST.length;

        /* ── ANIMATION CLEANUP REGISTRY ── */
        let activeTimelines = [], activeRAFs = [];
        function registerTL(tl) { activeTimelines.push(tl); }
        function registerRAF(id) { activeRAFs.push(id); }
        function cleanupAnimations() {
            activeTimelines.forEach(t => { try { t.kill(); } catch (e) { } });
            activeRAFs.forEach(id => cancelAnimationFrame(id));
            activeTimelines = []; activeRAFs = [];
        }

        /* ── BUILD DOM ── */
        function startJourney() {
            sbadge.textContent = `1 / ${TOTAL}`;
            ST.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = 'stp' + (i === 0 ? ' active' : ''); d.id = 'stp' + i;
                let body = '';

                if (s.isFinish) {
                    body = buildFinishHtml();
                } else if (s.puzzle) {
                    body = `<div class="inner"><div class="s-head">${s.head}</div><div class="s-txt">${s.txt}</div><div class="pz-wrap" id="pzWrap" onclick="tapPz()"></div><div class="pz-stat" id="pzStat">👆 Tap the puzzle!</div></div>`;
                } else if (s.nav === 'iloveyou') {
                    body = `<div class="inner" style="gap:8px;padding-top:36px">
                        <span class="s-icon">${s.icon}</span>
                        <div class="s-head">${s.head}</div>
                        <div class="s-txt">${s.txt}</div>
                        <div class="mic-wrap">
                            <div class="mic-circle" id="micCircle">🎤</div>
                            <canvas class="mic-canvas" id="micCanvas" width="320" height="52"></canvas>
                            <div class="mic-status" id="micStatus">Tap below &amp; say "I Love You" 💙</div>
                            <div class="mic-heard" id="micHeard"></div>
                            <button class="mic-btn" id="micBtn" onclick="startSpeech()">🎤 Start Listening</button>
                        </div>
                    </div>`;
                } else if (s.nav === 'meter') {
                    body = `<div class="inner"><span class="s-icon">${s.icon}</span><div class="s-head">${s.head}</div><div class="s-txt">${s.txt}</div><div class="sw-wrap"><input type="range" min="1" max="100" value="1" class="love-sl" oninput="updMeter(this.value)"></div><div class="m-lbl" id="mLbl">Slide it! ❤️</div></div>`;
                } else if (s.nav === 'type') {
                    body = `<div class="inner"><span class="s-icon">${s.icon}</span><div class="s-head">${s.head}</div><div class="s-txt">${s.txt}</div><input type="tel" class="yr-input no-adv" id="yrInput" placeholder="????" maxlength="4" oninput="chkYear(this.value)"></div>`;
                } else if (s.nav === 'drag') {
                    body = `<div class="inner"><span class="s-icon">${s.icon}</span><div class="s-head">${s.head}</div><div class="s-txt">${s.txt}</div><div class="drag-zone" id="dragZone"><div class="drag-heart" id="dragHeart">💙</div><div class="drag-target" id="dragTarget"><span>❤️</span><span class="drag-lbl">Drop!</span></div></div></div>`;
                } else {
                    body = `<div class="inner">
        <span class="s-icon">${s.icon}</span>
        ${s.title ? `<div class="s-title">${s.title}</div>` : ''}
        ${s.head ? `<div class="s-head">${s.head}</div>` : ''}
        ${s.img ? `<div class="mf"><img src="${s.img}" loading="lazy" alt=""></div>` : ''}
        ${s.liveAge ? buildAgeHtml(s.liveAge) : ''}
        <div class="s-txt">${s.txt}</div>
        ${s.music ? `<span class="vinyl" id="vinyl${i}" onclick="playS()">🎵</span><div class="plbl" id="plbl${i}">Tap 🎵 to play!</div>` : ''}
      </div>`;
                }

                if (s.nav === 'tap3' || s.nav === 'tap5' || s.nav === 'tap7')
                    body += `<div class="tap-feed"><div class="tc-num" id="tc${i}">0</div></div>`;

                d.innerHTML = body + (s.trick ? `<div class="trick-bar">👉 ${s.trick}</div>` : '');
                swEl.appendChild(d);
            });

            setupGestures();
            startTicker();
            startPetals();
            /* Animate step 0 entrance */
            setTimeout(() => animateStepIn(document.getElementById('stp0')), 150);
        }

        /* ── NAVIGATION LOCK – prevents overlap during transitions ── */
        let navBusy = false;
        function lockNav() { navBusy = true; setTimeout(() => navBusy = false, 680); }

        /* ── localStorage step save ── */
        function saveStep(i) { try { localStorage.setItem('bj_step', i); } catch (e) { } }
        function loadStep() { try { return Math.min(parseInt(localStorage.getItem('bj_step') || '0'), TOTAL - 1); } catch (e) { return 0; } }
        function savePz() { try { localStorage.setItem('bj_pz', '1'); } catch (e) { } }

        /* ── STEP ENTER ANIMATIONS (GSAP) ── */
        function animateStepIn(stepEl) {
            const kids = stepEl.querySelectorAll('.inner > *');
            if (!kids.length) return;
            const tl = gsap.timeline();
            tl.from(kids, { y: 28, opacity: 0, stagger: 0.08, duration: 0.48, ease: 'power2.out' });
            registerTL(tl);
            /* Ken Burns on memory photos */
            const img = stepEl.querySelector('.mf img');
            if (img) {
                const kb = gsap.to(img, { scale: 1.08, x: '2%', duration: 8, ease: 'none', yoyo: true, repeat: -1 });
                registerTL(kb);
            }
        }

        /* ── GO NEXT ── */
        function goNext() {
            if (cur >= TOTAL - 1 || navBusy) return;
            lockNav();

            /* cleanup all active animations before leaving */
            cleanupAnimations();

            /* fade out music if on music step (native fade - GSAP can't tween media.volume) */
            if (ST[cur].music) {
                const bgm = document.getElementById('bgm');
                if (bgm && !bgm.paused) {
                    const step = bgm.volume / 18;
                    const fadeOut = setInterval(() => {
                        if (bgm.volume > step) { bgm.volume -= step; }
                        else { bgm.volume = 0; bgm.pause(); clearInterval(fadeOut); }
                    }, 50);
                }
            }
            /* cancel waveRAF */

                                    nEl.classList.remove('snap-right');

        /* ── GESTURES ── */
        function setupGestures() {
            const area = swEl;
            let lastTap = 0, lpFired = false, lpTimer = null;
            let sx = 0, sy = 0;
            let pinchDist = null;
            let tapCnt = new Array(24).fill(0), tapTmr = new Array(24).fill(null);
            let emg = 0, emgT = null;

            /* CLICK → TAP */
            area.addEventListener('click', e => {
                if (e.target.closest('.no-adv,.pz-wrap,.drag-heart,.conf-btn,.love-sl,.vinyl,a,.mic-btn,.mic-circle,.mic-wrap')) return;
                if (lpFired) { lpFired = false; return; }
                if (ST[cur].nav === 'iloveyou') return; /* mic-only step */
                if (ST[cur].nav === 'tap') goNext();
            });

            /* TOUCHSTART */
            area.addEventListener('touchstart', e => {
                if (e.target.closest('.no-adv,.drag-heart,.love-sl,a,.mic-btn,.mic-circle,.mic-wrap')) return;
                const nav = ST[cur].nav, t = e.touches[0];
                sx = t.clientX; sy = t.clientY;
                const now = Date.now();

                /* MIC STEP – block ALL touch gestures */
                if (nav === 'iloveyou') return;

                /* DOUBLETAP */
                if (now - lastTap < 340 && nav === 'doubletap') { lastTap = 0; goNext(); return; }
                lastTap = now;

                /* LONGPRESS */
                if (nav === 'longpress' || nav === 'longpress2') {
                    lpFired = false;
                    const ms = nav === 'longpress2' ? 2800 : 1800;
                    lpTimer = setTimeout(() => { lpFired = true; goNext(); }, ms);
                }

                /* TAP COUNT */
                if (nav === 'tap3' || nav === 'tap5' || nav === 'tap7') {
                    const need = nav === 'tap3' ? 3 : nav === 'tap5' ? 5 : 7;
                    tapCnt[cur]++;
                    const tc = document.getElementById('tc' + cur);
                    if (tc) { tc.textContent = tapCnt[cur]; tc.classList.add('show'); setTimeout(() => tc.classList.remove('show'), 250); }
                    clearTimeout(tapTmr[cur]);
                    if (tapCnt[cur] >= need) { tapCnt[cur] = 0; setTimeout(goNext, 200); }
                    else tapTmr[cur] = setTimeout(() => tapCnt[cur] = 0, 2200);
                }

                /* TWO-FINGER TAP */
                if (e.touches.length === 2 && nav === 'twofingertap') goNext();

                /* PINCH/SPREAD START */
                if (e.touches.length === 2 && (nav === 'pinch' || nav === 'spread')) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
                    pinchDist = Math.hypot(dx, dy);
                }

                /* EMERGENCY 7-TAP – disabled for mic step */
                if (nav !== 'type' && nav !== 'iloveyou') {
                    emg++; clearTimeout(emgT);
                    if (emg >= 7) { emg = 0; goNext(); }
                    emgT = setTimeout(() => emg = 0, 2500);
                }
            }, { passive: true });

            area.addEventListener('touchend', () => { clearTimeout(lpTimer); pinchDist = null; }, { passive: true });
            area.addEventListener('touchmove', () => { clearTimeout(lpTimer); }, { passive: true });

            /* PINCH/SPREAD MOVE */
            area.addEventListener('touchmove', e => {
                if (e.touches.length !== 2 || pinchDist === null) return;
                const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
                const nd = Math.hypot(dx, dy), nav = ST[cur].nav;
                if (nav === 'pinch' && nd < pinchDist - 55) { pinchDist = null; goNext(); }
                if (nav === 'spread' && nd > pinchDist + 55) { pinchDist = null; goNext(); }
            }, { passive: true });

            /* SWIPES */
            area.addEventListener('touchend', e => {
                const dx = sx - e.changedTouches[0].clientX, dy = sy - e.changedTouches[0].clientY;
                const nav = ST[cur].nav;
                if (nav === 'swipeup' && dy > 80 && Math.abs(dx) < 70) goNext();
                if (nav === 'swipeleft' && dx > 80 && Math.abs(dy) < 70) goNext();
                if (nav === 'swipedown' && dy < -80 && Math.abs(dx) < 70) goNext();
                if (nav === 'swiperight' && dx < -80 && Math.abs(dy) < 70) goNext();
            }, { passive: true });

            /* SHAKE */
            let lx, ly, lz, lastShake = 0;
            function listenShake() {
                window.addEventListener('devicemotion', e => {
                    const a = e.accelerationIncludingGravity; if (!a) return;
                    if (lx === undefined) { lx = a.x; ly = a.y; lz = a.z; return; }
                    const d = Math.abs(a.x - lx) + Math.abs(a.y - ly) + Math.abs(a.z - lz);
                    lx = a.x; ly = a.y; lz = a.z;
                    if (d > 26 && Date.now() - lastShake > 1100) { lastShake = Date.now(); if (ST[cur].nav === 'shake') goNext(); }
                });
            }
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                document.addEventListener('touchstart', async function r() { document.removeEventListener('touchstart', r); try { if (await DeviceMotionEvent.requestPermission() === 'granted') listenShake(); } catch (e) { } }, { once: true });
            } else listenShake();

            /* ROTATE */
            window.addEventListener('orientationchange', () => { if (ST[cur].nav === 'rotate') setTimeout(goNext, 500); });

            /* TILT */
            let tiltLk = false;
            function listenTilt() {
                window.addEventListener('deviceorientation', e => {
                    if (ST[cur].nav !== 'tilt' || tiltLk || e.gamma === null) return;
                    if (e.gamma < -38) { tiltLk = true; setTimeout(() => tiltLk = false, 1500); goNext(); }
                });
            }
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                document.addEventListener('touchstart', async function r() { document.removeEventListener('touchstart', r); try { if (await DeviceOrientationEvent.requestPermission() === 'granted') listenTilt(); } catch (e) { } }, { once: true });
            } else listenTilt();

        }

        /* ── SPEECH RECOGNITION: "I LOVE YOU" ── */
        let speechRec = null, micActive = false, micSucceeded = false;
        let waveAn = null, waveData = null, waveRAF = null;

        function drawWave() {
            const canvas = document.getElementById('micCanvas');
            if (!canvas || !waveAn) return;
            waveRAF = requestAnimationFrame(drawWave);
            registerRAF(waveRAF);
            waveAn.getByteTimeDomainData(waveData);
            const ctx2d = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            ctx2d.clearRect(0, 0, W, H);
            ctx2d.beginPath();
            ctx2d.lineWidth = 2.5;
            ctx2d.strokeStyle = micSucceeded ? '#4ade80' : '#60a5fa';
            const sliceW = W / waveData.length;
            let x = 0;
            for (let i = 0; i < waveData.length; i++) {
                const v = waveData[i] / 128.0, y = (v * H) / 2;
                i === 0 ? ctx2d.moveTo(x, y) : ctx2d.lineTo(x, y);
                x += sliceW;
            }
            ctx2d.lineTo(W, H / 2);
            ctx2d.stroke();
        }

        function startMicAudio() {
            if (!navigator.mediaDevices) return;
            navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(stream => {
                const aCtx = new (window.AudioContext || window.webkitAudioContext)();
                const src = aCtx.createMediaStreamSource(stream);
                waveAn = aCtx.createAnalyser();
                waveAn.fftSize = 256;
                src.connect(waveAn);
                waveData = new Uint8Array(waveAn.frequencyBinCount);
                drawWave();
            }).catch(() => { });
        }

        function startSpeech() {
            if (micSucceeded) return;
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            const btn = document.getElementById('micBtn');
            const circle = document.getElementById('micCircle');
            const status = document.getElementById('micStatus');
            const heard = document.getElementById('micHeard');

            if (!SpeechRec) {
                if (status) status.textContent = '😢 Use Chrome browser for mic!';
                return;
            }
            if (micActive) return;
            micActive = true;

            startMicAudio();

            if (circle) circle.classList.add('listening');
            if (btn) { btn.textContent = '🔴 Listening…'; btn.classList.add('recording'); }
            if (status) { status.className = 'mic-status active'; status.textContent = '🎤 Say "I Love You" Thangam!'; }

            function createRec() {
                const rec = new SpeechRec();
                rec.lang = 'en-US';
                rec.continuous = true;
                rec.interimResults = true;
                rec.maxAlternatives = 3;

                rec.onresult = ev => {
                    let t = '';
                    for (let i = ev.resultIndex; i < ev.results.length; i++)
                        t += ev.results[i][0].transcript;
                    const clean = t.toLowerCase().replace(/[^a-z ]/g, '').trim();
                    if (heard) heard.textContent = '"' + t + '"';
                    const magic = ['i love you', 'love you', 'i luv you', 'luv you', 'i loveyou', 'ilu', 'i love u', 'love u'];
                    if (!micSucceeded && magic.some(m => clean.includes(m))) {
                        micSucceeded = true;
                        try { rec.stop(); } catch (e) { }
                        /* CRITICAL: cancel waveRAF so canvas loop doesn't leak */
                        if (waveRAF) { cancelAnimationFrame(waveRAF); waveRAF = null; }
                        if (circle) { circle.classList.remove('listening'); circle.classList.add('success-ring'); circle.innerHTML = '💙'; }
                        if (btn) { btn.textContent = '💙 Got it!'; btn.classList.remove('recording'); }
                        if (status) { status.className = 'mic-status success'; status.textContent = '💙 Awww! I love you too Thangam! 🥹'; }
                        setTimeout(() => { doHeartRain(); setTimeout(goNext, 2800); }, 300);
                    }
                };

                rec.onerror = er => {
                    if (er.error === 'not-allowed') {
                        micActive = false;
                        if (status) status.textContent = '� Mic blocked – allow mic in browser settings!';
                        if (circle) circle.classList.remove('listening');
                        if (btn) { btn.textContent = '🎤 Try Again'; btn.classList.remove('recording'); }
                    }
                };

                rec.onend = () => {
                    if (!micSucceeded && micActive) {
                        setTimeout(() => { try { createRec().start(); } catch (e) { } }, 300);
                    }
                };

                return rec;
            }

            try { speechRec = createRec(); speechRec.start(); } catch (e) { micActive = false; }
        }

        /* ── PUZZLE (SVG Jigsaw) ── */
        const PIC = 'https://images.unsplash.com/photo-1516589174184-e67823dbf48e?auto=format&fit=crop&q=80&w=600';
        function ppPath(r, c, ps, t) {
            const x = c * ps, y = r * ps, mx = x + ps / 2, my = y + ps / 2, q = ps * 0.22;
            const top = r === 0 ? 0 : -1, right = c === 2 ? 0 : 1, bot = r === 2 ? 0 : 1, left = c === 0 ? 0 : -1;
            let d = `M ${x} ${y} `;
            // TOP (left→right)
            d += `L ${mx - q} ${y} `;
            if (top) d += `C ${mx - q} ${y - top * t} ${mx + q} ${y - top * t} ${mx + q} ${y} `; else d += `L ${mx + q} ${y} `;
            d += `L ${x + ps} ${y} `;
            // RIGHT (top→bot)
            d += `L ${x + ps} ${my - q} `;
            if (right) d += `C ${x + ps + right * t} ${my - q} ${x + ps + right * t} ${my + q} ${x + ps} ${my + q} `; else d += `L ${x + ps} ${my + q} `;
            d += `L ${x + ps} ${y + ps} `;
            // BOTTOM (right←left)
            d += `L ${mx + q} ${y + ps} `;
            if (bot) d += `C ${mx + q} ${y + ps + bot * t} ${mx - q} ${y + ps + bot * t} ${mx - q} ${y + ps} `; else d += `L ${mx - q} ${y + ps} `;
            d += `L ${x} ${y + ps} `;
            // LEFT (bot→top)
            d += `L ${x} ${my + q} `;
            if (left) d += `C ${x - left * t} ${my + q} ${x - left * t} ${my - q} ${x} ${my - q} `; else d += `L ${x} ${my - q} `;
            return d + `L ${x} ${y} Z`;
        }
        function buildPuzzle() {
            const wrap = document.getElementById('pzWrap');
            if (!wrap || wrap.querySelector('svg')) return;
            const maxW = Math.min(window.innerWidth * 0.82, 258);
            const sz = Math.floor(maxW / 3) * 3, ps = sz / 3, t = ps * 0.3;
            const pad = Math.ceil(t) + 4;
            const NS = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(NS, 'svg');
            svg.setAttribute('width', sz); svg.setAttribute('height', sz);
            svg.setAttribute('viewBox', `${-pad} ${-pad} ${sz + 2 * pad} ${sz + 2 * pad}`);
            svg.style.cssText = 'overflow:visible;cursor:pointer;display:block;margin:auto;';
            // Pattern
            const defs = document.createElementNS(NS, 'defs');
            const pat = document.createElementNS(NS, 'pattern');
            pat.id = 'ppat'; pat.setAttribute('patternUnits', 'userSpaceOnUse');
            pat.setAttribute('width', sz); pat.setAttribute('height', sz);
            const img = document.createElementNS(NS, 'image');
            img.setAttribute('href', PIC); img.setAttribute('width', sz); img.setAttribute('height', sz);
            img.setAttribute('preserveAspectRatio', 'xMidYMid slice');
            pat.appendChild(img); defs.appendChild(pat); svg.appendChild(defs);
            // BG grid
            const bg = document.createElementNS(NS, 'rect');
            bg.setAttribute('x', 0); bg.setAttribute('y', 0);
            bg.setAttribute('width', sz); bg.setAttribute('height', sz);
            bg.setAttribute('rx', 6); bg.setAttribute('fill', 'rgba(255,255,255,.05)');
            bg.setAttribute('stroke', 'rgba(96,165,250,.2)'); bg.setAttribute('stroke-width', '1');
            svg.appendChild(bg);
            // Grid lines for ghost guides
            for (let i = 1; i < 3; i++) {
                const hl = document.createElementNS(NS, 'line');
                hl.setAttribute('x1', i * ps); hl.setAttribute('y1', 0); hl.setAttribute('x2', i * ps); hl.setAttribute('y2', sz);
                hl.setAttribute('stroke', 'rgba(96,165,250,.1)'); hl.setAttribute('stroke-width', '1'); svg.appendChild(hl);
                const vl = document.createElementNS(NS, 'line');
                vl.setAttribute('x1', 0); vl.setAttribute('y1', i * ps); vl.setAttribute('x2', sz); vl.setAttribute('y2', i * ps);
                vl.setAttribute('stroke', 'rgba(96,165,250,.1)'); vl.setAttribute('stroke-width', '1'); svg.appendChild(vl);
            }
            // Scatter offsets [dx, dy]
            const SC = [
                [sz * .55, -sz * .55], [-sz * .25, -sz * .65], [-sz * .65, -sz * .2],
                [sz * .65, sz * .1], [-sz * .6, sz * .5], [sz * .2, sz * .65],
                [-sz * .5, sz * .1], [sz * .55, sz * .45], [-sz * .15, sz * .4]
            ];
            pzPcs = [];
            for (let i = 0; i < 9; i++) {
                const row = Math.floor(i / 3), col = i % 3;
                const pe = document.createElementNS(NS, 'path');
                pe.setAttribute('d', ppPath(row, col, ps, t));
                pe.setAttribute('fill', 'url(#ppat)');
                pe.setAttribute('stroke', 'rgba(255,255,255,.7)'); pe.setAttribute('stroke-width', '1.5');
                pe.setAttribute('stroke-linejoin', 'round');
                pe.style.cssText = `transition:transform .58s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(2px 3px 5px rgba(0,0,0,.55));`;
                pe.setAttribute('transform', `translate(${SC[i][0]},${SC[i][1]})`);
                svg.appendChild(pe); pzPcs.push(pe);
            }
            wrap.appendChild(svg);
            svg.addEventListener('click', tapPz);
        }
        function tapPz() {
            if (pzS >= 9) return;
            const pe = pzPcs[pzS];
            const wrap = document.getElementById('pzWrap');

            /* CSS spring transition on SVG path transform (no AttrPlugin needed) */
            pe.style.transition = 'transform 0.55s cubic-bezier(0.34,1.56,0.64,1), filter 0.3s ease';
            pe.setAttribute('transform', 'translate(0,0)');
            pe.style.filter = 'drop-shadow(0 0 14px rgba(96,165,250,1))';
            setTimeout(() => { pe.style.filter = 'drop-shadow(2px 3px 5px rgba(0,0,0,.55))'; }, 340);

            pzS++;
            const stat = document.getElementById('pzStat');
            stat.textContent = pzS < 9 ? `✨ ${pzS}/9 placed!` : '🎉 Perfect! Her smile revealed! 💙';
            if (pzS === 9) {
                savePz();
                /* GSAP board pulse (boxShadow + scale) on the wrapper div */
                gsap.timeline()
                    .to(wrap, { boxShadow: '0 0 40px rgba(96,165,250,0.75)', scale: 1.04, duration: 0.35, ease: 'power2.out' })
                    .to(wrap, { boxShadow: '0 0 0px rgba(96,165,250,0)', scale: 1, duration: 0.55, ease: 'elastic.out(1,0.5)' });
                setTimeout(goNext, 1850);
            }
        }

        /* ── METER ── */
        function updMeter(v) {
            const n = parseInt(v), l = document.getElementById('mLbl');
            if (n < 40) l.textContent = `${n}%... Really Thangam? 😏 Give more!`;
            else if (n < 80) l.textContent = `${n}%... Getting closer! Come on! 🤭`;
            else if (n < 100) l.textContent = `${n}%... Almost there! Keep going! 💙`;
            else { l.textContent = '💯 100%! I knew it! That\'s my girl! 🎉'; l.style.color = '#4ade80'; setTimeout(goNext, 800); }
        }

        /* ── TYPE ANSWER ── */
        function chkYear(v) { if (v === '2021') { const inp = document.getElementById('yrInput'); inp.style.borderColor = '#4ade80'; inp.style.color = '#4ade80'; setTimeout(goNext, 600); } }

        /* ── DRAG ── */
        function setupDrag() {
            const heart = document.getElementById('dragHeart'), zone = document.getElementById('dragZone');
            if (!heart || !zone) return;
            let dragging = false, startX = 0, startY = 0, origL = 0, origT = 0;
            heart.addEventListener('touchstart', e => {
                e.stopPropagation(); dragging = true;
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                origL = heart.offsetLeft; origT = heart.offsetTop;
            }, { passive: true });
            document.addEventListener('touchmove', e => {
                if (!dragging) return;
                const dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
                heart.style.left = (origL + dx) + 'px'; heart.style.top = (origT + dy) + 'px';
            }, { passive: true });
            document.addEventListener('touchend', e => {
                if (!dragging) return; dragging = false;
                if (e.changedTouches[0].clientX > window.innerWidth * .6) {
                    heart.style.transition = 'all .4s'; heart.style.fontSize = '5rem';
                    setTimeout(goNext, 600);
                } else { heart.style.transition = 'all .3s'; heart.style.left = '20px'; heart.style.top = '50%'; }
                setTimeout(() => heart.style.transition = 'none', 400);
            }, { passive: true });
        }

        /* ── FINISH HTML ── */
        function buildFinishHtml() {
            const stars = Array.from({ length: 18 }, (_, i) => {
                const sz = 4 + Math.random() * 8, x = Math.random() * 100, y = Math.random() * 100;
                const dur = 2 + Math.random() * 3, del = Math.random() * 4;
                return `<div class="fstar" style="width:${sz}px;height:${sz}px;left:${x}%;top:${y}%;animation-duration:${dur}s;animation-delay:${del}s;"></div>`;
            }).join('');
            return `
            <div class="fin-wrap">
                <div class="fin-stars">${stars}</div>
                <div class="fin-crown">👑</div>
                <div class="fin-hb">Happy Birthday</div>
                <div class="fin-name">Jenifar 💙</div>
                <div class="fin-hearts-row">
                    <span class="fin-hrt">💙</span>
                    <span class="fin-hrt">💜</span>
                    <span class="fin-hrt">💖</span>
                    <span class="fin-hrt">⭐</span>
                    <span class="fin-hrt">💙</span>
                </div>
                <div class="fin-letter">
                    My dearest <b>Thangam</b>,<br><br>
                    Every single day with you is a blessing I never deserved but always treasure. 🥹<br><br>
                    You are not just my girlfriend — you are my <b>home, my peace, my reason</b>. 🏡💙<br><br>
                    Today, as you turn another year more beautiful & wise, I want the whole world to know —<br><br>
                    <b>"I love you forever, Thangam. Always yours — Bharath." 💍</b>
                </div>
                <div class="fin-age-wrap">
                    <div class="fin-age-lbl">You have been alive for</div>
                    ${buildAgeHtml('B')}
                </div>
                <div class="fin-cta-row">
                    <a href="https://call.whatsapp.com/video/hdzUkrheCL54ZESXslks2t" class="call-btn" target="_blank">📞 Video Call Now!</a>
                </div>
            </div>`;
        }

        /* ── CONFETTI ── */
        function doConfetti() {
            const end = Date.now() + 7000;
            (function fire() {
                confetti({ particleCount: 12, angle: 60, spread: 70, origin: { x: 0 }, colors: ['#3b82f6', '#a855f7', '#ec4899', '#facc15'] });
                confetti({ particleCount: 12, angle: 120, spread: 70, origin: { x: 1 }, colors: ['#3b82f6', '#60a5fa', '#818cf8', '#f0abfc'] });
                if (Date.now() < end) requestAnimationFrame(fire);
            })();
        }

        /* ── PETALS ── */
        function startPetals() {
            setInterval(() => {
                const p = document.createElement('div'); p.className = 'pt';
                p.innerText = ['💙', '✨', '⭐', '❄️', '💫'][Math.floor(Math.random() * 5)];
                p.style.left = Math.random() * 100 + 'vw'; p.style.fontSize = (10 + Math.random() * 14) + 'px';
                p.style.animationDuration = (5 + Math.random() * 5) + 's';
                document.body.appendChild(p); setTimeout(() => p.remove(), 8000);
            }, 900);
        }
    </script>
